<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="theme-color" content="#da002e"><title>PREFEC - Hachim Achirafi Msoma</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f5f5}:root{--red:#da002e;--dark:#740d10;--green:#28a745;--orange:#ff9800;--blue:#1565c0}.login-screen{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:30px;background:linear-gradient(135deg,var(--red),var(--dark))}.login-screen.hidden{display:none}.login-box{background:#fff;border-radius:20px;padding:30px 25px}.login-logo{text-align:center;margin-bottom:25px}.login-logo h1{color:var(--red);font-size:2rem}.login-logo .badge{background:var(--red);color:#fff;padding:4px 12px;border-radius:15px;font-size:.75rem;display:inline-block;margin-top:8px}.login-error{background:#f8d7da;color:#721c24;padding:10px;border-radius:8px;margin-bottom:15px;text-align:center;display:none}.login-error.show{display:block}.form-group{margin-bottom:15px}.form-group label{display:block;margin-bottom:6px;font-weight:500}.form-group input,.form-group textarea{width:100%;padding:12px;border:2px solid #eee;border-radius:10px;font-size:1rem}.form-group input:focus{border-color:var(--red);outline:none}.form-group textarea{min-height:80px;resize:vertical}.login-btn{width:100%;padding:14px;background:var(--red);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:bold}.app{display:none}.app.show{display:block}.header{background:var(--red);color:#fff;padding:12px 15px;display:flex;align-items:center;position:sticky;top:0;z-index:100}.header .menu-btn{background:none;border:none;color:#fff;font-size:1.4rem;padding:5px 12px 5px 0}.header h1{flex:1;text-align:center;font-size:1rem}.header .save-icon{font-size:.75rem;padding:3px 8px;background:rgba(255,255,255,.2);border-radius:12px}.sidebar-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none}.sidebar-bg.open{display:block}.sidebar{position:fixed;top:0;left:-260px;width:260px;height:100%;background:#fff;z-index:201;transition:left .3s}.sidebar.open{left:0}.sidebar-top{background:var(--red);color:#fff;padding:25px 15px;text-align:center}.sidebar-name{font-weight:bold;font-size:1.1rem}.sidebar-menu a{display:flex;align-items:center;padding:12px 15px;color:#333;text-decoration:none;border-left:3px solid transparent}.sidebar-menu a.active{background:#fce4e8;border-left-color:var(--red);color:var(--red)}.sidebar-menu a span:first-child{width:28px}.sidebar-menu .divider{height:1px;background:#eee;margin:8px 0}.sidebar-menu a.logout{color:#dc3545}.content{padding:12px 12px 70px}.card{background:#fff;border-radius:12px;padding:15px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}.card h3{color:var(--red);margin-bottom:12px}.week-nav{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:20px;padding:8px 12px;margin-bottom:12px}.week-nav button{background:none;border:none;color:var(--red);font-size:1.3rem;padding:5px 15px}.week-nav .label{font-weight:bold;color:var(--red)}.day-title{font-weight:bold;margin:12px 0 8px;color:#333}.day-title.today{color:var(--red)}.course-item{background:#fff;border-radius:10px;padding:12px;margin-bottom:8px;display:flex;align-items:center;box-shadow:0 2px 6px rgba(0,0,0,.05);border-left:3px solid transparent;position:relative}.course-item.done{border-left-color:var(--green);background:#f8fff8}.course-item .icon{width:40px;height:40px;background:#fce4e8;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-right:12px;flex-shrink:0;font-weight:bold;color:var(--red)}.course-item .info{flex:1;min-width:0}.course-item .name{font-weight:bold}.course-item .time{font-size:.8rem;color:#888}.course-item .stag{position:absolute;top:4px;right:4px;font-size:.55rem;background:#e3f2fd;color:var(--blue);padding:1px 5px;border-radius:6px}.btn{padding:12px 20px;border:none;border-radius:10px;font-size:.95rem;font-weight:600;width:100%;display:flex;align-items:center;justify-content:center;gap:6px}.btn-red{background:var(--red);color:#fff}.btn-green{background:var(--green);color:#fff}.btn-outline{background:#fff;border:2px solid var(--red);color:var(--red)}.btn-sm{padding:6px 12px;font-size:.85rem;width:auto}.btn-danger{background:#dc3545;color:#fff}.toast{position:fixed;bottom:15px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;display:none;z-index:400}.toast.show{display:block}.seance-header{background:var(--red);color:#fff;padding:20px 15px;border-radius:0 0 20px 20px;margin:-12px -12px 12px;text-align:center;position:relative}.seance-header .back{position:absolute;left:12px;top:15px;background:none;border:none;color:#fff;font-size:1.3rem}.seance-header .title{font-size:1.1rem;font-weight:bold}.seance-header .sub{opacity:.9;font-size:.85rem}.seance-header .sinfo{font-size:.75rem;opacity:.8;margin-top:5px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}.action-btn{background:#fff;border-radius:12px;padding:15px 10px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06);border:2px solid transparent}.action-btn.done{border-color:var(--green)}.action-btn .icon{width:40px;height:40px;background:#fce4e8;border-radius:10px;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-weight:bold;color:var(--red)}.action-btn h4{font-size:.85rem}.presence-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #eee}.presence-name{flex:1;font-weight:500}.presence-btns{display:flex;gap:4px}.presence-btns button{width:32px;height:32px;border:2px solid #ddd;border-radius:6px;background:#fff;font-size:.9rem}.presence-btns button.p.on{background:#d4edda;border-color:var(--green)}.presence-btns button.r.on{background:#fff3cd;border-color:var(--orange)}.presence-btns button.a.on{background:#f8d7da;border-color:#dc3545}.eval-item{background:#fff;border-radius:10px;padding:12px;margin-bottom:10px}.eval-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.eval-title{font-weight:bold;color:var(--red)}.eval-student{background:#f8f9fa;border-radius:8px;padding:10px;margin-bottom:8px}.eval-sname{font-weight:600;font-size:.9rem;margin-bottom:8px;display:flex;justify-content:space-between}.eval-stotal{background:var(--red);color:#fff;padding:2px 8px;border-radius:10px;font-size:.75rem}.eval-grid{display:flex;flex-wrap:wrap;gap:8px}.eval-cell{flex:1;min-width:60px;text-align:center}.eval-cell label{display:block;font-size:.7rem;font-weight:bold;color:var(--red);margin-bottom:4px}.eval-cell input{width:100%;padding:8px 4px;border:2px solid #ddd;border-radius:8px;text-align:center;font-size:1rem}.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;justify-content:center;align-items:center;padding:15px}.modal-bg.show{display:flex}.modal{background:#fff;border-radius:15px;width:100%;max-width:350px;max-height:85vh;overflow-y:auto}.modal-head{padding:12px 15px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center}.modal-head h3{color:var(--red)}.modal-head button{background:none;border:none;font-size:1.3rem;color:#888}.modal-body{padding:15px}.modal-foot{padding:12px 15px;border-top:1px solid #eee;display:flex;gap:8px}.modal-foot .btn{flex:1}.scard{background:#fff;border-radius:12px;padding:15px;margin-bottom:10px;border-left:4px solid var(--blue)}.scard h4{color:var(--blue);margin-bottom:8px}.comp-btns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}.comp-btns button{padding:6px 12px;border:2px solid #ddd;border-radius:15px;background:#fff;font-weight:bold}.comp-btns button.on{background:var(--red);color:#fff;border-color:var(--red)}.auto-note{font-size:.7rem;color:var(--gre ;for(var i=0;i<7;i++){var dt=new Date(mon);dt.setDate(mon.getDate()+i);w.push(dt);}return w;}function isFerie(ds){if(!DATA.joursFeries)return null;for(var i=0;i<DATA.joursFeries.length;i++){var f=DATA.joursFeries[i];if(ds>=f.debut&&ds<=f.fin)return f.nom;}return null;}var ALLS=[];function renderAgenda(){view=1;curSeance=null;var wk=getWeek(weekOff),today=new Date().toISOString().slice(0,10);ALLS=allSeances();var out="<div class=week-nav><button onclick=weekOff--;renderAgenda()>Prec</button><span class=label>"+wk[0].getDate()+"-"+wk[6].getDate()+" "+MOIS[wk[6].getMonth()]+" "+wk[0].getFullYear()+"</span><button onclick=weekOff++;renderAgenda()>Suiv</button></div>";var has=false;wk.forEach(function(d){var ds=d.toISOString().slice(0,10);var isT=ds===today;var fer=isFerie(ds);var sj=[];ALLS.forEach(function(x,idx){if(x.s.date===ds)sj.push({it:x,idx:idx});});if(sj.length>0||fer){has=true;out+="<div class=day-title"+(isT?" style=color:var(--red)":"")+">"+JOURS[d.getDay()]+" "+d.getDate()+(isT?" (Auj)":"")+"</div>";if(fer)out+="<div class=course-item style=background:#fff8e8;border-left-color:#ffc107><div class=icon>F</div><div class=info><div class=name>"+fer+"</div></div></div>";sj.forEach(function(obj){var it=obj.it,gidx=obj.idx;var s=it.s,si=it.si,sn=it.sn;var c=findC(s.classeId,si);var dn=s.statut==="done";out+="<div class=course-item"+(dn?" style=border-left-color:var(--green);background:#f8fff8":"")+"><span class=stag>"+sn+"</span><div class=icon onclick=openSIdx("+gidx+")>C</div><div class=info onclick=openSIdx("+gidx+")><div class=name>"+(c?c.nom:"?")+"</div><div class=time>"+(s.heureDebut||"")+" - "+(s.heureFin||"")+"</div></div></div>";});}});if(!has)out+="<div class=card><p style=text-align:center;color:#888>Aucun cours cette semaine</p></div>";out+="<button class=btn style=margin-top:10px;background:#fff;border:2px_solid_var(--red);color:var(--red) onclick=weekOff=0;renderAgenda()>Aujourdhui</button>";document.getElementById("content").innerHTML=out;document.g
