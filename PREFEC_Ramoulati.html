Body").innerHTML='<div class="form-group"><label>Nom de l\'évaluation</label><input type="text" id="evalNom" placeholder="Ex: Test unitaire 1"></div><div class="form-group"><label>Compétences</label><div class="comp-btns"><button class="on" data-c="CE">CE</button><button class="on" data-c="CO">CO</button><button class="on" data-c="PE">PE</button><button class="on" data-c="PO">PO</button><button data-c="TSL">TSL</button></div></div>';document.querySelectorAll(".comp-btns button").forEach(function(btn){btn.onclick=function(){this.classList.toggle("on");};});document.getElementById("modalOk").textContent="Créer";document.getElementById("modalOk").onclick=saveEval;document.getElementById("modalBg").classList.add("show");}function saveEval(){var nm=document.getElementById("evalNom").value.trim();if(!nm){toast("Nom requis");return;}var cp=[];document.querySelectorAll(".comp-btns button.on").forEach(function(b){cp.push(b.getAttribute("data-c"));});if(cp.length===0){toast("Sélectionnez des compétences");return;}curClasse.evaluations.push({nom:nm,competences:cp,notes:{}});saveData();closeModal();openEvals();}function delEval(i){if(confirm("Supprimer cette évaluation?")){curClasse.evaluations.splice(i,1);saveData();openEvals();}}function openComm(){var out='<div class="card"><h3>Communication</h3><p style="color:var(--gray-500);margin-bottom:15px;">Envoyez des SMS ou emails à votre classe.</p><p style="text-align:center;color:var(--gray-500);padding:30px;">🚧 Fonctionnalité bientôt disponible</p></div><button class="btn btn-outline btn-block" onclick="backToSeance()">← Retour</button>';document.getElementById("content").innerHTML=out;document.getElementById("pageTitle").textContent="Communication";}document.addEventListener("DOMContentLoaded",init);</script></body></html>
