cun eleve trouve pour cette classe.</p><p style=font-size:.8rem;color:#666>classeId: "+curSeance.classeId+"</p>";}els.forEach(function(a,i){var st=curSeance.presences[a.id]||"";out+="<div class=presence-row><div class=presence-name>"+a.nom+"</div><div class=presence-btns><button class=p"+(st==="present"?" style=background:#d4edda;border-color:var(--green)":"")+" onclick=setPres("+i+",1,this)>P</button><button class=r"+(st==="retard"?" style=background:#fff3cd;border-color:var(--orange)":"")+" onclick=setPres("+i+",2,this)>R</button><button class=a"+(st==="absent"?" style=background:#f8d7da;border-color:#dc3545":"")+" onclick=setPres("+i+",3,this)>A</button></div></div>";});out+="</div><button class=btn style=background:#fff;border:2px_solid_var(--red);color:var(--red) onclick=backToSeance()>Retour</button>";document.getElementById("content").innerHTML=out;document.getElementById("pageTitle").textContent="Presences";}function setPres(i,st,btn){var els=findA(curSeance.classeId,curSIdx);var a=els[i];if(!a)return;var btns=btn.parentElement.querySelectorAll("button");for(var j=0;j<btns.length;j++){btns[j].style.background="#fff";btns[j].style.borderColor="#ddd";}if(st===1){btn.style.background="#d4edda";btn.style.borderColor="var(--green)";}else if(st===2){btn.style.background="#fff3cd";btn.style.borderColor="var(--orange)";}else{btn.style.background="#f8d7da";btn.style.borderColor="#dc3545";}curSeance.presences[a.id]=st===1?"present":st===2?"retard":"absent";saveData();}function backToSeance(){var idx=ALLS.findIndex(function(x){return x.s===curSeance;});if(idx>=0)openSIdx(idx);else renderAgenda();}function openSuivi(){if(!curSeance)return;var out="<div class=card><h3>Fiche de suivi</h3><p class=auto-note>Sauvegarde auto</p><div class=form-group><label>Objectifs</label><textarea id=obj oninput=saveSuivi()>"+(curSeance.ficheObjectifs||"")+"</textarea></div><div class=form-group><label>Contenu</label><textarea id=cont oninput=saveSuivi()>"+(curSeance.ficheContenu||"")+"</t ><h3>"+c.nom+" ("+els.length+")</h3>";els.forEach(function(a){out+="<div class=presence-row><div class=presence-name>"+a.nom+"</div></div>";});out+="</div>";}});});document.getElementById("content").innerHTML=out;document.getElementById("pageTitle").textContent="Eleves";}function renderHeures(){var out="<div class=card><h3>Mes heures</h3>";var gT=0;DATA.sessions.forEach(function(sess,si){var ex=DATA.extraSeances[si]||[];var done=sess.seances.concat(ex).filter(function(s){return s.statut==="done";}).length;var total=sess.seances.concat(ex).length;gT+=done;out+="<div style=padding:10px_0;border-bottom:1px_solid_#eee><strong>"+sess.nom+"</strong><br><span style=color:var(--red)>"+done+"/"+total+" seances</span></div>";});out+="<div style=padding:12px_0;font-weight:bold;color:var(--red)>Total: "+gT+" seances effectuees</div></div>";document.getElementById("content").innerHTML=out;document.getElementById("pageTitle").textContent="Heures";}function renderProfil(){var out="<div class=card style=text-align:center><h3>"+DATA.prof.nom+"</h3><p style=color:#888>"+DATA.sessions.length+" session(s)</p></div><div class=card><h3>Sync</h3><button class=btn style=background:var(--red);color:#fff onclick=exportData()>Exporter</button></div>";document.getElementById("content").innerHTML=out;document.getElementById("pageTitle").textContent="Profil";}function exportData(){var d=localStorage.getItem(STORE+"_data");if(!d){toast("Rien");return;}var code=btoa(d);document.getElementById("modalTitle").textContent="Code sync";document.getElementById("modalBody").innerHTML="<p style=margin-bottom:12px>Envoyez ce code:</p><textarea style=width:100%;height:80px;font-size:.65rem>"+code+"</textarea>";document.getElementById("modalOk").onclick=function(){if(navigator.clipboard)navigator.clipboard.writeText(code);toast("Copie!");closeModal();};document.getElementById("modalBg").classList.add("show");}function renderAide(){var out="<div class=card><h3>Agenda</h3><p>Naviguez avec les fleches.</p></div><div class=card><h3>Sauvegarde</h3><p>Automatique.</p></div><div class=card><h3>Evaluations</h3><p>Chaque competence /25.</p></div>";document.getElementById("content").innerHTML=out;document.getElementById("pageTitle").textContent="Aide";}document.addEventListener("DOMContentLoaded",init);</script></body></html>
