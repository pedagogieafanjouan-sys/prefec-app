ton class=btn style=background:#fff;border:2px_solid_var(--red);color:var(--red) onclick=backToSeance()>Retour</button>";document.getElementById("content").innerHTML=out;document.getElementById("pageTitle").textContent="Suivi";}function saveSuivi(){curSeance.ficheObjectifs=document.getElementById("obj").value;curSeance.ficheContenu=document.getElementById("cont").value;curSeance.ficheObservations=document.getElementById("obs").value;saveData();}function openDev(){if(!curSeance)return;if(!curSeance.devoirs)curSeance.devoirs=[];var out="<div class=card><h3>Devoirs</h3><div class=form-group><label>Description</label><textarea id=devDesc></textarea></div><div class=form-group><label>Date limite</label><input type=date id=devDate></div><button class=btn-sm style=padding:6px_12px;background:#fff;border:2px_solid_var(--red);color:var(--red) onclick=addDev()>Ajouter</button></div>";if(curSeance.devoirs.length>0){out+="<div class=card><h3>Liste</h3>";curSeance.devoirs.forEach(function(d,i){out+="<div style=display:flex;padding:8px_0;border-bottom:1px_solid_#eee><div style=flex:1>"+d.description.substring(0,30)+"</div><button class=btn-sm style=padding:6px_12px;background:#dc3545;color:#fff onclick=delDev("+i+")>X</button></div>";});out+="</div>";}out+="<button class=btn style=background:#fff;border:2px_solid_var(--red);color:var(--red) onclick=backToSeance()>Retour</button>";document.getElementById("content").innerHTML=out;document.getElementById("pageTitle").textContent="Devoirs";}function addDev(){var d=document.getElementById("devDesc").value;if(!d){toast("Requis");return;}curSeance.devoirs.push({description:d,dateLimite:document.getElementById("devDate").value});saveData();openDev();}function delDev(i){curSeance.devoirs.splice(i,1);saveData();openDev();}function openEvals(){if(!curClasse)return;var c=curClasse;var els=findA(c.id,curSIdx);var sn=DATA.sessions[curSIdx].nom;var out="<div class=card><h3>"+c.nom+"</h3><p style=color:#888;font-size:.85rem>"+sn+"</p><button cla
