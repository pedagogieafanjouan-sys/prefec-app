t" id="profLogin" value="'+(DATA.credentials.login||'')+'"></div><div class="form-group"><label>Nouveau mot de passe</label><input type="password" id="newPass" placeholder="Laisser vide pour ne pas changer"></div><div class="form-group"><label>Confirmer</label><input type="password" id="confPass"></div><button class="btn btn-primary btn-block" onclick="saveCreds()">Enregistrer</button></div>';out+='<div class="card"><h3>📤 Synchronisation</h3><p style="margin-bottom:15px;color:var(--gray-500);font-size:.9rem;">Exportez vos données pour les récupérer sur un autre appareil.</p><button class="btn btn-outline btn-block" onclick="exportData()">Exporter les données</button></div>';document.getElementById("content").innerHTML=out;}function openPhotoSelect(){document.getElementById("photoInput").click();}function changePhoto(input){if(!input.files||!input.files[0])return;var file=input.files[0];if(file.size>500000){toast("Image trop grande (max 500KB)");return;}var reader=new FileReader();reader.onload=function(e){var dataUrl=e.target.result;localStorage.setItem(STORE+"_photo",dataUrl);toast("Photo mise à jour!");document.getElementById("sidebarPhoto").innerHTML='<img src="'+dataUrl+'">';renderProfil();};reader.readAsDataURL(file);}function saveCreds(){var newL=document.getElementById("profLogin").value.trim(),newP=document.getElementById("newPass").value,confP=document.getElementById("confPass").value;if(!newL){toast("Identifiant requis");return;}if(newP&&newP!==confP){toast("Mots de passe différents");return;}DATA.credentials.login=newL;if(newP)DATA.credentials.password=newP;localStorage.setItem(STORE+"_creds",JSON.stringify(DATA.credentials));document.getElementById("profEmail").textContent=newL;toast("Profil mis à jour!");renderProfil();}function exportData(){var d=localStorage.getItem(STORE+"_data");if(!d){toast("Aucune donnée");return;}var code=btoa(d);document.getElementById("modalTitle").textContent="Code de synchronisation";document.getElementById("modalBody").inner
