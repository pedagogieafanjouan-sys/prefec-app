btn-outline btn-block" onclick="exportData()">Exporter les données</button></div>';document.getElementById("content").innerHTML=out;}function openPhotoSelect(){document.getElementById("photoInput").click();}function changePhoto(input){if(!input.files||!input.files[0])return;var file=input.files[0];if(file.size>500000){toast("Image trop grande (max 500KB)");return;}var reader=new FileReader();reader.onload=function(e){var dataUrl=e.target.result;localStorage.setItem(STORE+"_photo",dataUrl);toast("Photo mise à jour!");document.getElementById("sidebarPhoto").innerHTML='<img src="'+dataUrl+'">';renderProfil();};reader.readAsDataURL(file);}function saveCreds(){var newL=document.getElementById("profLogin").value.trim(),newP=document.getElementById("newPass").value,confP=document.getElementById("confPass").value;if(!newL){toast("Identifiant requis");return;}if(newP&&newP!==confP){toast("Mots de passe différents");return;}DATA.credentials.login=newL;if(newP)DATA.credentials.password=newP;localStorage.setItem(STORE+"_creds",JSON.stringify(DATA.credentials));document.getElementById("profEmail").textContent=newL;toast("Profil mis à jour!");renderProfil();}function exportData(){var d=localStorage.getItem(STORE+"_data");if(!d){toast("Aucune donnée");return;}var code=btoa(d);document.getElementById("modalTitle").textContent="Code de synchronisation";document.getElementById("modalBody").innerHTML='<p style="margin-bottom:15px;">Copiez ce code pour transférer vos données:</p><textarea style="width:100%;height:100px;font-size:.7rem;">'+code+'</textarea>';document.getElementById("modalOk").textContent="Copier";document.getElementById("modalOk").onclick=function(){if(navigator.clipboard)navigator.clipboard.writeText(code);toast("Code copié!");closeModal();};document.getElementById("modalBg").classList.add("show");}function renderAide(){document.getElementById("pageTitle").textContent="Aide";var syncSt=navigator.onLine?"🟢 En ligne":"🟠 Hors-ligne";var out='<div class="help-section"><div class="help-title">🔄 Synchronisation</div><div class="help-card"><p><strong>Statut:</strong> '+syncSt+'</p><p style="margin-top:10px;">Vos données se synchronisent automatiquement avec le serveur.</p><button class="btn btn-primary btn-block" onclick="manualSync()" style="margin-top:15px;">🔄 Actualiser maintenant</button></div></div>';out+='<div class="help-section"><div class="help-title">📅 Mon agenda</div><div class="help-card"><p>L\'agenda permet de visualiser vos séances organisées par date.</p><p>Utilisez les flèches <strong>‹</strong> et <strong>›</strong> pour naviguer entre les semaines.</p><div class="help-tip"><strong>💡 Astuce:</strong> En appuyant sur une séance, accédez aux options Présence, Évaluations et Suivi.</div></div></div>';out+='<div class="help-section"><div class="help-title">📚 Mes cours</div><div class="help-card"><p>Cette section affiche tous les cours qui vous sont assignés.</p><ul><li>Cliquez sur un cours pour accéder aux évaluations</li><li>Créez des évaluations avec les compétences CE, CO, PE, PO</li><li>Les notes sont automatiquement synchronisées</li></ul></div></div>';out+='<div class="help-section"><div class="help-title">✅ Présences</div><div class="help-card"><p>Pour marquer les présences:</p><ul><li><strong>P</strong> = Présent (vert)</li><li><strong>R</strong> = Retard (orange)</li><li><strong>A</strong> = Absent (rouge)</li></ul><p>La sauvegarde est automatique.</p></div></div>';out+='<div class="help-section"><div class="help-title">⏱️ Mes heures</div><div class="help-card"><p>Suivez vos heures de travail et votre rémunération:</p><ul><li>Sélectionnez la période avec les dates</li><li>Basculez entre vue par Jours ou par Cours</li><li>Le total s\'affiche en bas</li></ul></div></div>';out+='<div class="card" style="background:var(--primary);color:#fff;text-align:center;"><p style="font-size:1rem;margin-bottom:10px;">📞 Besoin d\'aide?</p><p style="opacity:.9;font-size:.9rem;">Contactez l\'administration de l\'Alliance Française</p></div>';document.getElementById("content").innerHTML=out;}function manualSync(){toast("🔄 Synchronisation...");fetchFromFirebase().then(function(d){if(d){DATA.sessions=d.sessions;DATA.settings=d.settings;DATA.joursFeries=d.joursFeries;toast("✅ Données actualisées!");showSyncStatus("online");renderAide();}else{toast("📴 Pas de connexion");showSyncStatus("offline");}}).catch(function(e){toast("❌ Erreur sync");});}function openSIdx(idx){if(!ALLS[idx])return;var it=ALLS[idx];curSIdx=it.si;var sess=DATA.sessions[it.si],s=it.s;curSeance=s;var c=findC(s.classeId,it.si);curClasse=c;var dO=new Date(s.date),pOK=s.presences&&Object.keys(s.presences).length>0,sOK=s.ficheObjectifs||s.ficheContenu||s.ficheObservations;var out='<div style="background:var(--primary);margin:-15px -15px 15px;padding:20px;color:#fff;text-align:center;position:relative;"><button style="position:absolute;left:15px;top:15px;background:rgba(255,255,255,.2);border:none;color:#fff;padding:8px 15px;border-radius:20px;font-size:.85rem;cursor:pointer;" onclick="renderAgenda()">‹ Retour</button><div style="font-size:1.3rem;font-weight:700;margin-bottom:5px;">'+(c?c.nom:'?')+'</div><div style="font-size:.9rem;opacity:.9;">'+JOURS[dO.getDay()]+' '+dO.getDate()+' '+MOIS[dO.getMonth()]+'</div></div>';out+='<div class="action-grid"><div class="action-btn'+(pOK?' done':'')+'" onclick="openPres()"><div class="icon">📋</div><h4>Assistance</h4><div class="status">'+(pOK?'Complété ✓':'Incomplet')+'</div></div><div class="action-btn" onclick="openEvals()"><div class="icon">📝</div><h4>Évaluations</h4><div class="status">Notes</div></div><div class="action-btn'+(sOK?' done':'')+'" onclick="openSuivi()"><div class="icon">📊</div><h4>Suivi</h4><div class="status">'+(sOK?'Complété ✓':'Incomplet')+'</div></div><div class="action-btn" onclick="openComm()"><div class="icon">💬</div><h4>Communication</h4><div class="status">Messages</div></div></div>';if(s.statut!=="done")out+='<button class="btn btn-primary btn-block" onclick="markDone()">✓ Marquer effectuée</button>';else out+='<div style="text-align:center;padding:15px;background:var(--green-lt);border-radius:12px;color:var(--green);">✓ Séance effectuée</div>';document.getElementById("content").innerHTML=out;document.getElementById("pageTitle").textContent="Séance";}function markDone(){curSeance.statut="done";saveData();toast("Séance effectuée");var idx=ALLS.findIndex(function(x){return x.s===curSeance;});if(idx>=0)openSIdx(idx);}function backToSeance(){var idx=ALLS.findIndex(function(x){return x.s===curSeance;});if(idx>=0)openSIdx(idx);else renderAgenda();}function openPres(){if(!curSeance)return;var els=findA(curSeance.classeId,curSIdx);if(!curSeance.presences)curSeance.presences={};var out='<div class="card"><h3>Présences ('+els.length+' élèves)</h3><p class="auto-note">Sauvegarde automatique</p>';if(els.length===0)out+='<p style="color:var(--danger);">Aucun élève trouvé.</p>';els.forEach(function(a,i){var st=curSeance.presences[a.id]||"";out+='<div class="presence-row"><div class="presence-name">'+a.nom+'</div><div class="presence-btns"><button class="p'+(st==="present"?' sel-p':'')+'" onclick="setPres('+i+',1,this)">P</button><button class="r'+(st==="retard"?' sel-r':'')+'" onclick="setPres('+i+',2,this)">R</button><button class="a'+(st==="absent"?' sel-a':'')+'" onclick="setPres('+i+',3,this)">A</button></div></div>';});out+='</div><button class="btn btn-outline btn-block" onclick="backToSeance()">← Retour</button>';document.getElementById("content").innerHTML=out;document.getElementById("pageTitle").textContent="Présences";}function setPres(i,st,btn){var els=findA(curSeance.classeId,curSIdx),a=els[i];if(!a)return;var btns=btn.parentElement.querySelectorAll("button");btns.forEach(function(b){b.className=b.className.replace(/sel-[pra]/g,"").trim();});if(st===1)btn.classList.add("sel-p");else if(st===2)btn.classList.add("sel-r");else btn.classList.add("sel-a");curSeance.presences[a.id]=st===1?"present":st===2?"retard":"absent";saveData();}function openSuivi(){if(!curSeance)return;var out='<div class="card"><h3>Fiche de suivi pédagogique</h3><p class="auto-note">Sauvegarde automatique</p><div class="form-group"><label>Objectifs du cours</label><textarea id="obj" oninput="saveSuivi()">'+(curSeance.ficheObjectifs||'')+'</textarea></div><div class="form-group"><label>Contenu / Déroulement</label><textarea id="cont" oninput="saveSuivi()">'+(curSeance.ficheContenu||'')+'</textarea></div><div class="form-group"><label>Observations</label><textarea id="obs" oninput="saveSuivi()">'+(curSeance.ficheObservations||'')+'</textarea></div></div><button class="btn btn-outline btn-block" onclick="backToSeance()">← Retour</button>';document.getElementById("content").innerHTML=out;document.getElementById("pageTitle").textContent="Suivi";}function saveSuivi(){curSeance.ficheObjectifs=document.getElementById("obj").value;curSeance.ficheContenu=document.getElementById("cont").value;curSeance.ficheObservations=document.getElementById("obs").value;saveData();}function openEvals(){if(!curClasse)return;var c=curClasse,els=findA(c.id,curSIdx),sn=DATA.sessions[curSIdx].nom;var out='<div class="card"><h3>'+c.nom+'</h3><p style="color:var(--gray-500);font-size:.85rem;margin-bottom:15px;">'+sn+'</p><button class="btn btn-primary" onclick="newEval()">➕ Nouvelle évaluation</button></div>';if(!c.evaluations||c.evaluations.length===0)out+='<div class="card"><p style="text-align:center;color:var(--gray-500);">Aucune évaluation</p></div>';else c.evaluations.forEach(function(ev,ei){var mx=ev.competences.length*25;out+='<div class="eval-item"><div class="eval-header"><span class="eval-title">'+ev.nom+' (/'+mx+')</span><button class="btn btn-danger btn-sm" onclick="delEval('+ei+')">🗑️</button></div>';els.forEach(function(a,ai){var n=ev.notes[a.id]||{},sum=0;ev.competences.forEach(function(cp){if(n[cp]!==undefined&&n[cp]!=="")sum+=parseFloat(n[cp])||0;});out+='<div class="eval-student"><div class="eval-sname">'+a.nom+'<span class="eval-stotal">'+sum+'/'+mx+'</span></div><div class="eval-grid">';ev.competences.forEach(function(cp,ci){var v=n[cp]!==undefined?n[cp]:"";out+='<div class="eval-cell"><label>'+cp+'</label><input type="number" value="'+v+'" max="25" min="0" onchange="setNote('+ei+','+ai+','+ci+',this.value)"></div>';});out+='</div></div>';});out+='</div>';});out+='<button class="btn btn-outline btn-block" onclick="backToSeance()">← Retour</button>';document.getElementById("content").innerHTML=out;document.getElementById("pageTitle").textContent="Évaluations";}function setNote(ei,ai,ci,v){var els=findA(curClasse.id,curSIdx),a=els[ai],ev=curClasse.evaluations[ei],cp=ev.competences[ci];if(!ev.notes[a.id])ev.notes[a.id]={};ev.notes[a.id][cp]=v!==""?parseFloat(v):"";saveData();toast("Note enregistrée");}function newEval(){document.getElementById("modalTitle").textContent="Nouvelle évaluation";document.getElementById("modalBody").innerHTML='<div class="form-group"><label>Nom de l\'évaluation</label><input type="text" id="evalNom" placeholder="Ex: Test unitaire 1"></div><div class="form-group"><label>Compétences</label><div class="comp-btns"><button class="on" data-c="CE">CE</button><button class="on" data-c="CO">CO</button><button class="on" data-c="PE">PE</button><button class="on" data-c="PO">PO</button><button data-c="TSL">TSL</button></div></div>';document.querySelectorAll(".comp-btns button").forEach(function(btn){btn.onclick=function(){this.classList.toggle("on");};});document.getElementById("modalOk").textContent="Créer";document.getElementById("modalOk").onclick=saveEval;document.getElementById("modalBg").classList.add("show");}function saveEval(){var nm=document.getElementById("evalNom").value.trim();if(!nm){toast("Nom requis");return;}var cp=[];document.querySelectorAll(".comp-btns button.on").forEach(function(b){cp.push(b.getAttribute("data-c"));});if(cp.length===0){toast("Sélectionnez des compétences");return;}curClasse.evaluations.push({nom:nm,competences:cp,notes:{}});saveData();closeModal();openEvals();}function delEval(i){if(confirm("Supprimer cette évaluation?")){curClasse.evaluations.splice(i,1);saveData();openEvals();}}function openComm(){var out='<div class="card"><h3>Communication</h3><p style="color:var(--gray-500);margin-bottom:15px;">Envoyez des SMS ou emails à votre classe.</p><p style="text-align:center;color:var(--gray-500);padding:30px;">🚧 Fonctionnalité bientôt disponible</p></div><button class="btn btn-outline btn-block" onclick="backToSeance()">← Retour</button>';document.getElementById("content").innerHTML=out;document.getElementById("pageTitle").textContent="Communication";}document.addEventListener("DOMContentLoaded",init);</script></body></html>
