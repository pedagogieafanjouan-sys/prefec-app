lementById("pageTitle").textContent="Eleves";}function renderHeures(){var out="<div class=card><h3>Mes heures</h3>";var gT=0;DATA.sessions.forEach(function(sess,si){var ex=DATA.extraSeances[si]||[];var done=sess.seances.concat(ex).filter(function(s){return s.statut==="done";}).length;var total=sess.seances.concat(ex).length;gT+=done;out+="<div style=padding:10px_0;border-bottom:1px_solid_#eee><strong>"+sess.nom+"</strong><br><span style=color:var(--red)>"+done+"/"+total+" seances</span></div>";});out+="<div style=padding:12px_0;font-weight:bold;color:var(--red)>Total: "+gT+" seances effectuees</div></div>";document.getElementById("content").innerHTML=out;document.getElementById("pageTitle").textContent="Heures";}function renderProfil(){var savedPhoto=localStorage.getItem(STORE+"_photo")||"";var initials=DATA.prof.nom.split(" ").map(function(n){return n[0]||"";}).join("").substring(0,2).toUpperCase();var out="<div class=card style=text-align:center>";if(savedPhoto){out+="<div style=width:100px;height:100px;border-radius:50%;margin:0_auto_15px;overflow:hidden><img src="+savedPhoto+" style=width:100%;height:100%;object-fit:cover></div>";}else{out+="<div style=width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,#da002e,#ff6b6b);margin:0_auto_15px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:2rem;font-weight:bold>"+initials+"</div>";}out+="<h3>"+DATA.prof.nom+"</h3>";out+="<p style=color:#888>"+DATA.sessions.length+" session(s)</p>";out+="<input type=file id=photoInput accept=image/* style=display:none onchange=changePhoto(this)>";out+="<button class=btn onclick=openPhotoSelect() style=background:#fff;border:2px_solid_#da002e;color:#da002e;margin-top:12px>Changer photo</button>";out+="</div>";out+="<div class=card><h3>Securite</h3>";out+="<div style=margin-bottom:12px><label>Identifiant</label><input type=text id=profLogin value="+DATA.credentials.login+" style=width:100%;padding:10px;border:2px_solid_#eee;border-radius:8px;margin-top:5px></div>";out+="<div style=margin-bottom:12px><label>Nouveau mot de passe</label><input type=password id=newPass placeholder=Laisser_vide_si_inchange style=width:100%;padding:10px;border:2px_solid_#eee;border-radius:8px;margin-top:5px></div>";out+="<div style=margin-bottom:12px><label>Confirmer</label><input type=password id=confPass style=width:100%;padding:10px;border:2px_solid_#eee;border-radius:8px;margin-top:5px></div>";out+="<button class=btn onclick=saveCredentials() style=background:#28a745;color:#fff>Enregistrer</button>";out+="</div>";out+="<div class=card><h3>Synchronisation</h3><button class=btn onclick=exportData() style=background:#da002e;color:#fff>Exporter donnees</button></div>";document.getElementById("content").innerHTML=out;document.getElementById("pageTitle").textContent="Profil";}function openPhotoSelect(){document.getElementById("photoInput").click();}function changePhoto(input){if(!input.files||!input.files[0])return;var file=input.files[0];if(file.size>500000){toast("Image trop grande (max 500KB)");return;}var reader=new FileReader();reader.onload=function(e){var dataUrl=e.target.result;localStorage.setItem(STORE+"_photo",dataUrl);syncPhotoToFirebase(dataUrl);toast("Photo mise a jour!");renderProfil();};reader.readAsDataURL(file);}function syncPhotoToFirebase(dataUrl){if(typeof firebase==="undefined")return;var profKey=DATA.prof.nom.replace(/[^a-zA-Z0-9]/g,"");firebase.database().ref("profils/"+profKey+"/photo").set(dataUrl);}function saveCredentials(){var newLogin=document.getElementById("profLogin").value.trim();var newPass=document.getElementById("newPass").value;var confPass=document.getElementById("confPass").value;if(!newLogin){toast("Identifiant requis");return;}if(newPass&&newPass!==confPass){toast("Mots de passe différents");return;}DATA.credentials.login=newLogin;if(newPass){DATA.credentials.password=newPass;}localStorage.setItem(STORE+"_creds",JSON.stringify(DATA.credentials));syncCredentialsToFirebase();toast("Profil mis à jour!");renderProfil();}function syncCredentialsToFirebase(){if(typeof firebase==="undefined")return;var profKey=DATA.prof.nom.replace(/[^a-zA-Z0-9]/g,"");firebase.database().ref("profils/"+profKey).update({login:DATA.credentials.login,password:DATA.credentials.password,updatedAt:Date.now()});}function loadProfile(){var savedCreds=localStorage.getItem(STORE+"_creds");if(savedCreds){try{var c=JSON.parse(savedCreds);DATA.credentials.login=c.login||DATA.credentials.login;DATA.credentials.password=c.password||DATA.credentials.password;}catch(e){}}}function exportData(){var d=localStorage.getItem(STORE+"_data");if(!d){toast("Rien");return;}var code=btoa(d);document.getElementById("modalTitle").textContent="Code sync";document.getElementById("modalBody").innerHTML="<p style=margin-bottom:12px>Envoyez ce code:</p><textarea style=width:100%;height:80px;font-size:.65rem>"+code+"</textarea>";document.getElementById("modalOk").onclick=function(){if(navigator.clipboard)navigator.clipboard.writeText(code);toast("Copie!");closeModal();};document.getElementById("modalBg").classList.add("show");}function renderAide(){var out="<div class=card><h3>Agenda</h3><p>Naviguez avec les fleches.</p></div><div class=card><h3>Sauvegarde</h3><p>Automatique.</p></div><div class=card><h3>Evaluations</h3><p>Chaque competence /25.</p></div>";document.getElementById("content").innerHTML=out;document.getElementById("pageTitle").textContent="Aide";}document.addEventListener("DOMContentLoaded",init);</script></body></html>
