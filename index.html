<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREFEC - Applications Formateurs</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a171b 0%, #2d2a2e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            padding: 40px 20px;
            color: white;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #da002e;
        }
        .header p {
            color: #87888a;
            font-size: 1.1em;
        }
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            padding: 20px 0;
        }
        .app-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-decoration: none;
            color: #1a171b;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .app-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(218, 0, 46, 0.3);
        }
        .app-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #da002e, #ff4466);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
        }
        .app-info h3 {
            font-size: 1.1em;
            margin-bottom: 5px;
        }
        .app-info p {
            font-size: 0.85em;
            color: #87888a;
        }
        .footer {
            text-align: center;
            padding: 40px 20px;
            color: #87888a;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 PREFEC</h1>
            <p>Applications des Formateurs - Alliance Française</p>
        </div>
        
        <div class="apps-grid" id="appsGrid">
            <!-- Les applications seront listées ici -->
        </div>
        
        <div class="footer">
            <p>© 2026 PREFEC - Pédagogie Alliance Française Anjouan</p>
        </div>
    </div>
    
    <script>
        // Liste des applications (à mettre à jour manuellement si besoin)
        var apps = [
            { name: "Ankili Mahamoud", file: "PREFEC_Ankili_Mahamoud (9).html" },
            { name: "Abdallah Abdou", file: "PREFEC_Abdallah_Abdou (1).html" },
            { name: "Ansume Soulaimana", file: "PREFEC_Ansume_Soulaimana (1).html" },
            { name: "Baraka SAID", file: "PREFEC_Baraka_SAID (2).html" },
            { name: "Faouzat Hassamidine", file: "PREFEC_Faouzat_Hassamidine (22).html" },
            { name: "Hachim Achirafi Msoma", file: "PREFEC_Hachim_Achirafi_Msoma (1).html" },
            { name: "Haiza Haidar", file: "PREFEC_Haiza_Haidar.html" },
            { name: "Idrisse Moussa", file: "PREFEC_Idrisse_Moussa (1).html" },
            { name: "Moutui Ahmed", file: "PREFEC_Moutui_Ahmed (1).html" },
            { name: "Nazir Abdallah", file: "PREFEC_Nazir_Abdallah (1).html" },
            { name: "Oundjiya Ahmed", file: "PREFEC_Oundjiya_Ahmed (1).html" },
            { name: "Rafiki Zoubert", file: "PREFEC_Rafiki_Zoubert.html" },
            { name: "Ramoulati", file: "PREFEC_Ramoulati (1).html" },
            { name: "Sanael Mohamed", file: "PREFEC_Sanael_Mohamed (1).html" },
            { name: "Saylane Ahmed", file: "PREFEC_Saylane_Ahmed (1).html" }
        ];
        
        var grid = document.getElementById('appsGrid');
        apps.forEach(function(app) {
            var card = document.createElement('a');
            card.href = encodeURI(app.file);
            card.className = 'app-card';
            card.innerHTML = '<div class="app-icon">👤</div><div class="app-info"><h3>' + app.name + '</h3><p>Application PREFEC</p></div>';
            grid.appendChild(card);
        });
    </script>
</body>
</html>
