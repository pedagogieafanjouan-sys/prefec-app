function changeProfPassword() {
    var session = getSession();
    var prof = session.professeurs.find(function(p) { return p.id === DB.currentUser.id; });
    
    var oldPwd = document.getElementById('profilOldPwd').value;
    var newPwd = document.getElementById('profilNewPwd').value;
    var confirmPwd = document.getElementById('profilConfirmPwd').value;
    
    if (!oldPwd || !newPwd || !confirmPwd) {
        notify('Tous les champs sont requis', 'error');
        return;
    }
    
    if (oldPwd !== prof.password) {
        notify('Mot de passe actuel incorrect', 'error');
        return;
    }
    
    if (newPwd !== confirmPwd) {
        notify('Les mots de passe ne correspondent pas', 'error');
        return;
    }
    
    if (newPwd.length < 4) {
        notify('Le mot de passe doit faire au moins 4 caractères', 'error');
        return;
    }
    
    prof.password = newPwd;
    save();
    
    document.getElementById('profilOldPwd').value = '';
    document.getElementById('profilNewPwd').value = '';
    document.getElementById('profilConfirmPwd').value = '';
    
    notify('Mot de passe modifié avec succès', 'success');
}

function setupFileUpload() {
    var zone = document.getElementById('uploadZone'), input = document.getElementById('fileInput');
    if (!zone || !input) return;
    zone.onclick = function() { input.click(); };
    zone.ondragover = function(e) { e.preventDefault(); };
    zone.ondrop = function(e) { e.preventDefault(); if (e.dataTransfer.files[0]) parseExcel(e.dataTransfer.files[0]); };
    input.onchange = function() { if (this.files[0]) parseExcel(this.files[0]); };
}

function parseExcel(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
        try {
            var wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
            var result = { classes: [], apprenants: [], professeurs: [], cipr: '' }, profsMap = {};
            
            wb.SheetNames.forEach(function(sheetName) {
                var rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { header: 1, defval: '' });
                if (rows.length < 5) return;
                
                var ciprRaw = '', classeNom = sheetName.trim(), profNom = '';
                
                // Mots à ignorer pour la détection du formateur
                var ignoreWords = ['CIPR', 'A2', 'B1', 'B2', 'EVALUATION', 'NOM', 'PRENOM', 'ADRESSE', 'NIN', 'MATRICULE', 'SDL', 'PE', 'CE', 'PO', 'CO', 'TOTAL', 'ASSIDUIT', 'PREFEC', 'SIMA', 'NYU', 'DEB', 'AV'];
                
                // Chercher CIPR, niveau et formateur dans les premières lignes
                for (var i = 0; i < Math.min(rows.length, 10); i++) {
                    for (var j = 0; j < Math.min(rows[i].length, 10); j++) {
                        var cell = clean(rows[i][j]);
                        var cellUp = cell.toUpperCase();
                        
                        // Détecter CIPR
                        if (cellUp.indexOf('CIPR') !== -1 && !ciprRaw) ciprRaw = cell;
                        
                        // Détecter nom de classe (contient niveau)
                        if ((cellUp.indexOf('A2') !== -1 || cellUp.indexOf('B1') !== -1 || cellUp.indexOf('B2') !== -1) && cell.length > 5) {
                            classeNom = cell;
                        }
                        
                        // Détecter formateur avec label "Formateur"
                        if (cellUp === 'FORMATEUR' || cellUp === 'FORMATRICE' || cellUp === 'ENSEIGNANT' || cellUp === 'PROF') {
                            for (var k = j + 1; k < Math.min(rows[i].length, j + 4); k++) {
                                var next = clean(rows[i][k]);
                                if (next && next.length > 3) { profNom = next; break; }
                            }
                        }
                    }
                }
                
                // Si pas de formateur trouvé, chercher en ligne 1 colonne 1 (format sans label)
                if (!profNom && rows[1]) {
                    var candidat = clean(rows[1][1]);
                    if (candidat && candidat.length >= 3) {
                        var candidatUp = candidat.toUpperCase();
                        var isIgnored = ignoreWords.some(function(w) { return candidatUp.indexOf(w) !== -1; });
                        // Vérifier que c'est un nom (contient un espace = prénom nom)
                        var looksLikeName = candidat.indexOf(' ') !== -1 && !isIgnored;
                        if (looksLikeName) {
                            profNom = candidat;
                        }
                    }
                }
                
                // Si toujours pas trouvé, chercher ligne 2
                if (!profNom && rows[2]) {
                    var candidat2 = clean(rows[2][1]);
                    if (candidat2 && candidat2.length >= 3) {
                        var candidatUp2 = candidat2.toUpperCase();
                        var isIgnored2 = ignoreWords.some(function(w) { return candidatUp2.indexOf(w) !== -1; });
                        var looksLikeName2 = candidat2.indexOf(' ') !== -1 && !isIgnored2;
                        if (looksLikeName2) {
                            profNom = candidat2;
                        }
                    }
                }
                
                if (ciprRaw && !result.cipr) result.cipr = ciprRaw;
                
                // Extraire CIPR du nom de classe si pas trouvé
                if (!result.cipr) {
                    var classeUp = classeNom.toUpperCase();
                    if (classeUp.indexOf('SIMA') !== -1) result.cipr = 'CIPR Sima';
                    else if (classeUp.indexOf('NYU') !== -1) result.cipr = 'CIPR Nyumakele';
                }
                
                var niveau = 'A2', nu = classeNom.toUpperCase();
                if (nu.indexOf('B2') !== -1) niveau = 'B2';
                else if (nu.indexOf('B1') !== -1) niveau = 'B1';
                
                var sousNiveau = '';
                if (nu.indexOf('DEB') !== -1) sousNiveau = 'Débutant';
                else if (nu.indexOf('AV') !== -1) sousNiveau = 'Avancé';
                
                // Heures prévues selon le niveau
                var heuresPrevues = 100; // A2 par défaut
                if (niveau === 'B1') heuresPrevues = 160;
                else if (niveau === 'B2') heuresPrevues = 200;
                
                var classeId = genId(), profId = '';
                if (profNom) {
                    if (!profsMap[profNom]) {
                        // Créer un ID basé sur le prénom en minuscules
                        var parts = profNom.split(' ');
                        profId = parts[0].toLowerCase().replace(/[^a-z]/g, '');
                        if (profId.length < 3) profId = profNom.toLowerCase().replace(/\s+/g, '_').replace(/[^a-z_]/g, '');
                        profsMap[profNom] = profId;
                        result.professeurs.push({ id: profId, nom: profNom, password: 'prefec123', classes: [] });
                    } else {
                        profId = profsMap[profNom];
                    }
                    var profObj = result.professeurs.find(function(p) { return p.id === profId; });
                    if (profObj) profObj.classes.push(classeId);
                }
                
                result.classes.push({ id: classeId, nom: classeNom, niveau: niveau, sousNiveau: sousNiveau, profId: profId, lieu: result.cipr || '', heuresPrevues: heuresPrevues, heuresSession: 26, evaluations: [], modules: [] });
                
                // Trouver header et apprenants
                var headerRow = -1;
                for (var i = 0; i < Math.min(rows.length, 15); i++) {
                    var rowStr = rows[i].join(' ').toUpperCase();
                    if ((rowStr.indexOf('NOM') !== -1 || rowStr.indexOf('PRENOM') !== -1) && (rowStr.indexOf('MATRICULE') !== -1 || rowStr.indexOf('NIN') !== -1 || rowStr.indexOf('ADRESSE') !== -1)) {
                        headerRow = i;
                        break;
                    }
                }
                if (headerRow === -1) headerRow = 3;
                
                var colNom = 1, colAdresse = 2, colNin = 3, colMatricule = 4;
                if (rows[headerRow]) {
                    rows[headerRow].forEach(function(cell, idx) {
                        var cellStr = clean(cell).toUpperCase();
                        if ((cellStr.indexOf('NOM') !== -1 || cellStr.indexOf('PRENOM') !== -1) && cellStr.indexOf('MATRICULE') === -1) colNom = idx;
                        if (cellStr.indexOf('ADRESSE') !== -1) colAdresse = idx;
                        if (cellStr === 'NIN' || cellStr.indexOf('NIN') !== -1) colNin = idx;
                        if (cellStr.indexOf('MATRICULE') !== -1) colMatricule = idx;
                    });
                }
                
                for (var r = headerRow + 1; r < rows.length; r++) {
                    var row = rows[r];
                    if (!row || row.length < 3) continue;
                    var num = parseInt(clean(row[0]));
                    if (isNaN(num) || num < 1 || num > 200) continue;
                    var nom = clean(row[colNom]);
                    if (!nom || nom.length < 2 || nom === ' - - ') continue;
                    
                    var adresse = clean(row[colAdresse]) || '';
                    if (adresse === ' - - ' || adresse === '-') adresse = '';
                    
                    var nin = clean(row[colNin]) || '';
                    if (nin === ' - - ' || nin === '-') nin = '';
                    
                    var matricule = clean(row[colMatricule]) || '';
                    if (matricule === ' - - ' || matricule === '-') matricule = '';
                    if (!matricule) matricule = 'MAT-' + Date.now().toString().slice(-6) + r;
                    
                    result.apprenants.push({
                        id: genId(),
                        nom: nom,
                        adresse: adresse,
                        nin: nin,
                        matricule: matricule,
                        classeId: classeId
                    });
                }
            });
            
            if (result.classes.length === 0) { notify('Aucune donnée trouvée', 'error'); return; }
            DB.pendingImport = result;
            showImportPreview(result);
        } catch (err) { console.error(err); notify('Erreur: ' + err.message, 'error'); }
    };
    reader.readAsArrayBuffer(file);
}

function showImportPreview(data) {
    var html = '<div class="alert alert-success">📊 ' + data.classes.length + ' classes, ' + data.apprenants.length + ' apprenants, ' + data.professeurs.length + ' formateurs détectés</div>';
    if (data.cipr) html += '<p><strong>CIPR:</strong> ' + data.cipr + '</p>';
    
    html += '<table><thead><tr><th>Classe</th><th>Niveau</th><th>Formateur</th><th>Élèves</th></tr></thead><tbody>';
    data.classes.forEach(function(c) {
        var prof = data.professeurs.find(function(p) { return p.id === c.profId; });
        var nb = data.apprenants.filter(function(a) { return a.classeId === c.id; }).length;
        html += '<tr><td>' + c.nom + '</td><td><span class="badge badge-' + c.niveau.toLowerCase() + '">' + c.niveau + '</span></td><td>' + (prof ? prof.nom : '-') + '</td><td>' + nb + '</td></tr>';
    });
    html += '</tbody></table>';
    
    html += '<div style="margin-top:15px;"><button class="btn btn-success" onclick="confirmImport()">✅ Importer</button> <button class="btn btn-secondary" onclick="cancelImport()">Annuler</button></div>';
    
    document.getElementById('importPreview').innerHTML = html;
    document.getElementById('importPreview').style.display = 'block';
    document.getElementById('uploadZone').style.display = 'none';
}

function confirmImport() {
    if (!DB.pendingImport) return;
    var session = getSession();
    var data = DB.pendingImport;
    
    if (data.cipr) DB.settings.cipr = data.cipr;
    
    data.professeurs.forEach(function(p) {
        var existing = session.professeurs.find(function(ep) { return ep.nom === p.nom; });
        if (!existing) session.professeurs.push(p);
        else { p.classes.forEach(function(cid) { var cl = data.classes.find(function(c) { return c.id === cid; }); if (cl) cl.profId = existing.id; }); }
    });
    
    data.classes.forEach(function(c) { session.classes.push(c); });
    data.apprenants.forEach(function(a) { session.apprenants.push(a); });
    
    save();
    DB.pendingImport = null;
    cancelImport();
    updateAll();
    notify('✅ Import réussi', 'success');
}

function cancelImport() {
    DB.pendingImport = null;
    document.getElementById('importPreview').style.display = 'none';
    document.getElementById('uploadZone').style.display = 'block';
}

function importBackup(file) {
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
        try {
            var data = JSON.parse(e.target.result);
            if (data.sessions) {
                DB.sessions = data.sessions;
                DB.currentSessionId = data.currentSessionId || data.sessions[0].id;
                DB.settings = data.settings || DB.settings;
                DB.admins = data.admins || DB.admins;
                save();
                notify('Restauré!', 'success');
                location.reload();
            }
        } catch (err) { notify('Erreur', 'error'); }
    };
    reader.readAsText(file);
}

function renderFinRecap() {
    var session = getSession();
    var finances = getFinances();
    
    // Calcul rémunérations

    session.professeurs.forEach(function(p) {
        var profIdStr = String(p.id);
        var profClasses = session.classes.filter(function(c) { return c.profId && String(c.profId) === profIdStr; });
        profClasses.forEach(function(c) {
            var calc = calcRemunerationClasse(c.id);
            totalRemunerations += calc.remuneration;
            totalFraisSeances += calc.frais;
        });
    });
    
    // Calcul dépenses
    var totalDepenses = (finances.depenses || []).reduce(function(sum, d) { return sum + (parseInt(d.montant) || 0); }, 0);
    
    // Calcul déplacements
    var totalDeplProfs = (finances.deplacementsProfs || []).reduce(function(sum, d) { return sum + (parseInt(d.montant) || 0); }, 0);
    var totalDeplApp = (finances.deplacementsApprenants || []).reduce(function(sum, d) { return sum + (parseInt(d.montant) || 0); }, 0);
    
    var grandTotal = totalRemunerations + totalFraisSeances + totalDepenses + totalDeplProfs + totalDeplApp;
    
    var html = '<div class="stats-grid">';
    html += '<div class="stat-card"><div class="stat-icon green">💰</div><div class="stat-info"><h4>Rémunérations</h4><div class="value" style="font-size:1rem;">' + formatMoney(totalRemunerations) + '</div></div></div>';

    html += '<div class="stat-card"><div class="stat-icon yellow">🛒</div><div class="stat-info"><h4>Dépenses</h4><div class="value" style="font-size:1rem;">' + formatMoney(totalDepenses) + '</div></div></div>';

    html += '<div class="stat-card"><div class="stat-icon purple">🚌</div><div class="stat-info"><h4>Dépl. Apprenants</h4><div class="value" style="font-size:1rem;">' + formatMoney(totalDeplApp) + '</div></div></div>';
    html += '<div class="stat-card" style="grid-column:span 2;background:linear-gradient(135deg,#e8f5e9,#c8e6c9);"><div class="stat-icon green" style="font-size:2rem;">📊</div><div class="stat-info"><h4>TOTAL GÉNÉRAL</h4><div class="value" style="font-size:1.5rem;color:var(--success);">' + formatMoney(grandTotal) + '</div></div></div>';
    html += '</div>';
    
    // Tableau récap
    html += '<div class="card" style="margin-top:20px;"><div class="card-header"><h3>📋 Détail par catégorie</h3></div><div class="card-body">';
    html += '<table><thead><tr><th>Catégorie</th><th>Montant</th><th>%</th></tr></thead><tbody>';
    
    var categories = [
        { nom: '💰 Rémunérations formateurs', montant: totalRemunerations },
        { nom: '📝 Frais supplémentaires séances', montant: totalFraisSeances },
        { nom: '🛒 Dépenses & achats', montant: totalDepenses },
        { nom: '🚗 Déplacements formateurs', montant: totalDeplProfs },
        { nom: '🚌 Déplacements apprenants', montant: totalDeplApp }
    ];
    
    categories.forEach(function(cat) {
        var pct = grandTotal > 0 ? Math.round((cat.montant / grandTotal) * 100) : 0;
        html += '<tr><td>' + cat.nom + '</td><td><strong>' + formatMoney(cat.montant) + '</strong></td><td>' + pct + '%</td></tr>';

function toggleDeplAppMode() {
    var mode = document.querySelector('input[name="deplAppMode"]:checked').value;
    document.getElementById('deplAppGlobalSection').style.display = mode === 'global' ? '' : 'none';
    document.getElementById('deplAppCiprSection').style.display = mode === 'cipr' ? '' : 'none';
    
    // Update radio button styles
    document.querySelectorAll('input[name="deplAppMode"]').forEach(function(radio) {
        var label = radio.parentElement;
        if (radio.checked) {
            label.style.borderColor = 'var(--primary)';
            label.style.background = 'rgba(218,0,46,0.05)';
        } else {
            label.style.borderColor = '#eee';
            label.style.background = '#fff';

    });

function addCipr() {

    DB.settings.tauxHoraire = parseInt(document.getElementById('finTauxHoraire').value) || 5000;
    
    // Sauvegarder les prix CIPR pour profs
    var ciprProf = {};
    document.querySelectorAll('.ciprProfPrix').forEach(function(input) {
        var cipr = input.getAttribute('data-cipr');
        ciprProf[cipr] = parseInt(input.value) || 5000;
    });
    DB.settings.ciprPrixProf = ciprProf;
    
    // Mode déplacement apprenants
    var deplAppMode = document.querySelector('input[name="deplAppMode"]:checked').value;
    DB.settings.deplAppMode = deplAppMode;
    
    if (deplAppMode === 'global') {
        DB.settings.finDeplacementApprenant = parseInt(document.getElementById('finDeplAppGlobal').value) || 2000;
    } else {
        var ciprApp = {};
        document.querySelectorAll('.ciprAppPrix').forEach(function(input) {
            var cipr = input.getAttribute('data-cipr');
            ciprApp[cipr] = parseInt(input.value) || 2000;
        });
        DB.settings.ciprPrixApprenant = ciprApp;
    }
    
    var cats = [];
    document.querySelectorAll('.finCategorie').forEach(function(input) {
        if (input.value.trim()) cats.push(input.value.trim());
    });
    DB.settings.finCategories = cats;
    
    save();

}

// Fonction pour obtenir le prix de déplacement d'un prof selon son CIPR
function getPrixDeplacementProf(cipr) {
    if (!cipr || !DB.settings.ciprPrixProf) return DB.settings.finDeplacementProf || 5000;
    return DB.settings.ciprPrixProf[cipr] || DB.settings.finDeplacementProf || 5000;
}

// Fonction pour obtenir le prix de déplacement d'un apprenant selon son CIPR
function getPrixDeplacementApprenant(cipr) {
    if (DB.settings.deplAppMode === 'cipr' && cipr && DB.settings.ciprPrixApprenant) {
        return DB.settings.ciprPrixApprenant[cipr] || DB.settings.finDeplacementApprenant || 2000;
    }
    return DB.settings.finDeplacementApprenant || 2000;
}

// Construire les données d'un prof
function buildProfData(prof) {
    var profIdStr = String(prof.id);
    
    var allSessions = [];
    DB.sessions.forEach(function(session) {
        var profClasses = (session.classes || []).filter(function(c) { 
            return c.profId && String(c.profId) === profIdStr; 
        });
        
        if (profClasses.length > 0) {
            var profApprenants = (session.apprenants || []).filter(function(a) {
                return profClasses.some(function(c) { return c.id === a.classeId; });
            });
            
            var profSeances = (session.seances || []).filter(function(s) {
                return profClasses.some(function(c) { return c.id === s.classeId; });
            });
            
            allSessions.push({
                id: session.id,
                nom: session.nom,
                dateDebut: session.dateDebut,
                dateFin: session.dateFin,
                classes: profClasses,
                apprenants: profApprenants,
                seances: profSeances
            });
        }
    });
    
    if (allSessions.length === 0) return null;
    
    allSessions.sort(function(a, b) { return (a.dateDebut || '').localeCompare(b.dateDebut || ''); });
    
    var currentIdx = allSessions.findIndex(function(s) { return s.id === DB.currentSessionId; });
    if (currentIdx < 0) currentIdx = 0;
    
    var data = {
        prof: { id: prof.id, nom: prof.nom, telephone: prof.telephone || '' },
        credentials: { login: prof.id, password: prof.password || 'prefec123' },
        sessions: allSessions,
        settings: { tauxHoraire: DB.settings.tauxHoraire || 5000 },
        joursFeries: DB.settings.joursFeries || [],
        extraSeances: {},
        currentSessionIdx: currentIdx
    };
    
    var dataJSON = JSON.stringify(data);
    var dataEncoded = btoa(unescape(encodeURIComponent(dataJSON)));
    var html = generateMobileAppHTMLv2(prof.nom, dataEncoded);
    var fileName = 'PREFEC_' + prof.nom.replace(/[^a-zA-Z0-9]/g, '_') + '.html';
    
    return { data: data, html: html, fileName: fileName };
}

function renderNiveauxObjectifs() {
    var container = document.getElementById('niveauxObjectifsContainer');
    if (!container) return;
    
    var modules = DB.settings.modules || [];
    
    if (modules.length === 0) {
        container.innerHTML = '<p style="color:var(--gray-500);">Aucun niveau défini. Cliquez sur "➕ Ajouter niveau" pour en créer.</p>';
        return;
    }
    
    var html = '<table><thead><tr><th>Niveau</th><th>Heures requises</th><th>Actions</th></tr></thead><tbody>';
    
    modules.forEach(function(m, idx) {
        html += '<tr>';
        html += '<td><input type="text" value="' + (m.niveau || '') + '" onchange="updateNiveauObjectif(' + idx + ', \'niveau\', this.value)" style="width:80px;padding:5px;"></td>';
        html += '<td><input type="number" value="' + (m.heuresTotal || 0) + '" onchange="updateNiveauObjectif(' + idx + ', \'heures\', this.value)" style="width:100px;padding:5px;"> h</td>';
        html += '<td><button class="btn btn-sm btn-danger" onclick="deleteNiveauObjectif(' + idx + ')">🗑️</button></td>';
        html += '</tr>';
    });
    
    html += '</tbody></table>';
    container.innerHTML = html;
}

function addNiveauObjectif() {
    if (!DB.settings.modules) DB.settings.modules = [];
    
    var niveau = prompt('Nom du niveau (ex: A2, B1, B2, C1):');
    if (!niveau) return;
    
    var heures = prompt('Nombre d\'heures requises:', '100');
    if (!heures) return;
    
    DB.settings.modules.push({
        niveau: niveau.toUpperCase(),
        heuresTotal: parseInt(heures) || 100
    });
    
    save();
    renderNiveauxObjectifs();
    notify('Niveau ' + niveau + ' ajouté', 'success');
}

function updateNiveauObjectif(idx, field, value) {
    if (!DB.settings.modules || !DB.settings.modules[idx]) return;
    
    if (field === 'niveau') {
        DB.settings.modules[idx].niveau = value.toUpperCase();
    } else if (field === 'heures') {
        DB.settings.modules[idx].heuresTotal = parseInt(value) || 0;
    }
    
    save();
    notify('Objectif mis à jour', 'success');
}

function deleteNiveauObjectif(idx) {
    if (!DB.settings.modules) return;
    
    var m = DB.settings.modules[idx];
    if (!confirm('Supprimer le niveau "' + m.niveau + '" ?')) return;
    
    DB.settings.modules.splice(idx, 1);
    save();
    renderNiveauxObjectifs();
    notify('Niveau supprimé', 'success');
}

function getObjectifHeures(niveau) {
    var modules = DB.settings.modules || [];
    var found = modules.find(function(m) { return m.niveau === niveau; });
    return found ? found.heuresTotal : 100; // 100h par défaut
}

function hasPermission(permission) {
    if (!DB.currentUser) return false;
    
    // Trouver l'admin actuel
    var admin = DB.admins.find(function(a) { return a.id === DB.currentUser.id; });
    if (!admin) return false;
    
    // Super admin a toujours toutes les permissions
    if (admin.role === 'superadmin') return true;
    
    // Vérifier les permissions personnalisées
    if (admin.permissions && Array.isArray(admin.permissions)) {
        return admin.permissions.indexOf(permission) !== -1;
    }
    
    // Sinon utiliser les permissions du rôle prédéfini
    var role = ROLES_PREDEFINIS[admin.role];
    if (role) {
        return role.permissions.indexOf(permission) !== -1;
    }
    
    return false;
}

function getCurrentUserRole() {
    if (!DB.currentUser) return null;
    var admin = DB.admins.find(function(a) { return a.id === DB.currentUser.id; });
    return admin ? admin.role : null;
}

function openAdminModal(idx) {
    if (!hasPermission('gerer_admins')) {
        notify('Vous n\'avez pas la permission de gérer les administrateurs', 'error');
        return;
    }
    
    var admin = idx !== undefined ? DB.admins[idx] : null;

    // Infos de base
    html += '<div class="form-group"><label>Identifiant de connexion</label>';

    html += '<input type="text" id="adminPassword" value="' + (admin ? admin.password : '') + '"></div>';

    html += '<div class="form-group"><label>Rôle</label>';
    html += '<select id="adminRole" onchange="updatePermissionsFromRole()">';
    Object.keys(ROLES_PREDEFINIS).forEach(function(roleKey) {
        var role = ROLES_PREDEFINIS[roleKey];
        var selected = admin && admin.role === roleKey ? ' selected' : '';
        html += '<option value="' + roleKey + '"' + selected + '>' + role.label + '</option>';
    });
    html += '<option value="custom"' + (admin && admin.role === 'custom' ? ' selected' : '') + '>🔧 Personnalisé</option>';
    html += '</select></div>';
    
    // Permissions personnalisées
    html += '<div id="permissionsSection" style="margin-top:15px;padding:15px;background:var(--gray-100);border-radius:8px;">';
    html += '<h4 style="margin-bottom:10px;">🔐 Permissions</h4>';
    html += '<p style="color:var(--gray-600);font-size:0.85rem;margin-bottom:15px;">Cochez les permissions accordées à cet administrateur :</p>';
    
    // Grouper par catégorie
    var categories = {};
    Object.keys(PERMISSIONS).forEach(function(permKey) {
        var perm = PERMISSIONS[permKey];
        if (!categories[perm.category]) categories[perm.category] = [];
        categories[perm.category].push({ key: permKey, label: perm.label });
    });
    
    var adminPerms = admin && admin.permissions ? admin.permissions : 
                     (admin && ROLES_PREDEFINIS[admin.role] ? ROLES_PREDEFINIS[admin.role].permissions : []);
    
    Object.keys(categories).forEach(function(cat) {
        html += '<div style="margin-bottom:12px;">';
        html += '<strong style="color:var(--primary);">' + cat + '</strong>';
        html += '<div style="margin-top:5px;margin-left:10px;">';
        categories[cat].forEach(function(perm) {
            var checked = adminPerms.indexOf(perm.key) !== -1 ? ' checked' : '';
            var isDanger = perm.key === 'supprimer_tout' ? ' style="color:var(--danger);"' : '';
            html += '<label style="display:block;margin:5px 0;cursor:pointer;"' + isDanger + '>';
            html += '<input type="checkbox" class="perm-checkbox" data-perm="' + perm.key + '"' + checked + '> ';
            html += perm.label + '</label>';
        });
        html += '</div></div>';
    });
    
    html += '</div></div>';
    
    showModal((isEdit ? '✏️ Modifier' : '➕ Ajouter') + ' un administrateur', html, function() {
        var login = document.getElementById('adminLogin').value.trim();
        var nom = document.getElementById('adminNom').value.trim();
        var password = document.getElementById('adminPassword').value.trim();
        var role = document.getElementById('adminRole').value;
        
        if (!login || !password) {
            notify('Identifiant et mot de passe requis', 'error');
            return;
        }
        
        // Collecter les permissions cochées
        var selectedPerms = [];
        document.querySelectorAll('.perm-checkbox:checked').forEach(function(cb) {
            selectedPerms.push(cb.getAttribute('data-perm'));
        });
        
        if (isEdit) {
            DB.admins[idx].nom = nom;
            DB.admins[idx].password = password;
            DB.admins[idx].role = role;
            DB.admins[idx].permissions = role === 'custom' ? selectedPerms : null;
        } else {
            // Vérifier que l'identifiant n'existe pas
            if (DB.admins.find(function(a) { return a.id === login; })) {
                notify('Cet identifiant existe déjà', 'error');
                return;
            }
            DB.admins.push({ 
                id: login, 
                password: password, 
                nom: nom, 
                role: role,
                permissions: role === 'custom' ? selectedPerms : null
            });
        }
        
        save();
        renderAdmins();
        closeModal();
        notify(isEdit ? 'Admin modifié' : 'Admin ajouté', 'success');
    });

function updatePermissionsFromRole() {
    var role = document.getElementById('adminRole').value;
    var rolePerms = ROLES_PREDEFINIS[role] ? ROLES_PREDEFINIS[role].permissions : [];
    
    document.querySelectorAll('.perm-checkbox').forEach(function(cb) {
        var perm = cb.getAttribute('data-perm');
        cb.checked = rolePerms.indexOf(perm) !== -1;
        
        // Désactiver les checkboxes si ce n'est pas un rôle personnalisé
        cb.disabled = role !== 'custom';
    });
    
    // Afficher/masquer la section permissions
    var section = document.getElementById('permissionsSection');
    if (role === 'custom') {
        section.style.opacity = '1';
    } else {
        section.style.opacity = '0.7';
    }
}

function deleteAdmin(idx) {
    var admin = DB.admins[idx];
    if (!admin) return;
    
    if (admin.role === 'superadmin') {
        notify('Impossible de supprimer le super admin', 'error');
        return;
    }
    
    if (!confirm('Supprimer l\'admin "' + admin.nom + '" ?')) return;
    
    DB.admins.splice(idx, 1);
    save();
    renderAdmins();
    notify('Admin supprimé', 'success');
}

function renderJoursFeries() {
    var feries = DB.settings.joursFeries || [];
    var container = document.getElementById('joursFeriesContainer');
    if (!container) return;
    
    if (feries.length === 0) {
        container.innerHTML = '<p style="color:var(--gray-500);">Aucun jour férié défini. Cliquez sur "➕ Ajouter" pour en créer.</p>';
        return;
    }
    
    // Trier par date de début
    feries.sort(function(a, b) { return a.debut.localeCompare(b.debut); });
    
    var today = new Date().toISOString().slice(0, 10);
    
    var html = '<table><thead><tr><th>Nom</th><th>Date début</th><th>Date fin</th><th>Durée</th><th>Statut</th><th>Actions</th></tr></thead><tbody>';
    
    feries.forEach(function(f, idx) {
        var debut = new Date(f.debut);
        var fin = new Date(f.fin);
        var duree = Math.ceil((fin - debut) / (1000 * 60 * 60 * 24)) + 1;
        
        var statut, statutClass;
        if (f.fin < today) {
            statut = 'Passé';
            statutClass = 'badge-secondary';
        } else if (f.debut <= today && f.fin >= today) {
            statut = 'En cours';
            statutClass = 'badge-danger';
        } else {
            statut = 'À venir';
            statutClass = 'badge-info';
        }
        
        html += '<tr' + (f.debut <= today && f.fin >= today ? ' style="background:#ffebee;"' : '') + '>';
        html += '<td><strong>' + f.nom + '</strong></td>';
        html += '<td>' + formatDate(f.debut) + '</td>';
        html += '<td>' + formatDate(f.fin) + '</td>';
        html += '<td>' + duree + ' jour' + (duree > 1 ? 's' : '') + '</td>';
        html += '<td><span class="badge ' + statutClass + '">' + statut + '</span></td>';
        html += '<td>';
        html += '<button class="btn btn-sm btn-secondary" onclick="openJourFerieModal(' + idx + ')">✏️</button> ';
        html += '<button class="btn btn-sm btn-danger" onclick="deleteJourFerie(' + idx + ')">🗑️</button>';
        html += '</td></tr>';
    });
    
    html += '</tbody></table>';
    
    // Résumé
    var aVenir = feries.filter(function(f) { return f.debut > today; }).length;
    var enCours = feries.filter(function(f) { return f.debut <= today && f.fin >= today; }).length;
    
    if (enCours > 0) {
        html = '<div class="alert alert-danger" style="margin-bottom:15px;">🚫 <strong>' + enCours + '</strong> période(s) fériée(s) en cours actuellement !</div>' + html;
    }
    
    container.innerHTML = html;
}

    content += '<div class="form-group"><label>Date de fin *</label><input type="date" id="ferieFin" value="' + (f ? f.fin : today) + '"></div>';

    content += '<div class="alert alert-info" style="margin-top:15px;">💡 <strong>Astuce :</strong> Pour un seul jour, mettez la même date de début et de fin.</div>';

        }

// Recalculer les séances qui tombent sur un jour férié
function recalculerSeancesFeries(ferie) {
    var session = getSession();
    if (!session || !session.seances) return 0;
    
    var affected = 0;
    var debutFerie = new Date(ferie.debut);
    var finFerie = new Date(ferie.fin);
    
    // Parcourir toutes les séances
    session.seances.forEach(function(seance) {
        if (!seance.date) return;
        
        var dateSeance = new Date(seance.date);
        
        // Vérifier si la séance tombe pendant la période fériée
        if (dateSeance >= debutFerie && dateSeance <= finFerie && seance.statut !== 'done') {
            // Décaler à la semaine suivante (même jour de la semaine)
            var nouvDate = new Date(dateSeance);
            nouvDate.setDate(nouvDate.getDate() + 7);
            
            // Vérifier que la nouvelle date ne tombe pas aussi sur un férié
            var maxTentatives = 10;
            var tentative = 0;
            while (isDateFeriee(nouvDate) && tentative < maxTentatives) {
                nouvDate.setDate(nouvDate.getDate() + 7);
                tentative++;
            }
            
            // Formater la date
            var y = nouvDate.getFullYear();
            var m = String(nouvDate.getMonth() + 1).padStart(2, '0');
            var d = String(nouvDate.getDate()).padStart(2, '0');
            seance.date = y + '-' + m + '-' + d;
            seance.decalee = true; // Marquer comme décalée
            seance.raisonDecalage = ferie.nom;
            affected++;
        }
    });
    
    if (affected > 0) {
        // Trier les séances par date
        session.seances.sort(function(a, b) {
            return (a.date || '').localeCompare(b.date || '');
        });
        save();
    }
    
    return affected;
}

// Vérifier si une date est fériée
function isDateFeriee(date) {
    var feries = DB.settings.joursFeries || [];
    var dateStr = date.toISOString().split('T')[0];
    
    for (var i = 0; i < feries.length; i++) {
        if (dateStr >= feries[i].debut && dateStr <= feries[i].fin) {
            return true;
        }
    }
    return false;
}

// Recalculer TOUTES les séances pour toutes les périodes fériées
function recalculerToutesSeancesFeries() {
    var session = getSession();
    if (!session) {
        notify('Aucune session sélectionnée', 'error');
        return;
    }
    
    var feries = DB.settings.joursFeries || [];
    if (feries.length === 0) {
        notify('Aucune période fériée définie', 'warning');
        return;
    }
    
    var totalAffected = 0;
    feries.forEach(function(f) {
        totalAffected += recalculerSeancesFeries(f);
    });
    
    if (totalAffected > 0) {
        notify(totalAffected + ' séance(s) décalée(s) au total !', 'success');
        // Rafraîchir les affichages
        if (typeof renderClasses === 'function') renderClasses();
    } else {
        notify('Aucune séance à décaler', 'info');
    }
}

function deleteJourFerie(idx) {
    var feries = DB.settings.joursFeries || [];
    var f = feries[idx];
    
    if (!confirm('Supprimer "' + f.nom + '" ?')) return;
    
    DB.settings.joursFeries.splice(idx, 1);

function syncFromFirebase() {
    document.getElementById('syncStatus').innerHTML = '<p style="color:var(--info);">🔄 Récupération depuis Firebase...</p>';
    
    var imported = { presences: 0, evaluations: 0, suivis: 0 };
    
    // Fonction pour normaliser les dates
    function normalizeDate(dateStr) {
        if (!dateStr) return '';
        dateStr = String(dateStr);
        if (dateStr.includes('T') && dateStr.includes('Z')) {
            var d = new Date(dateStr);
            var y = d.getFullYear();
            var m = String(d.getMonth() + 1).padStart(2, '0');
            var day = String(d.getDate()).padStart(2, '0');
            return y + '-' + m + '-' + day;
        }
        if (dateStr.includes('T')) return dateStr.split('T')[0];
        if (dateStr.match(/^\d{4}-\d{2}-\d{2}/)) return dateStr.substring(0, 10);
        return dateStr;
    }
    
    // Fonction pour trouver la session
    function findSession(sessionValue) {
        if (!sessionValue) return null;
        sessionValue = String(sessionValue).trim();
        if (sessionValue.includes('T') || sessionValue.match(/^\d{4}-\d{2}-\d{2}/)) {
            var d = new Date(sessionValue);
            var mois = ['Janvier', 'Février', 'Mars', 'Avril', 'Mai', 'Juin', 
                        'Juillet', 'Août', 'Septembre', 'Octobre', 'Novembre', 'Décembre'];
            var nomMois = mois[d.getMonth()];
            var annee = d.getFullYear();
            var sessionNom = nomMois + ' ' + annee;
            return DB.sessions.find(function(s) {
                return s.nom && s.nom.trim().toLowerCase() === sessionNom.toLowerCase();
            });
        }
        return DB.sessions.find(function(s) {
            return s.nom && s.nom.trim().toLowerCase() === sessionValue.toLowerCase();
        });
    }
    
    // Récupérer les présences
    firebaseDB.ref('presences').once('value').then(function(snapshot) {
        var data = snapshot.val();
        if (data) {
            Object.keys(data).forEach(function(key) {
                var p = data[key];
                var sess = findSession(p.session);
                if (!sess) return;
                
                var classe = sess.classes.find(function(c) { 
                    return c.nom.trim().toLowerCase() === (p.classe || '').trim().toLowerCase(); 
                });
                if (!classe) return;
                
                var apprenant = sess.apprenants.find(function(a) { 
                    return a.nom.trim().toLowerCase() === (p.eleve || '').trim().toLowerCase() && 
                           String(a.classeId) === String(classe.id); 
                });
                if (!apprenant) return;
                
                var dateP = normalizeDate(p.date);
                var seance = sess.seances.find(function(s) { 
                    return normalizeDate(s.date) === dateP && String(s.classeId) === String(classe.id); 
                });
                if (seance) {
                    if (!seance.presences) seance.presences = {};
                    seance.presences[apprenant.id] = (p.statut || 'present').toLowerCase();
                    imported.presences++;
                    // AUTO-VALIDATION: Marquer la séance comme effectuée si elle a des présences
                    if (seance.statut !== 'done') {
                        seance.statut = 'done';
                        if (!imported.seancesValidees) imported.seancesValidees = 0;
                        imported.seancesValidees++;
                    }
                }
            });
        }
        
        // Récupérer les évaluations
        return firebaseDB.ref('evaluations').once('value');
    }).then(function(snapshot) {
        var data = snapshot.val();
        if (data) {
            Object.keys(data).forEach(function(key) {
                var ev = data[key];
                var sessionsToSearch = ev.session ? [findSession(ev.session)].filter(Boolean) : DB.sessions;
                
                sessionsToSearch.forEach(function(sess) {
                    if (!sess) return;
                    var classe = sess.classes.find(function(c) { 
                        return c.nom.trim().toLowerCase() === (ev.classe || '').trim().toLowerCase(); 
                    });
                    if (!classe || !classe.evaluations) return;
                    
                    var apprenant = sess.apprenants.find(function(a) { 
                        return a.nom.trim().toLowerCase() === (ev.eleve || '').trim().toLowerCase() && 
                               String(a.classeId) === String(classe.id); 
                    });
                    if (!apprenant) return;
                    
                    var evaluation = classe.evaluations.find(function(e) { 
                        return e.nom.trim().toLowerCase() === (ev.evaluation || '').trim().toLowerCase(); 
                    });
                    
                    // Si l'évaluation n'existe pas, la créer automatiquement
                    if (!evaluation && ev.evaluation) {
                        // Utiliser les compétences de Firebase si disponibles
                        var competences = [];
                        if (ev.competences && ev.competences.length > 0) {
                            competences = ev.competences;
                        } else if (ev.note && typeof ev.note === 'object') {
                            // Extraire les compétences depuis les notes
                            competences = Object.keys(ev.note);
                        } else {
                            competences = ['Note']; // Compétence par défaut
                        }
                        
                        evaluation = {
                            nom: ev.evaluation,
                            competences: competences,
                            notes: {}
                        };
                        classe.evaluations.push(evaluation);
                        console.log('Évaluation créée:', ev.evaluation, 'pour classe:', classe.nom, 'compétences:', competences);
                    }
                    
                    if (evaluation) {
                        if (!evaluation.notes) evaluation.notes = {};
                        // Gérer les notes (objet avec compétences ou valeur simple)
                        if (ev.note && typeof ev.note === 'object') {
                            evaluation.notes[apprenant.id] = ev.note;
                        } else {
                            evaluation.notes[apprenant.id] = ev.note || '';
                        }
                        imported.evaluations++;
                    }
                });
            });
        }
        
        // Récupérer les suivis
        return firebaseDB.ref('suivis').once('value');
    }).then(function(snapshot) {
        var data = snapshot.val();
        if (data) {
            Object.keys(data).forEach(function(key) {
                var sv = data[key];
                var sessionsToSearch = sv.session ? [findSession(sv.session)].filter(Boolean) : DB.sessions;
                
                sessionsToSearch.forEach(function(sess) {
                    if (!sess) return;
                    var classe = sess.classes.find(function(c) { 
                        return c.nom.trim().toLowerCase() === (sv.classe || '').trim().toLowerCase(); 
                    });
                    if (!classe) return;
                    
                    var dateS = normalizeDate(sv.date);
                    var seance = sess.seances.find(function(se) { 
                        return normalizeDate(se.date) === dateS && String(se.classeId) === String(classe.id); 
                    });
                    if (seance) {
                        seance.ficheObjectifs = sv.objectifs || seance.ficheObjectifs;
                        seance.ficheContenu = sv.contenu || seance.ficheContenu;
                        seance.ficheObservations = sv.observations || seance.ficheObservations;
                        imported.suivis++;
                        // AUTO-VALIDATION: Marquer la séance comme effectuée si elle a un suivi
                        if (seance.statut !== 'done') {
                            seance.statut = 'done';
                            if (!imported.seancesValidees) imported.seancesValidees = 0;
                            imported.seancesValidees++;
                        }
                    }
                });
            });
        }
        
        save();
        var msg = '✅ Firebase: ' + imported.presences + ' présences, ' + imported.evaluations + ' notes, ' + imported.suivis + ' suivis';
        if (imported.seancesValidees) msg += ', <strong style="color:#28a745;">' + imported.seancesValidees + ' séances auto-validées</strong>';
        document.getElementById('syncStatus').innerHTML = '<p style="color:var(--success);">' + msg + '</p>';
        notify('Synchronisation Firebase réussie !', 'success');
        // Rafraîchir l'affichage si on est sur le tableau de bord
        if (typeof updateDashboard === 'function') updateDashboard();
    }).catch(function(err) {
        document.getElementById('syncStatus').innerHTML = '<p style="color:var(--danger);">❌ Erreur: ' + err.message + '</p>';
        notify('Erreur Firebase', 'error');
    });
}

// ========== SYNC ADMIN AUTOMATIQUE ==========
var adminSyncActive = false;
function startAdminSync() {
    if (adminSyncActive || !navigator.onLine) return;
    
    if (typeof firebase === 'undefined' || !firebaseDB) {
        // Réessayer dans 3 secondes
        setTimeout(startAdminSync, 3000);
        return;
    }
    
    adminSyncActive = true;
    console.log('Admin sync activée');
    
    // Écouter les changements sur adminData (données partagées entre admins)
    firebaseDB.ref('adminData').on('value', function(snapshot) {
        var data = snapshot.val();
        if (data && data.lastUpdate && data.lastUpdate > (window.lastAdminSync || 0)) {
            // Nouvelles données détectées
            window.lastAdminSync = data.lastUpdate;
            
            // Ne pas écraser si c'est nous qui avons fait la modif
            if (data.updatedBy && data.updatedBy === DB.currentUser.id) return;
            
            // Demander confirmation avant d'écraser
            if (confirm('📥 Nouvelles données détectées de ' + (data.updatedBy || 'un autre admin') + '.\n\nVoulez-vous les récupérer ?')) {
                if (data.sessions) DB.sessions = data.sessions;
                if (data.settings) DB.settings = data.settings;
                save();
                updateAll();
                notify('✅ Données synchronisées !', 'success');
            }
        }
    });
    
    // Aussi écouter les présences des profs
    startFirebaseListener();
    
    notify('🔄 Sync admin activée', 'success');
}

var firebaseListenerActive = false;
function startFirebaseListener() {
    if (firebaseListenerActive) {
        notify('Écoute déjà active', 'warning');
        return;
    }
    
    firebaseListenerActive = true;
    notify('Écoute Firebase activée !', 'success');
    document.getElementById('syncStatus').innerHTML = '<p style="color:var(--success);">👂 Écoute en temps réel activée - les nouvelles données seront importées automatiquement</p>';
    
    // Écouter les nouvelles présences
    firebaseDB.ref('presences').on('child_added', function(snapshot) {
        var p = snapshot.val();
        if (p && p.timestamp && (Date.now() - p.timestamp) < 60000) { // Seulement les données récentes (< 1 min)
            syncFromFirebase();
        }
    });
    
    // Écouter les nouvelles évaluations
    firebaseDB.ref('evaluations').on('child_added', function(snapshot) {
        var ev = snapshot.val();
        if (ev && ev.timestamp && (Date.now() - ev.timestamp) < 60000) {
            syncFromFirebase();
        }
    });
    
    // Écouter les modifications d'évaluations
    firebaseDB.ref('evaluations').on('child_changed', function(snapshot) {
        var ev = snapshot.val();
        if (ev && ev.timestamp && (Date.now() - ev.timestamp) < 60000) {
            syncFromFirebase();
        }
    });
    
    // Écouter les nouveaux suivis
    firebaseDB.ref('suivis').on('child_added', function(snapshot) {
        var sv = snapshot.val();
        if (sv && sv.timestamp && (Date.now() - sv.timestamp) < 60000) {
            syncFromFirebase();
        }
    });
}

// Auto-valider toutes les séances passées qui ont des présences
function autoValidateAllSeances() {
    var session = getSession();
    if (!session) {
        notify('Aucune session sélectionnée', 'error');
        return;
    }
    
    var today = new Date().toISOString().split('T')[0];
    var validated = 0;
    var alreadyDone = 0;
    var noPresences = 0;
    
    (session.seances || []).forEach(function(seance) {
        // Seulement les séances passées ou d'aujourd'hui
        if (seance.date && seance.date <= today) {
            if (seance.statut === 'done') {
                alreadyDone++;
            } else if (seance.presences && Object.keys(seance.presences).length > 0) {
                // A des présences mais pas encore validée
                seance.statut = 'done';
                validated++;
            } else if (seance.ficheObjectifs || seance.ficheContenu) {
                // A un suivi mais pas encore validée
                seance.statut = 'done';
                validated++;
            } else {
                noPresences++;
            }
        }
    });
    
    save();
    
    var msg = '<div style="text-align:left;"><h4>📊 Résultat de l\'auto-validation</h4>';
    msg += '<p style="margin-top:15px;">✅ <strong style="color:#28a745;">' + validated + '</strong> séances nouvellement validées</p>';
    msg += '<p>📋 <strong>' + alreadyDone + '</strong> séances déjà effectuées</p>';
    msg += '<p>⚠️ <strong style="color:#ff9800;">' + noPresences + '</strong> séances sans présences (non validées)</p>';
    msg += '<p style="margin-top:15px;font-size:0.85rem;color:#666;">Les séances sans présences ne sont pas validées automatiquement.</p></div>';
    
    showModal('🚀 Auto-validation terminée', msg, null);
    notify(validated + ' séances validées !', 'success');
    
    // Rafraîchir les affichages
    if (typeof updateDashboard === 'function') updateDashboard();
    if (typeof renderClasses === 'function') renderClasses();
}

// ========== SYNC AUTOMATIQUE VERS FIREBASE ==========
// Pousse automatiquement les données des profs vers Firebase
function pushProfsToFirebase() {
    if (typeof firebaseDB === 'undefined') return;
    
    // Collecter tous les profs de toutes les sessions
    var allProfs = {};
    DB.sessions.forEach(function(session) {
        (session.professeurs || []).forEach(function(p) {
            var pid = String(p.id);
            if (!allProfs[pid]) {
                allProfs[pid] = { id: p.id, nom: p.nom, password: p.password || 'prefec123', telephone: p.telephone || '' };
            }
        });
    });
    
    var profsArray = Object.values(allProfs);
    if (profsArray.length === 0) return;
    
    var updates = {};
    var timestamp = Date.now();
    
    profsArray.forEach(function(prof) {
        var profIdStr = String(prof.id);
        
        // Collecter les sessions de ce prof
        var profSessions = [];
        DB.sessions.forEach(function(session) {
            var profClasses = (session.classes || []).filter(function(c) { 
                return c.profId && String(c.profId) === profIdStr; 
            });
            
            if (profClasses.length > 0) {
                var profApprenants = (session.apprenants || []).filter(function(a) {
                    return profClasses.some(function(c) { return c.id === a.classeId; });
                });
                
                var profSeances = (session.seances || []).filter(function(s) {
                    return profClasses.some(function(c) { return c.id === s.classeId; });
                });
                
                profSessions.push({
                    id: session.id,
                    nom: session.nom,
                    dateDebut: session.dateDebut,
                    dateFin: session.dateFin,
                    classes: profClasses,
                    apprenants: profApprenants,
                    seances: profSeances
                });
            }
        });
        
        if (profSessions.length === 0) return;
        
        // Trouver l'index de la session courante
        var currentIdx = profSessions.findIndex(function(s) { return s.id === DB.currentSessionId; });
        if (currentIdx < 0) currentIdx = 0;
        
        // Données du prof à pousser
        var profData = {
            prof: { id: prof.id, nom: prof.nom, telephone: prof.telephone || '' },
            credentials: { login: prof.id, password: prof.password || 'prefec123' },
            sessions: profSessions,
            settings: { tauxHoraire: DB.settings.tauxHoraire || 5000 },
            joursFeries: DB.settings.joursFeries || [],
            currentSessionIdx: currentIdx,
            lastUpdate: timestamp
        };
        
        // Clé Firebase sécurisée (pas de caractères spéciaux)
        var firebaseKey = prof.nom.replace(/[^a-zA-Z0-9]/g, '_');
        updates['profsData/' + firebaseKey] = profData;
    });
    
    // Pousser vers Firebase
    firebaseDB.ref().update(updates)
        .then(function() {
            console.log('✅ Firebase sync: ' + profsArray.length + ' profs mis à jour');
            updateFirebaseSyncIndicator(true);
        })
        .catch(function(err) {
            console.error('❌ Firebase sync error:', err);
            updateFirebaseSyncIndicator(false);
        });
}

// ========== EXPORT EXCEL/CSV ==========
function exportToExcel(type) {
    var wb = XLSX.utils.book_new();
    var today = new Date().toISOString().split('T')[0];
    
    if (type === 'presences' || type === 'all') {
        var presData = [['Session', 'Date', 'Classe', 'Formateur', 'Apprenant', 'Statut']];
        DB.sessions.forEach(function(sess) {
            sess.seances.forEach(function(seance) {
                if (!seance.presences) return;
                var classe = sess.classes.find(function(c) { return String(c.id) === String(seance.classeId); });
                var prof = sess.formateurs.find(function(f) { return String(f.id) === String(seance.formateurId); });
                Object.keys(seance.presences).forEach(function(appId) {
                    var app = sess.apprenants.find(function(a) { return String(a.id) === String(appId); });
                    presData.push([
                        sess.nom || '',
                        seance.date || '',
                        classe ? classe.nom : '',
                        prof ? prof.nom : '',
                        app ? app.nom : '',
                        seance.presences[appId] || ''
                    ]);
                });
            });
        });
        var ws = XLSX.utils.aoa_to_sheet(presData);
        XLSX.utils.book_append_sheet(wb, ws, 'Presences');
        if (type === 'presences') {
            XLSX.writeFile(wb, 'PREFEC_Presences_' + today + '.xlsx');
            notify('Présences exportées !', 'success');
            return;
        }
    }
    
    if (type === 'evaluations' || type === 'all') {
        var evalData = [['Session', 'Classe', 'Évaluation', 'Apprenant', 'Note']];
        DB.sessions.forEach(function(sess) {
            sess.classes.forEach(function(classe) {
                if (!classe.evaluations) return;
                classe.evaluations.forEach(function(ev) {
                    if (!ev.notes) return;
                    Object.keys(ev.notes).forEach(function(appId) {
                        var app = sess.apprenants.find(function(a) { return String(a.id) === String(appId); });
                        evalData.push([
                            sess.nom || '',
                            classe.nom || '',
                            ev.nom || '',
                            app ? app.nom : '',
                            ev.notes[appId] || ''
                        ]);
                    });
                });
            });
        });
        var ws2 = XLSX.utils.aoa_to_sheet(evalData);
        XLSX.utils.book_append_sheet(wb, ws2, 'Evaluations');
        if (type === 'evaluations') {
            XLSX.writeFile(wb, 'PREFEC_Evaluations_' + today + '.xlsx');
            notify('Évaluations exportées !', 'success');
            return;
        }
    }
    
    if (type === 'suivis' || type === 'all') {
        var suiviData = [['Session', 'Date', 'Classe', 'Formateur', 'Objectifs', 'Contenu', 'Observations']];
        DB.sessions.forEach(function(sess) {
            sess.seances.forEach(function(seance) {
                if (!seance.ficheObjectifs && !seance.ficheContenu && !seance.ficheObservations) return;
                var classe = sess.classes.find(function(c) { return String(c.id) === String(seance.classeId); });
                var prof = sess.formateurs.find(function(f) { return String(f.id) === String(seance.formateurId); });
                suiviData.push([
                    sess.nom || '',
                    seance.date || '',
                    classe ? classe.nom : '',
                    prof ? prof.nom : '',
                    seance.ficheObjectifs || '',
                    seance.ficheContenu || '',
                    seance.ficheObservations || ''
                ]);
            });
        });
        var ws3 = XLSX.utils.aoa_to_sheet(suiviData);
        XLSX.utils.book_append_sheet(wb, ws3, 'Suivis');
        if (type === 'suivis') {
            XLSX.writeFile(wb, 'PREFEC_Suivis_' + today + '.xlsx');
            notify('Suivis exportés !', 'success');
            return;
        }
    }
    
    if (type === 'assiduite' || type === 'all') {
        var assidData = [['Session', 'Classe', 'Apprenant', 'Total Séances', 'Présent', 'Retard', 'Absent', 'Taux Présence', 'Taux Assiduité']];
        DB.sessions.forEach(function(sess) {
            sess.classes.forEach(function(classe) {
                // Trouver les apprenants de cette classe
                var apprenants = sess.apprenants.filter(function(a) { return String(a.classeId) === String(classe.id); });
                // Trouver les séances de cette classe
                var seances = sess.seances.filter(function(s) { return String(s.classeId) === String(classe.id); });
                
                apprenants.forEach(function(app) {
                    var present = 0, retard = 0, absent = 0, total = 0;
                    
                    seances.forEach(function(seance) {
                        if (seance.presences && seance.presences[app.id]) {
                            total++;
                            var statut = seance.presences[app.id].toLowerCase();
                            if (statut === 'present' || statut === 'p') present++;
                            else if (statut === 'retard' || statut === 'r') retard++;
                            else if (statut === 'absent' || statut === 'a') absent++;
                        }
                    });
                    
                    var tauxPresence = total > 0 ? Math.round((present / total) * 100) : 0;
                    var tauxAssiduite = total > 0 ? Math.round(((present + retard) / total) * 100) : 0;
                    
                    assidData.push([
                        sess.nom || '',
                        classe.nom || '',
                        app.nom || '',
                        total,
                        present,
                        retard,
                        absent,
                        tauxPresence + '%',
                        tauxAssiduite + '%'
                    ]);
                });
            });
        });
        var ws4 = XLSX.utils.aoa_to_sheet(assidData);
        XLSX.utils.book_append_sheet(wb, ws4, 'Assiduite');
        if (type === 'assiduite') {
            XLSX.writeFile(wb, 'PREFEC_Assiduite_' + today + '.xlsx');
            notify('Assiduité exportée !', 'success');
            return;
        }
    }
    
    if (type === 'all') {
        XLSX.writeFile(wb, 'PREFEC_Export_Complet_' + today + '.xlsx');
        notify('Export complet terminé !', 'success');
    }
}

function setExportPeriod(period) {
    var today = new Date();
    var debut, fin;
    
    if (period === 'today') {
        debut = fin = today.toISOString().split('T')[0];
    } else if (period === 'week') {
        var day = today.getDay();
        var diff = today.getDate() - day + (day === 0 ? -6 : 1);
        debut = new Date(today.setDate(diff)).toISOString().split('T')[0];
        fin = new Date().toISOString().split('T')[0];
    } else if (period === 'month') {
        debut = new Date(today.getFullYear(), today.getMonth(), 1).toISOString().split('T')[0];
        fin = new Date().toISOString().split('T')[0];
    } else if (period === 'lastmonth') {
        var lastMonth = new Date(today.getFullYear(), today.getMonth() - 1, 1);
        debut = lastMonth.toISOString().split('T')[0];
        fin = new Date(today.getFullYear(), today.getMonth(), 0).toISOString().split('T')[0];
    } else {
        debut = '';
        fin = '';
    }
    
    document.getElementById('exportDateDebut').value = debut;
    document.getElementById('exportDateFin').value = fin;
}

function doExport(type, classeId, dateDebut, dateFin, format) {
    if (format === 'excel') {
        if (type === 'presences') doExportPresencesExcel(classeId, dateDebut, dateFin);
        else if (type === 'evaluations') doExportEvaluationsExcel(classeId, dateDebut, dateFin);
        else if (type === 'assiduite') doExportAssiduiteExcel(classeId, dateDebut, dateFin);
        else if (type === 'fichepaye') doExportFichePayeExcel(classeId, dateDebut, dateFin);
    } else if (format === 'word' || format === 'pdf') {
        if (type === 'presences') doExportPresencesDoc(classeId, dateDebut, dateFin, format);
        else if (type === 'evaluations') doExportEvaluationsDoc(classeId, dateDebut, dateFin, format);
        else if (type === 'assiduite') doExportAssiduiteDoc(classeId, dateDebut, dateFin, format);
        else if (type === 'fichepaye') doExportFichePayeDoc(classeId, dateDebut, dateFin, format);
    }
}

// Export Présences Excel amélioré
function doExportPresencesExcel(classeId, dateDebut, dateFin) {
    var session = getSession();
    var classe = session.classes.find(function(c) { return c.id === classeId; });
    if (!classe) { notify('Classe non trouvée', 'error'); return; }
    
    var seances = (session.seances || []).filter(function(s) { 
        if (s.classeId !== classeId) return false;
        if (dateDebut && s.date < dateDebut) return false;
        if (dateFin && s.date > dateFin) return false;
        return true;
    }).sort(function(a,b) { return a.date.localeCompare(b.date); });

// Télécharger document Word ou PDF
function downloadDocument(html, filename, format) {
    if (format === 'word') {
        var blob = new Blob(['\\ufeff' + html], { type: 'application/msword' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = filename.replace(/[^a-zA-Z0-9]/g, '_') + '.doc';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        notify('Document Word téléchargé !', 'success');
    } else if (format === 'pdf') {
        // Ouvrir dans une nouvelle fenêtre pour impression PDF
        var printWindow = window.open('', '_blank');
        printWindow.document.write(html);
        printWindow.document.close();
        setTimeout(function() {
            printWindow.print();
        }, 500);
        notify('Fenêtre d\'impression ouverte - Choisissez "Enregistrer en PDF"', 'info');
    }
}

function doExportFichePayeExcel(profId, dateDebut, dateFin) {

    if (!prof) return;
    
    var profIdStr = String(profId);
    var profClasses = session.classes.filter(function(c) { return c.profId && String(c.profId) === profIdStr; });

        var seances = (session.seances || []).filter(function(s) { 
            if (String(s.classeId) !== String(c.id) || s.statut !== 'done') return false;
            if (dateDebut && s.date < dateDebut) return false;
            if (dateFin && s.date > dateFin) return false;
            return true;
        });
        seances.forEach(function(s) { allSeances.push({ seance: s, classe: c }); });

    ];
    
    var totalMontant = 0, totalHeures = 0;
    
    allSeances.forEach(function(item) {
        var s = item.seance;
        var c = item.classe;
        var taux = parseInt(s.tauxHoraire) || parseInt(c.tauxHoraire) || DB.settings.tauxHoraire || 5000;
        var heures = parseFloat(s.heures) || 2;
        var montant = Math.round(heures * taux);
        totalMontant += montant;
        totalHeures += heures;
        
        detailData.push([
            formatDate(s.date),
            c.nom,
            (s.heureDebut || '-') + ' - ' + (s.heureFin || '-'),

function doExportFichePayeDoc(profId, dateDebut, dateFin, format) {
    var session = getSession();
    var prof = session.professeurs.find(function(p) { return String(p.id) === String(profId); });
    if (!prof) return;
    
    var profIdStr = String(profId);
    var profClasses = session.classes.filter(function(c) { return c.profId && String(c.profId) === profIdStr; });
    
    var allSeances = [];
    profClasses.forEach(function(c) {
        var seances = (session.seances || []).filter(function(s) { 
            if (String(s.classeId) !== String(c.id) || s.statut !== 'done') return false;
            if (dateDebut && s.date < dateDebut) return false;
            if (dateFin && s.date > dateFin) return false;
            return true;
        });
        seances.forEach(function(s) { allSeances.push({ seance: s, classe: c }); });
    });
    
    allSeances.sort(function(a, b) { return (a.seance.date || '').localeCompare(b.seance.date || ''); });
    
    var totalMontant = 0, totalHeures = 0;
    allSeances.forEach(function(item) {
        var taux = parseInt(item.seance.tauxHoraire) || parseInt(item.classe.tauxHoraire) || DB.settings.tauxHoraire || 5000;
        var heures = parseFloat(item.seance.heures) || 2;
        totalMontant += Math.round(heures * taux);

    html += '<div class="stat-card"><div class="value">' + totalHeures + 'h</div><div class="label">Heures totales</div></div>';
    html += '<div class="stat-card success"><div class="value" style="color:#28a745;">' + totalMontant.toLocaleString() + '</div><div class="label">Montant total (KMF)</div></div>';
    html += '</div>';
    
    // Tableau détaillé
    html += '<table><thead><tr><th>Date</th><th>Classe</th><th>Horaires</th><th style="text-align:center;">Heures</th><th style="text-align:right;">Taux</th><th style="text-align:right;">Montant</th></tr></thead><tbody>';
    
    allSeances.forEach(function(item) {
        var s = item.seance;
        var c = item.classe;
        var taux = parseInt(s.tauxHoraire) || parseInt(c.tauxHoraire) || DB.settings.tauxHoraire || 5000;
        var heures = parseFloat(s.heures) || 2;
        var montant = Math.round(heures * taux);
        
        html += '<tr>';
        html += '<td>' + formatDate(s.date) + '</td>';
        html += '<td>' + c.nom + '</td>';
        html += '<td>' + (s.heureDebut || '-') + ' - ' + (s.heureFin || '-') + '</td>';

        html += '<td style="text-align:right;">' + taux.toLocaleString() + ' KMF</td>';
        html += '<td style="text-align:right;font-weight:bold;">' + montant.toLocaleString() + ' KMF</td>';
        html += '</tr>';
    });

    html += '<td></td>';
    html += '<td style="text-align:right;font-size:14pt;"><strong>' + totalMontant.toLocaleString() + ' KMF</strong></td>';

// ========== EXPORT TOUTES LES PRÉSENCES ==========
function exportAllPresences() {
    var session = getSession();
    if (!session) {
        notify('Aucune session sélectionnée', 'error');
        return;
    }
    
    var classes = session.classes || [];
    if (classes.length === 0) {
        notify('Aucune classe dans cette session', 'error');
        return;
    }
    
    var wb = XLSX.utils.book_new();
    var today = new Date().toISOString().split('T')[0];
    
    // Feuille récapitulative
    var recap = [
        ['RÉCAPITULATIF DES PRÉSENCES'],
        ['Session: ' + session.nom],
        ['Date export: ' + today],
        [''],
        ['Classe', 'Niveau', 'Formateur', 'Apprenants', 'Séances', 'Taux assiduité moyen']
    ];
    
    // Pour chaque classe, créer une feuille
    classes.forEach(function(classe) {
        var apprenants = (session.apprenants || []).filter(function(a) { return a.classeId === classe.id; });
        var seances = (session.seances || []).filter(function(s) { return s.classeId === classe.id && s.presences; });
        var prof = session.professeurs.find(function(p) { return String(p.id) === String(classe.profId); });
        
        if (apprenants.length === 0) return;
        
        // Calculer les présences par apprenant
        var presenceData = [];
        var totalAssiduity = 0;
        
        apprenants.forEach(function(app) {
            var totalP = 0, totalA = 0, totalR = 0;
            
            seances.forEach(function(seance) {
                var status = seance.presences[app.id];
                if (status === 'P') totalP++;
                else if (status === 'A') totalA++;
                else if (status === 'R') totalR++;
            });
            
            var total = totalP + totalA + totalR;
            var assiduity = total > 0 ? Math.round((totalP + totalR * 0.5) / total * 100) : 0;
            totalAssiduity += assiduity;
            
            presenceData.push({
                nom: app.nom,
                prenom: app.prenom || '',
                presents: totalP,
                absents: totalA,
                retards: totalR,
                total: total,
                assiduity: assiduity
            });
        });
        
        var moyenneAssiduity = apprenants.length > 0 ? Math.round(totalAssiduity / apprenants.length) : 0;
        
        // Ajouter au récap
        recap.push([
            classe.nom,
            classe.niveau || '',
            prof ? prof.nom : '',
            apprenants.length,
            seances.length,
            moyenneAssiduity + '%'
        ]);
        
        // Créer la feuille de la classe
        var classData = [
            ['PRÉSENCES - ' + classe.nom],
            ['Niveau: ' + (classe.niveau || '')],
            ['Formateur: ' + (prof ? prof.nom : '')],
            ['Séances effectuées: ' + seances.length],
            [''],
            ['Nom', 'Prénom', 'Présents', 'Absents', 'Retards', 'Total', 'Assiduité']
        ];
        
        presenceData.forEach(function(p) {
            classData.push([p.nom, p.prenom, p.presents, p.absents, p.retards, p.total, p.assiduity + '%']);
        });
        
        classData.push(['']);
        classData.push(['MOYENNE CLASSE', '', '', '', '', '', moyenneAssiduity + '%']);
        
        // Ajouter le détail des séances
        classData.push(['']);
        classData.push(['DÉTAIL DES SÉANCES']);
        
        var seanceHeaders = ['Apprenant'];
        seances.slice(0, 50).forEach(function(s) { // Max 50 séances pour éviter les feuilles trop larges
            seanceHeaders.push(s.date);
        });
        classData.push(seanceHeaders);
        
        apprenants.forEach(function(app) {
            var row = [app.nom + ' ' + (app.prenom || '')];
            seances.slice(0, 50).forEach(function(seance) {
                row.push(seance.presences[app.id] || '-');
            });
            classData.push(row);
        });
        
        // Nettoyer le nom de la feuille (max 31 caractères, pas de caractères spéciaux)
        var sheetName = classe.nom.replace(/[\\/*?:\[\]]/g, '').substring(0, 28);
        var ws = XLSX.utils.aoa_to_sheet(classData);
        XLSX.utils.book_append_sheet(wb, ws, sheetName);
    });
    
    // Ajouter la feuille récap en premier
    var wsRecap = XLSX.utils.aoa_to_sheet(recap);
    wb.SheetNames.unshift('RÉCAPITULATIF');
    wb.Sheets['RÉCAPITULATIF'] = wsRecap;
    
    XLSX.writeFile(wb, 'Presences_Toutes_Classes_' + today + '.xlsx');
    notify(classes.length + ' classes exportées !', 'success');
}

// ========== EXPORT TOUTES LES ÉVALUATIONS ==========
function exportAllEvaluations() {
    var session = getSession();
    if (!session) {
        notify('Aucune session sélectionnée', 'error');
        return;
    }
    
    var classes = session.classes || [];
    if (classes.length === 0) {
        notify('Aucune classe dans cette session', 'error');
        return;
    }
    
    var wb = XLSX.utils.book_new();
    var today = new Date().toISOString().split('T')[0];
    
    // Feuille récapitulative
    var recap = [
        ['RÉCAPITULATIF DES ÉVALUATIONS'],
        ['Session: ' + session.nom],
        ['Date export: ' + today],
        [''],
        ['Classe', 'Niveau', 'Formateur', 'Apprenants', 'Évaluations', 'Moyenne générale']
    ];
    
    // Pour chaque classe
    classes.forEach(function(classe) {
        var apprenants = (session.apprenants || []).filter(function(a) { return a.classeId === classe.id; });
        var evaluations = classe.evaluations || [];
        var prof = session.professeurs.find(function(p) { return String(p.id) === String(classe.profId); });
        
        if (apprenants.length === 0) return;
        
        // Calculer les moyennes
        var classData = [
            ['ÉVALUATIONS - ' + classe.nom],
            ['Niveau: ' + (classe.niveau || '')],
            ['Formateur: ' + (prof ? prof.nom : '')],
            ['']
        ];
        
        // En-têtes avec les compétences
        var competences = ['CE', 'CO', 'PE', 'PO'];
        var headers = ['Nom', 'Prénom'];
        
        evaluations.forEach(function(ev) {
            competences.forEach(function(comp) {
                headers.push(ev.nom + ' - ' + comp);
            });
            headers.push(ev.nom + ' - Total');
        });
        headers.push('MOYENNE GÉNÉRALE');
        
        classData.push(headers);
        
        var totalClassAvg = 0;
        var countAvg = 0;
        
        apprenants.forEach(function(app) {
            var row = [app.nom, app.prenom || ''];
            var totalApp = 0;
            var countApp = 0;
            
            evaluations.forEach(function(ev) {
                var notes = ev.notes ? ev.notes[app.id] : null;
                var evalTotal = 0;
                
                competences.forEach(function(comp) {
                    var note = notes ? (notes[comp] || 0) : 0;
                    row.push(note);
                    evalTotal += parseFloat(note) || 0;
                });
                
                row.push(evalTotal);
                if (notes) {
                    totalApp += evalTotal;
                    countApp++;
                }
            });
            
            var moyApp = countApp > 0 ? Math.round(totalApp / countApp * 10) / 10 : 0;
            row.push(moyApp);
            totalClassAvg += moyApp;
            if (moyApp > 0) countAvg++;
            
            classData.push(row);
        });
        
        var moyenneClasse = countAvg > 0 ? Math.round(totalClassAvg / countAvg * 10) / 10 : 0;
        
        // Ajouter au récap
        recap.push([
            classe.nom,
            classe.niveau || '',
            prof ? prof.nom : '',
            apprenants.length,
            evaluations.length,
            moyenneClasse + '/100'
        ]);
        
        // Nettoyer le nom de la feuille
        var sheetName = classe.nom.replace(/[\\/*?:\[\]]/g, '').substring(0, 28);
        var ws = XLSX.utils.aoa_to_sheet(classData);
        XLSX.utils.book_append_sheet(wb, ws, sheetName);
    });
    
    // Ajouter la feuille récap en premier
    var wsRecap = XLSX.utils.aoa_to_sheet(recap);
    wb.SheetNames.unshift('RÉCAPITULATIF');
    wb.Sheets['RÉCAPITULATIF'] = wsRecap;
    
    XLSX.writeFile(wb, 'Evaluations_Toutes_Classes_' + today + '.xlsx');
    notify(classes.length + ' classes exportées !', 'success');
}

function importAllData(event) {
    var file = event.target.files[0];
    if (!file) return;
    
    var reader = new FileReader();
    reader.onload = function(e) {
        try {
            var imported = JSON.parse(e.target.result);
            
            // Vérifier si c'est un format valide
            if (imported.data && imported.data.sessions) {
                // Demander confirmation
                if (confirm('⚠️ ATTENTION: Cette action va REMPLACER toutes vos données actuelles par les données importées.\n\nÊtes-vous sûr de vouloir continuer ?')) {
                    DB = imported.data;
                    save();
                    document.getElementById('importExportStatus').innerHTML = '<p style="color:var(--success);">✅ Données importées avec succès ! Rechargement...</p>';
                    notify('Données importées', 'success');
                    setTimeout(function() { location.reload(); }, 1500);
                }
            } else if (imported.sessions) {
                // Format direct (sans wrapper)
                if (confirm('⚠️ ATTENTION: Cette action va REMPLACER toutes vos données actuelles par les données importées.\n\nÊtes-vous sûr de vouloir continuer ?')) {
                    DB = imported;
                    save();
                    document.getElementById('importExportStatus').innerHTML = '<p style="color:var(--success);">✅ Données importées avec succès ! Rechargement...</p>';
                    notify('Données importées', 'success');
                    setTimeout(function() { location.reload(); }, 1500);
                }
            } else {
                document.getElementById('importExportStatus').innerHTML = '<p style="color:var(--danger);">❌ Format de fichier invalide</p>';
                notify('Format invalide', 'error');
            }
        } catch (err) {
            document.getElementById('importExportStatus').innerHTML = '<p style="color:var(--danger);">❌ Erreur: ' + err.message + '</p>';
            notify('Erreur d\'importation', 'error');
        }
    };
    reader.readAsText(file);
    event.target.value = ''; // Reset input
}
