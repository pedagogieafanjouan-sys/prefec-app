function syncFromCloud() {
    var url = DB.settings.syncUrl;
    if (!url) {
        notify('URL de synchronisation non configurée', 'error');
        return;
    }
    
    // Fonction pour normaliser les dates (extraire YYYY-MM-DD en heure locale Comores UTC+3)
    function normalizeDate(dateStr) {
        if (!dateStr) return '';
        dateStr = String(dateStr);
        
        // Format ISO: 2026-03-30T21:00:00.000Z → convertir en heure locale
        if (dateStr.includes('T') && dateStr.includes('Z')) {
            // Convertir UTC en heure locale (Comores = UTC+3)
            var d = new Date(dateStr);
            var y = d.getFullYear();
            var m = String(d.getMonth() + 1).padStart(2, '0');
            var day = String(d.getDate()).padStart(2, '0');
            return y + '-' + m + '-' + day;
        }
        // Format ISO sans Z (déjà local)
        if (dateStr.includes('T')) {
            return dateStr.split('T')[0];
        }
        // Format DD/MM/YYYY → YYYY-MM-DD
        if (dateStr.match(/^\d{2}\/\d{2}\/\d{4}$/)) {
            var parts = dateStr.split('/');
            return parts[2] + '-' + parts[1] + '-' + parts[0];
        }
        // Déjà au format YYYY-MM-DD
        if (dateStr.match(/^\d{4}-\d{2}-\d{2}/)) {
            return dateStr.substring(0, 10);
        }
        return dateStr;
    }
    
    document.getElementById('syncStatus').innerHTML = '<p style="color:var(--info);">🔄 Récupération des données...</p>';
    
    fetch(url + '?action=getAll')
        .then(function(r) { return r.json(); })
        .then(function(result) {
            if (result.success && result.data) {
                var imported = { presences: 0, evaluations: 0, suivis: 0 };
                var debug = { classesFound: 0, apprenantsFound: 0, seancesFound: 0, sessionsFound: 0 };
                
                // Fonction pour trouver la session par nom OU par date
                function findSession(sessionValue) {
                    if (!sessionValue) return null;
                    sessionValue = String(sessionValue).trim();
                    
                    // Si c'est une date ISO (ex: 2026-02-28T21:00:00.000Z), convertir en nom de mois
                    if (sessionValue.includes('T') || sessionValue.match(/^\d{4}-\d{2}-\d{2}/)) {
                        var d = new Date(sessionValue);
                        var mois = ['Janvier', 'Février', 'Mars', 'Avril', 'Mai', 'Juin', 
                                    'Juillet', 'Août', 'Septembre', 'Octobre', 'Novembre', 'Décembre'];
                        var nomMois = mois[d.getMonth()];
                        var annee = d.getFullYear();
                        var sessionNomAttendu = nomMois + ' ' + annee; // ex: "Mars 2026"
                        
                        // Chercher une session qui correspond (insensible à la casse)
                        return DB.sessions.find(function(s) {
                            if (!s.nom) return false;
                            return s.nom.trim().toLowerCase() === sessionNomAttendu.toLowerCase();
                        });
                    }
                    
                    // Sinon, chercher par nom direct
                    return DB.sessions.find(function(s) {
                        return s.nom && s.nom.trim().toLowerCase() === sessionValue.toLowerCase();
                    });
                }
                
                // Importer les présences (recherche par SESSION + date + classe + apprenant)
                if (result.data.presences) {
                    result.data.presences.forEach(function(p) {
                        var sessionP = (p.Session || '').trim();
                        var dateP = normalizeDate(p.Date || p.date || '');
                        var classeP = (p.Classe || p.classeNom || '').trim();
                        var eleveP = (p.Eleve || p.apprenantNom || '').trim();
                        var statutP = p.Statut || p.statut || 'present';
                        
                        // Si pas de données complètes, ignorer
                        if (!classeP || !eleveP || !dateP) return;
                        
                        // Trouver la session correspondante
                        var sess = findSession(sessionP);
                        if (!sess) return;
                        debug.sessionsFound++;
                        
                        // Trouver la classe par nom dans CETTE session
                        var classe = sess.classes.find(function(c) { 
                            return c.nom.trim().toLowerCase() === classeP.toLowerCase(); 
                        });
                        if (!classe) return;
                        debug.classesFound++;
                        
                        // Trouver l'apprenant par nom
                        var apprenant = sess.apprenants.find(function(a) { 
                            return a.nom.trim().toLowerCase() === eleveP.toLowerCase() && 
                                   String(a.classeId) === String(classe.id); 
                        });
                        if (!apprenant) return;
                        debug.apprenantsFound++;
                        
                        // Trouver la séance par date et classe
                        var seance = sess.seances.find(function(s) { 
                            var seanceDate = normalizeDate(s.date);
                            return seanceDate === dateP && String(s.classeId) === String(classe.id); 
                        });
                        if (seance) {
                            debug.seancesFound++;
                            if (!seance.presences) seance.presences = {};
                            seance.presences[apprenant.id] = statutP.toLowerCase();
                            imported.presences++;
                        }
                    });
                }
                
                // Importer les évaluations (recherche par SESSION + classe + eval + apprenant)
                if (result.data.evaluations) {
                    result.data.evaluations.forEach(function(ev) {
                        var sessionE = (ev.Session || '').trim();
                        var classeE = (ev.Classe || ev.classeNom || '').trim();
                        var evalE = (ev.Evaluation || ev.evalNom || '').trim();
                        var eleveE = (ev.Eleve || ev.apprenantNom || '').trim();
                        var notesE = ev.Note || ev.Notes || ev.notes || '';
                        
                        if (!classeE || !eleveE || !evalE) return;
                        
                        // Si Session spécifiée, chercher dans cette session, sinon chercher dans toutes
                        var sessionsToSearch = sessionE ? [findSession(sessionE)].filter(Boolean) : DB.sessions;
                        
                        sessionsToSearch.forEach(function(sess) {
                            if (!sess) return;
                            
                            var classe = sess.classes.find(function(c) { 
                                return c.nom.trim().toLowerCase() === classeE.toLowerCase(); 
                            });
                            if (!classe || !classe.evaluations) return;
                            
                            var apprenant = sess.apprenants.find(function(a) { 
                                return a.nom.trim().toLowerCase() === eleveE.toLowerCase() && 
                                       String(a.classeId) === String(classe.id); 
                            });
                            if (!apprenant) return;
                            
                            var evaluation = classe.evaluations.find(function(e) { 
                                return e.nom.trim().toLowerCase() === evalE.toLowerCase(); 
                            });
                            if (evaluation) {
                                if (!evaluation.notes) evaluation.notes = {};
                                evaluation.notes[apprenant.id] = notesE;
                                imported.evaluations++;
                            }
                        });
                    });
                }
                
                // Importer les suivis (recherche par SESSION + date + classe)
                if (result.data.suivis) {
                    result.data.suivis.forEach(function(sv) {
                        var sessionS = (sv.Session || '').trim();
                        var dateS = normalizeDate(sv.Date || sv.date || '');
                        var classeS = (sv.Classe || sv.classeNom || '').trim();
                        
                        if (!classeS || !dateS) return;
                        
                        // Si Session spécifiée, chercher dans cette session, sinon chercher dans toutes
                        var sessionsToSearch = sessionS ? [findSession(sessionS)].filter(Boolean) : DB.sessions;
                        
                        sessionsToSearch.forEach(function(sess) {
                            if (!sess) return;
                            
                            var classe = sess.classes.find(function(c) { 
                                return c.nom.trim().toLowerCase() === classeS.toLowerCase(); 
                            });
                            if (!classe) return;
                            
                            var seance = sess.seances.find(function(se) { 
                                var seanceDate = normalizeDate(se.date);
                                return seanceDate === dateS && String(se.classeId) === String(classe.id); 
                            });
                            if (seance) {
                                seance.ficheObjectifs = sv.Objectifs || sv.objectifs || seance.ficheObjectifs;
                                seance.ficheContenu = sv.Contenu || sv.contenu || seance.ficheContenu;
                                seance.ficheObservations = sv.Observations || sv.observations || seance.ficheObservations;
                                imported.suivis++;
                            }
                        });
                    });
                }
                
                save();
                // Afficher debug directement dans l'interface
                var debugInfo = '<p style="color:var(--success);">✅ Importé: ' + imported.presences + ' présences, ' + imported.evaluations + ' notes, ' + imported.suivis + ' suivis</p>';
                debugInfo += '<details style="margin-top:10px;padding:10px;background:#f5f5f5;border-radius:5px;"><summary style="cursor:pointer;font-weight:bold;">🔍 Debug info (cliquez pour voir)</summary>';
                debugInfo += '<p style="margin:5px 0;"><strong>Sessions trouvées:</strong> ' + debug.sessionsFound + '</p>';
                debugInfo += '<p style="margin:5px 0;"><strong>Classes trouvées:</strong> ' + debug.classesFound + '</p>';
                debugInfo += '<p style="margin:5px 0;"><strong>Apprenants trouvés:</strong> ' + debug.apprenantsFound + '</p>';
                debugInfo += '<p style="margin:5px 0;"><strong>Séances trouvées:</strong> ' + debug.seancesFound + '</p>';
                debugInfo += '<p style="margin:5px 0;"><strong>Données cloud:</strong> ' + (result.data.presences ? result.data.presences.length : 0) + ' présences</p>';
                if (result.data.presences && result.data.presences.length > 0) {
                    var sample = result.data.presences[0];
                    var sampleDateNormalized = normalizeDate(sample.Date || '');
                    // Convertir la session date en nom
                    var sampleSession = sample.Session || '';
                    var sampleSessionConverted = sampleSession;
                    if (sampleSession && (sampleSession.includes('T') || sampleSession.match(/^\d{4}-\d{2}-\d{2}/))) {
                        var d = new Date(sampleSession);
                        var mois = ['Janvier', 'Février', 'Mars', 'Avril', 'Mai', 'Juin', 
                                    'Juillet', 'Août', 'Septembre', 'Octobre', 'Novembre', 'Décembre'];
                        sampleSessionConverted = mois[d.getMonth()] + ' ' + d.getFullYear();
                    }
                    debugInfo += '<p style="margin:5px 0;font-size:12px;"><strong>Exemple cloud:</strong> Session="' + sampleSession + '" → "' + sampleSessionConverted + '"</p>';
                    debugInfo += '<p style="margin:5px 0;font-size:12px;"><strong>Classe:</strong> "' + (sample.Classe || '') + '", Eleve: "' + (sample.Eleve || '') + '"</p>';
                    debugInfo += '<p style="margin:5px 0;font-size:12px;"><strong>Date cloud:</strong> "' + (sample.Date || '') + '" → normalisée: "' + sampleDateNormalized + '"</p>';
                }
                // Afficher les sessions et séances disponibles dans PREFEC
                var localSessions = DB.sessions.map(function(s) { return s.nom; });
                var localClasses = [];
                var seances2026 = [];
                DB.sessions.forEach(function(sess) {
                    sess.classes.forEach(function(c) { localClasses.push(sess.nom + ' → ' + c.nom); });
                    sess.seances.forEach(function(s) { 
                        if (s.date && s.date.startsWith('2026')) {
                            var seanceInfo = s.date + ' (' + (sess.classes.find(function(c){return String(c.id)===String(s.classeId);}) || {nom:'?'}).nom + ')';
                            seances2026.push(seanceInfo);
                        }
                    });
                });
                debugInfo += '<p style="margin:5px 0;font-size:12px;"><strong>Sessions dans PREFEC:</strong> ' + (localSessions.length > 0 ? localSessions.join(', ') : 'AUCUNE') + '</p>';
                debugInfo += '<p style="margin:5px 0;font-size:12px;"><strong>Classes (session → classe):</strong> ' + (localClasses.length > 0 ? localClasses.slice(0,5).join(', ') : 'AUCUNE') + '</p>';
                debugInfo += '<p style="margin:5px 0;font-size:12px;"><strong>Séances 2026:</strong> ' + (seances2026.length > 0 ? seances2026.slice(0,5).join(', ') : 'AUCUNE') + '</p>';
                debugInfo += '</details>';
                document.getElementById('syncStatus').innerHTML = debugInfo;
                notify('Synchronisation réussie', 'success');
            } else {
                document.getElementById('syncStatus').innerHTML = '<p style="color:var(--warning);">⚠️ Aucune donnée à synchroniser</p>';
            }
        })
        .catch(function(err) {
            document.getElementById('syncStatus').innerHTML = '<p style="color:var(--danger);">❌ Erreur: ' + err.message + '</p>';
            notify('Erreur de synchronisation', 'error');
        });
}

    html += '<option value="reste"' + (inscSortBy === 'reste' ? ' selected' : '') + '>Reste à payer</option>';

    html += '</div></div></div>';

    var data = session.apprenants.map(function(a) {
        var c = session.classes.find(function(cl) { return cl.id === a.classeId; });

            default: va = a.nomComplet; vb = b.nomComplet;
        }
        if (inscSortOrder === 'asc') return va < vb ? -1 : va > vb ? 1 : 0;
        return va > vb ? -1 : va < vb ? 1 : 0;

    var grouped = {};

            if (!grouped[key]) grouped[key] = [];

    } else {

    // Générer le HTML
    Object.keys(grouped).forEach(function(group) {

        grouped[group].forEach(function(d) {

            var statutText = d.statut === 'payé' ? '✅ Payé' : d.statut === 'partiel' ? '⏳ Partiel' : '❌ Impayé';
            
            html += '<tr>';

            html += '<td style="font-size:0.85rem;">' + (d.eleve.telephone || '-') + '</td>';

// ===== GÉNÉRATION DE REÇU PDF =====
function generateRecuPDF(eleveId) {
    var session = getSession();
    var eleve = session.apprenants.find(function(a) { return a.id === eleveId; });
    if (!eleve) { notify('Élève non trouvé', 'error'); return; }
    
    var insc = (DB.inscriptions || []).find(function(i) { return i.eleveId === eleveId; });
    var classe = session.classes.find(function(c) { return c.id === eleve.classeId; });
    var centre = (DB.settings.centres || []).find(function(c) { return c.id === eleve.centreId; });
    
    var tarif = insc ? insc.tarif : 0;
    var paye = insc ? insc.montantPaye : 0;
    var reste = tarif - paye;
    var nomComplet = (eleve.prenom ? eleve.nom + ' ' + eleve.prenom : eleve.nom).toUpperCase();
    var numRecu = 'R-' + (eleve.matricule || '').replace('MAT-', '') + '-' + new Date().getTime().toString().slice(-4);
    var dateRecu = new Date().toLocaleDateString('fr-FR');
    
    var recuHTML = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Reçu ' + numRecu + '</title>';

function openInscriptionModal() {
    var session = getSession();
    var centres = DB.settings.centres || [];
    var categories = DB.settings.categoriesCours || [];
    
    var centresOpts = '<option value="">-- Sélectionner --</option>';
    centres.forEach(function(c) {
        centresOpts += '<option value="' + c.id + '">' + c.nom + '</option>';
    });
    
    var classesOpts = '<option value="">-- Sélectionner --</option>';
    session.classes.forEach(function(c) {
        classesOpts += '<option value="' + c.id + '">' + c.nom + ' (' + c.niveau + ')</option>';
    });
    
    var catsOpts = categories.map(function(cat) {
        return '<option value="' + cat.id + '" data-tarif="' + cat.tarif + '">' + cat.nom + ' - ' + formatMoney(cat.tarif) + '</option>';
    }).join('');
    
    var content = '<div class="form-grid">' +
        '<div class="form-group"><label>Nom *</label><input type="text" id="inscNom"></div>' +
        '<div class="form-group"><label>Prénom *</label><input type="text" id="inscPrenom"></div>' +
        '<div class="form-group"><label>📞 Téléphone</label><input type="tel" id="inscTel"></div>' +
        '<div class="form-group"><label>🎂 Date naissance</label><input type="date" id="inscNaissance"></div>' +
        '<div class="form-group"><label>🏢 Centre</label><select id="inscCentre">' + centresOpts + '</select></div>' +
        '<div class="form-group"><label>📍 Ville</label><input type="text" id="inscVille"></div>' +
        '<div class="form-group"><label>📚 Catégorie</label><select id="inscCategorie" onchange="updateInscTarif()">' + catsOpts + '</select></div>' +
        '<div class="form-group"><label>💰 Tarif (KMF)</label><input type="number" id="inscTarif" value="' + (categories[0] ? categories[0].tarif : 25000) + '"></div>' +
        '<div class="form-group full-width"><label>📚 Classe</label><select id="inscClasse">' + classesOpts + '</select></div>' +
        '<div class="form-group"><label>💵 Montant payé</label><input type="number" id="inscPaye" value="0"></div>' +
        '<div class="form-group"><label>📅 Date paiement</label><input type="date" id="inscDatePaie" value="' + new Date().toISOString().slice(0,10) + '"></div>' +
        '</div>';
    
    showModal('➕ Nouvelle inscription', content, function() {
        var nom = document.getElementById('inscNom').value.trim();
        var prenom = document.getElementById('inscPrenom').value.trim();
        var classeId = document.getElementById('inscClasse').value;
        
        if (!nom || !classeId) {
            notify('Nom et classe requis', 'error');
            return;
        }
        
        // Créer l'élève
        var eleveId = genId();
        var dateNaissance = document.getElementById('inscNaissance').value;
        var age = null;
        if (dateNaissance) {
            var today = new Date();
            var birth = new Date(dateNaissance);
            age = today.getFullYear() - birth.getFullYear();
        }
        
        var eleve = {
            id: eleveId,
            matricule: 'MAT-' + Date.now().toString().slice(-6),
            nom: nom,
            prenom: prenom,
            telephone: document.getElementById('inscTel').value.trim(),
            dateNaissance: dateNaissance,
            age: age,
            ville: document.getElementById('inscVille').value.trim(),
            centreId: document.getElementById('inscCentre').value,
            classeId: classeId,
            dateInscription: new Date().toISOString().slice(0, 10)
        };
        
        session.apprenants.push(eleve);
        
        // Créer l'inscription
        var tarif = parseInt(document.getElementById('inscTarif').value) || 0;
        var paye = parseInt(document.getElementById('inscPaye').value) || 0;
        
        if (!DB.inscriptions) DB.inscriptions = [];
        DB.inscriptions.push({
            id: genId(),
            eleveId: eleveId,
            sessionId: session.id,
            classeId: classeId,
            categorie: document.getElementById('inscCategorie').value,
            tarif: tarif,
            montantPaye: paye,
            datePaiement: paye > 0 ? document.getElementById('inscDatePaie').value : null,
            statut: paye >= tarif ? 'payé' : paye > 0 ? 'partiel' : 'impayé',
            dateInscription: new Date().toISOString().slice(0, 10)
        });
        
        // Ajouter à la caisse si paiement
        if (paye > 0) {
            if (!DB.caisse) DB.caisse = [];
            DB.caisse.push({
                id: genId(),
                date: document.getElementById('inscDatePaie').value,
                type: 'entree',
                categorie: 'Inscription',
                description: 'Inscription ' + nom + ' ' + prenom,
                montant: paye,
                centreId: document.getElementById('inscCentre').value
            });
        }
        
        save();
        closeModal();
        renderInscriptions();
        updateAll();
        notify('Inscription enregistrée !', 'success');
    });
}

function updateInscTarif() {
    var select = document.getElementById('inscCategorie');
    var option = select.options[select.selectedIndex];
    if (option && option.dataset.tarif) {
        document.getElementById('inscTarif').value = option.dataset.tarif;
    }
}

function openPaiementModal(eleveId) {
    var session = getSession();
    var eleve = session.apprenants.find(function(a) { return a.id === eleveId; });
    if (!eleve) return;
    
    var insc = (DB.inscriptions || []).find(function(i) { return i.eleveId === eleveId; });
    var tarif = insc ? insc.tarif : 25000;
    var dejaPaye = insc ? insc.montantPaye : 0;
    var reste = tarif - dejaPaye;
    
    var nomComplet = eleve.prenom ? eleve.nom + ' ' + eleve.prenom : eleve.nom;
    
    var content = '<div style="background:var(--gray-100);padding:15px;border-radius:10px;margin-bottom:20px;">';
    content += '<h4>' + nomComplet + '</h4>';
    content += '<p>Tarif: <strong>' + formatMoney(tarif) + '</strong></p>';
    content += '<p>Déjà payé: <strong style="color:var(--success);">' + formatMoney(dejaPaye) + '</strong></p>';
    content += '<p>Reste à payer: <strong style="color:' + (reste > 0 ? 'var(--danger)' : 'var(--success)') + ';">' + formatMoney(reste) + '</strong></p>';
    content += '</div>';
    
    content += '<div class="form-grid">';
    content += '<div class="form-group"><label>💵 Montant du paiement</label><input type="number" id="paieMontant" value="' + reste + '"></div>';
    content += '<div class="form-group"><label>📅 Date</label><input type="date" id="paieDate" value="' + new Date().toISOString().slice(0,10) + '"></div>';
    content += '</div>';
    
    showModal('💰 Enregistrer paiement', content, function() {
        var montant = parseInt(document.getElementById('paieMontant').value) || 0;
        if (montant <= 0) {
            notify('Montant invalide', 'error');
            return;
        }
        
        if (!DB.inscriptions) DB.inscriptions = [];
        
        if (!insc) {
            // Créer l'inscription si elle n'existe pas
            insc = {
                id: genId(),
                eleveId: eleveId,
                sessionId: session.id,
                classeId: eleve.classeId,
                tarif: tarif,
                montantPaye: 0,
                dateInscription: new Date().toISOString().slice(0, 10)
            };
            DB.inscriptions.push(insc);
        }
        
        insc.montantPaye = (insc.montantPaye || 0) + montant;
        insc.datePaiement = document.getElementById('paieDate').value;
        insc.statut = insc.montantPaye >= insc.tarif ? 'payé' : 'partiel';
        
        // Ajouter à la caisse
        if (!DB.caisse) DB.caisse = [];
        DB.caisse.push({
            id: genId(),
            date: document.getElementById('paieDate').value,
            type: 'entree',
            categorie: 'Paiement inscription',
            description: 'Paiement ' + nomComplet,
            montant: montant,
            centreId: eleve.centreId
        });
        
        save();
        closeModal();
        renderInscriptions();
        notify('Paiement enregistré !', 'success');
    });
}

    renderInscriptions();

// ===== RAPPORTS =====
var currentRapportTab = 'rapEffectifs';

function renderRapports() {
    var html = '';
    switch (currentRapportTab) {
        case 'rapSession': html = renderRapportSession(); break;
        case 'rapEffectifs': html = renderRapportEffectifs(); break;
        case 'rapAge': html = renderRapportAge(); break;
        case 'rapVille': html = renderRapportVille(); break;
        case 'rapGenre': html = renderRapportGenre(); break;
        case 'rapDebiteurs': html = renderRapportDebiteurs(); break;
        case 'rapCentre': html = renderRapportCentre(); break;
        default: html = renderRapportSession();
    }
    document.getElementById('rapportsContent').innerHTML = html;
}

function switchRapportTab(btn, tabId) {
    document.querySelectorAll('#section-rapports .tab').forEach(function(t) { t.classList.remove('active'); if(tabId === 'rapSession') t.style.background = ''; t.style.color = ''; });
    btn.classList.add('active');
    if (tabId === 'rapSession') { btn.style.background = 'var(--primary)'; btn.style.color = 'white'; }
    currentRapportTab = tabId;
    renderRapports();
}

// Fonctions de modification du rapport
function updateRapportItem(field, idx, value) {
    var session = getSession();
    if (session.rapportData && session.rapportData[field]) {
        session.rapportData[field][idx] = value;
    }
}

function addRapportItem(field) {
    var session = getSession();
    if (!session.rapportData) session.rapportData = {};
    if (!session.rapportData[field]) session.rapportData[field] = [];
    session.rapportData[field].push('Nouvel élément');
    save();
    renderRapports();
}

function removeRapportItem(field, idx) {
    var session = getSession();
    if (session.rapportData && session.rapportData[field]) {
        session.rapportData[field].splice(idx, 1);
        save();
        renderRapports();
    }
}

function updateRapportManuel(idx, key, value) {
    var session = getSession();
    if (session.rapportData && session.rapportData.manuels) {
        session.rapportData.manuels[idx][key] = value;
    }
}

function addRapportManuel() {
    var session = getSession();
    if (!session.rapportData) session.rapportData = {};
    if (!session.rapportData.manuels) session.rapportData.manuels = [];
    session.rapportData.manuels.push({ niveau: '', manuel: '' });
    save();
    renderRapports();
}

function removeRapportManuel(idx) {
    var session = getSession();
    if (session.rapportData && session.rapportData.manuels) {
        session.rapportData.manuels.splice(idx, 1);
        save();
        renderRapports();
    }
}

function saveRapportData() {
    var session = getSession();
    if (!session.rapportData) session.rapportData = {};
    
    // Récupérer les textareas
    var contexte = document.getElementById('rapportContexte');
    var objectifs = document.getElementById('rapportObjectifs');
    var recommandations = document.getElementById('rapportRecommandations');
    var perspectives = document.getElementById('rapportPerspectives');
    
    if (contexte) session.rapportData.contexte = contexte.value;
    if (objectifs) session.rapportData.objectifsAtteints = objectifs.value;
    if (recommandations) session.rapportData.recommandations = recommandations.value;
    if (perspectives) session.rapportData.perspectivesFutures = perspectives.value;
    
    save();
    notify('Rapport enregistré !', 'success');
}

function escapeHtml(text) {
    if (!text) return '';
    return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function calculateSessionReport(session) {
    var data = {
        nbClasses: session.classes.length,
        nbApprenants: session.apprenants.length,
        nbSeances: (session.seances || []).length,
        nbSeancesDone: 0,
        nbProfs: session.professeurs.length,
        totalHeures: 0,
        totalPresents: 0,
        totalRetards: 0,
        totalAbsents: 0,
        totalPresences: 0,
        classesDetails: [],
        topAbsents: [],
        evaluationsClasses: [],
        deroulementClasses: [],
        observations: [],
        niveaux: {},
        assiduitesClasses: [],
        moyennesClasses: [],
        effectifsClasses: []
    };
    
    // Calculer séances effectuées et heures
    (session.seances || []).forEach(function(s) {
        if (s.statut === 'done') {
            data.nbSeancesDone++;
            data.totalHeures += parseFloat(s.heures) || 2;
        }
    });
    data.totalHeures = Math.round(data.totalHeures);
    
    // Assiduité globale et par apprenant
    var apprenantAbsences = {};
    session.apprenants.forEach(function(a) {
        apprenantAbsences[a.id] = { nom: a.nom, classe: '', telephone: a.telephone, absences: 0, totalSeances: 0 };
    });
    
    // Calculer par classe
    session.classes.forEach(function(c) {
        var classeApprenants = session.apprenants.filter(function(a) { return a.classeId === c.id; });
        var classeSeances = (session.seances || []).filter(function(s) { return s.classeId === c.id; });
        var classeSeancesDone = classeSeances.filter(function(s) { return s.statut === 'done'; });
        
        var presences = 0, retards = 0, absences = 0;
        classeSeancesDone.forEach(function(s) {
            if (s.presences) {
                Object.keys(s.presences).forEach(function(aid) {
                    var statut = s.presences[aid];
                    if (statut === 'present' || statut === 'p') presences++;
                    else if (statut === 'retard' || statut === 'r') retards++;
                    else if (statut === 'absent' || statut === 'a') {
                        absences++;
                        if (apprenantAbsences[aid]) apprenantAbsences[aid].absences++;
                    }
                    if (apprenantAbsences[aid]) {
                        apprenantAbsences[aid].totalSeances++;
                        apprenantAbsences[aid].classe = c.nom;
                    }
                });
            }
        });
        
        var totalP = presences + retards + absences;
        var taux = totalP > 0 ? Math.round((presences + retards) / totalP * 100) : 0;
        
        data.totalPresents += presences;
        data.totalRetards += retards;
        data.totalAbsents += absences;
        
        var niv = c.niveau || 'Autre';
        if (!data.niveaux[niv]) data.niveaux[niv] = 0;
        data.niveaux[niv]++;
        
        // Prof de la classe
        var prof = session.professeurs.find(function(p) { return String(p.id) === String(c.profId); });
        
        // Dates première et dernière séance
        var seancesDates = classeSeancesDone.map(function(s) { return s.date; }).filter(Boolean).sort();
        
        // Évaluations
        var nbEvals = c.evaluations ? c.evaluations.length : 0;
        var notes = [];
        if (c.evaluations) {
            c.evaluations.forEach(function(ev) {
                if (ev.notes) {
                    Object.keys(ev.notes).forEach(function(aid) {
                        var n = ev.notes[aid];
                        if (typeof n === 'object') {
                            // Notes par compétence
                            var vals = Object.values(n).filter(function(v) { return !isNaN(parseFloat(v)); });
                            if (vals.length > 0) {
                                var avg = vals.reduce(function(a, b) { return a + parseFloat(b); }, 0) / vals.length;
                                notes.push(avg);
                            }
                        } else if (!isNaN(parseFloat(n))) {
                            notes.push(parseFloat(n));
                        }
                    });
                }
            });
        }
        var moyenneClasse = notes.length > 0 ? (notes.reduce(function(a, b) { return a + b; }, 0) / notes.length).toFixed(1) : 0;
        
        data.classesDetails.push({
            nom: c.nom,
            niveau: niv,
            effectif: classeApprenants.length,
            presences: presences,
            retards: retards,
            absences: absences,
            taux: taux
        });
        
        data.assiduitesClasses.push({ label: c.nom.substring(0, 15), value: taux, color: taux >= 80 ? '#28a745' : taux >= 60 ? '#ff9800' : '#dc3545' });
        data.effectifsClasses.push({ label: c.nom.substring(0, 15), value: classeApprenants.length, color: '#da002e' });
        
        if (nbEvals > 0) {
            data.evaluationsClasses.push({
                nom: c.nom,
                nbEvals: nbEvals,
                nbNotes: notes.length,
                moyenne: parseFloat(moyenneClasse)
            });
            data.moyennesClasses.push({ label: c.nom.substring(0, 15), value: parseFloat(moyenneClasse), color: moyenneClasse >= 14 ? '#28a745' : moyenneClasse >= 10 ? '#ff9800' : '#dc3545' });
        }
        
        data.deroulementClasses.push({
            nom: c.nom,
            prof: prof ? prof.nom : '-',
            debut: seancesDates[0] ? formatDate(seancesDates[0]) : '-',
            fin: seancesDates.length > 0 ? formatDate(seancesDates[seancesDates.length - 1]) : '-',
            seancesDone: classeSeancesDone.length,
            seancesTotal: classeSeances.length,
            progression: classeSeances.length > 0 ? Math.round(classeSeancesDone.length / classeSeances.length * 100) : 0
        });
        
        // Observations des fiches pédagogiques
        classeSeancesDone.forEach(function(s) {
            if (s.ficheObservations && s.ficheObservations.trim()) {
                data.observations.push({
                    classe: c.nom,
                    date: formatDate(s.date),
                    texte: s.ficheObservations
                });
            }
        });
    });
    
    data.totalPresences = data.totalPresents + data.totalRetards + data.totalAbsents;
    data.tauxPresence = data.totalPresences > 0 ? Math.round((data.totalPresents + data.totalRetards) / data.totalPresences * 100) : 0;
    data.pctPresents = data.totalPresences > 0 ? Math.round(data.totalPresents / data.totalPresences * 100) : 0;
    data.pctRetards = data.totalPresences > 0 ? Math.round(data.totalRetards / data.totalPresences * 100) : 0;
    data.pctAbsents = data.totalPresences > 0 ? Math.round(data.totalAbsents / data.totalPresences * 100) : 0;
    
    // Moyenne générale
    var allMoyennes = data.evaluationsClasses.map(function(c) { return c.moyenne; }).filter(function(m) { return m > 0; });
    data.moyenneGenerale = allMoyennes.length > 0 ? (allMoyennes.reduce(function(a, b) { return a + b; }, 0) / allMoyennes.length).toFixed(1) : '-';
    
    // Progression moyenne
    var allProgressions = data.deroulementClasses.map(function(c) { return c.progression; });
    data.tauxProgression = allProgressions.length > 0 ? Math.round(allProgressions.reduce(function(a, b) { return a + b; }, 0) / allProgressions.length) : 0;
    
    // Top absents (> 30% d'absences)
    Object.keys(apprenantAbsences).forEach(function(aid) {
        var a = apprenantAbsences[aid];
        if (a.totalSeances >= 3) {
            var tauxAbs = Math.round(a.absences / a.totalSeances * 100);
            if (tauxAbs >= 30) {
                data.topAbsents.push({
                    nom: a.nom,
                    classe: a.classe,
                    telephone: a.telephone,
                    absences: a.absences,
                    totalSeances: a.totalSeances,
                    tauxAbsence: tauxAbs
                });
            }
        }
    });
    data.topAbsents.sort(function(a, b) { return b.tauxAbsence - a.tauxAbsence; });
    data.topAbsents = data.topAbsents.slice(0, 10); // Top 10
    
    return data;
}

// Générer un graphique camembert SVG
function generatePieChartSVG(slices, title) {
    var total = slices.reduce(function(a, s) { return a + s.value; }, 0);
    if (total === 0) return '<p>Aucune donnée</p>';
    
    var svg = '<svg viewBox="0 0 200 200" style="max-width:200px;margin:0 auto;display:block;">';
    var cx = 100, cy = 100, r = 80;
    var startAngle = -90;
    
    slices.forEach(function(slice) {
        if (slice.value === 0) return;
        var pct = slice.value / total;
        var angle = pct * 360;
        var endAngle = startAngle + angle;
        
        var x1 = cx + r * Math.cos(startAngle * Math.PI / 180);
        var y1 = cy + r * Math.sin(startAngle * Math.PI / 180);
        var x2 = cx + r * Math.cos(endAngle * Math.PI / 180);
        var y2 = cy + r * Math.sin(endAngle * Math.PI / 180);
        
        var largeArc = angle > 180 ? 1 : 0;
        
        svg += '<path d="M ' + cx + ' ' + cy + ' L ' + x1 + ' ' + y1 + ' A ' + r + ' ' + r + ' 0 ' + largeArc + ' 1 ' + x2 + ' ' + y2 + ' Z" fill="' + slice.color + '" stroke="white" stroke-width="2"/>';
        startAngle = endAngle;
    });
    
    svg += '</svg>';
    
    // Légende
    svg += '<div style="display:flex;justify-content:center;gap:15px;margin-top:10px;flex-wrap:wrap;">';
    slices.forEach(function(s) {
        var pct = total > 0 ? Math.round(s.value / total * 100) : 0;
        svg += '<div style="display:flex;align-items:center;gap:5px;"><div style="width:12px;height:12px;background:' + s.color + ';border-radius:2px;"></div><span style="font-size:0.85rem;">' + s.label + ' (' + pct + '%)</span></div>';
    });
    svg += '</div>';
    
    if (title) svg = '<div style="text-align:center;font-weight:bold;margin-bottom:10px;">' + title + '</div>' + svg;
    
    return svg;
}

// Générer un graphique barres SVG
function generateBarChartSVG(bars, title) {
    if (!bars || bars.length === 0) return '<p>Aucune donnée</p>';
    
    var maxVal = Math.max.apply(null, bars.map(function(b) { return b.value; }));
    if (maxVal === 0) maxVal = 1;
    
    var barHeight = 25;
    var gap = 8;
    var svgHeight = bars.length * (barHeight + gap) + 30;
    var labelWidth = 100;
    var barMaxWidth = 200;
    
    var svg = '<div style="overflow-x:auto;">';
    if (title) svg += '<div style="font-weight:bold;margin-bottom:15px;">' + title + '</div>';
    svg += '<svg viewBox="0 0 350 ' + svgHeight + '" style="width:100%;max-width:500px;">';
    
    bars.forEach(function(bar, i) {
        var y = i * (barHeight + gap) + 10;
        var width = (bar.value / maxVal) * barMaxWidth;
        
        // Label
        svg += '<text x="0" y="' + (y + 17) + '" font-size="11" fill="#333">' + bar.label + '</text>';
        // Bar
        svg += '<rect x="' + labelWidth + '" y="' + y + '" width="' + width + '" height="' + barHeight + '" fill="' + (bar.color || '#da002e') + '" rx="4"/>';
        // Value
        svg += '<text x="' + (labelWidth + width + 8) + '" y="' + (y + 17) + '" font-size="12" fill="#333" font-weight="bold">' + bar.value + '</text>';
    });
    
    svg += '</svg></div>';
    return svg;
}

        html += '<th style="width:30px;">N°</th>';
        html += '<th>N° Cand.</th>';
        html += '<th>Nom</th>';
        html += '<th>Prénom</th>';
        html += '<th>Naissance</th>';
        html += '<th>Téléphone</th>';
        html += '<th style="width:60px;">Type</th>';
        html += '<th style="width:60px;">Sexe</th>';
        html += '<th>Antenne</th>';

        html += '<th style="width:50px;">PE /25</th>';

            html += '<td><code>' + (c.numCandidat || '-') + '</code></td>';
            html += '<td><strong>' + (c.nom || '').toUpperCase() + '</strong></td>';
            html += '<td>' + (c.prenom || '') + '</td>';
            html += '<td style="font-size:0.8rem;">' + (c.dateNaissance ? formatDate(c.dateNaissance) : '-') + '</td>';

            html += '<td><span class="badge ' + (c.type === 'af' ? 'badge-info' : 'badge-warning') + '">' + (c.type === 'af' ? 'AF' : 'Lib') + '</span></td>';
            html += '<td>' + (c.sexe === 'M' ? '👨' : c.sexe === 'F' ? '👩' : '-') + '</td>';

            html += '<td><input type="number" value="' + (c.ce || '') + '" min="0" max="25" style="width:45px;" onchange="updateDelfNote(\'' + c.id + '\',\'ce\',this.value)"></td>';
            html += '<td><input type="number" value="' + (c.pe || '') + '" min="0" max="25" style="width:45px;" onchange="updateDelfNote(\'' + c.id + '\',\'pe\',this.value)"></td>';
            html += '<td><input type="number" value="' + (c.po || '') + '" min="0" max="25" style="width:45px;" onchange="updateDelfNote(\'' + c.id + '\',\'po\',this.value)"></td>';
            html += '<td style="font-weight:bold;' + (total >= seuilAdmission ? 'color:var(--success);' : 'color:var(--danger);') + '">' + total + '/100</td>';

        var niveauRefuses = niveauCandidats.filter(function(c) { return c.resultat === 'refusé'; }).length;
        var tauxReussite = niveauCandidats.length > 0 ? Math.round(niveauAdmis / niveauCandidats.length * 100) : 0;
        
        html += '<div style="margin-top:15px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;">';

        html += '<div style="background:#f8d7da;padding:10px;border-radius:8px;text-align:center;"><strong>Refusés</strong><br><span style="font-size:1.5rem;color:var(--danger);">' + niveauRefuses + '</span></div>';
        html += '<div style="background:#cce5ff;padding:10px;border-radius:8px;text-align:center;"><strong>% Réussite</strong><br><span style="font-size:1.5rem;color:var(--primary);">' + tauxReussite + '%</span></div>';

    html += '</div></div>';
    
    // Finances de la session

    document.getElementById('delfContent').innerHTML = html;
}

function renderDelfFinances(candidats) {
    var tarifs = DB.settings.tarifsDelf || {
        af: { A1: 9000, A2: 9000, B1: 10000, B2: 11000, C1: 13000, C2: 16000 },
        libre: { A1: 15000, A2: 15000, B1: 16000, B2: 17000, C1: 18000, C2: 20000 }
    };
    
    var caTotal = 0;
    var niveaux = ['A1', 'A2', 'B1', 'B2', 'C1', 'C2'];
    var details = {};
    
    niveaux.forEach(function(niv) {
        var nivCand = candidats.filter(function(c) { return c.niveau === niv; });
        var afCount = nivCand.filter(function(c) { return c.type === 'af'; }).length;
        var libreCount = nivCand.filter(function(c) { return c.type === 'libre'; }).length;
        var caAf = afCount * (tarifs.af[niv] || 0);
        var caLibre = libreCount * (tarifs.libre[niv] || 0);
        
        details[niv] = {
            af: afCount,
            libre: libreCount,
            total: afCount + libreCount,
            caAf: caAf,
            caLibre: caLibre,
            caTotal: caAf + caLibre
        };
        
        caTotal += caAf + caLibre;
    });
    
    var html = '<div class="card" style="margin-top:15px;"><div class="card-header"><h3>💰 Bilan financier session</h3></div><div class="card-body">';
    html += '<table><thead><tr><th>Niveau</th><th>Cand. AF</th><th>CA AF</th><th>Cand. Libres</th><th>CA Libres</th><th>Total</th></tr></thead><tbody>';
    
    niveaux.forEach(function(niv) {
        var d = details[niv];
        if (d.total > 0) {
            html += '<tr>';
            html += '<td><strong>' + niv + '</strong></td>';
            html += '<td>' + d.af + '</td>';
            html += '<td>' + formatMoney(d.caAf) + '</td>';
            html += '<td>' + d.libre + '</td>';
            html += '<td>' + formatMoney(d.caLibre) + '</td>';
            html += '<td style="font-weight:bold;">' + formatMoney(d.caTotal) + '</td>';
            html += '</tr>';
        }
    });
    
    html += '<tr style="background:var(--gray-100);font-weight:bold;"><td colspan="5">TOTAL CA SESSION</td><td style="color:var(--success);">' + formatMoney(caTotal) + '</td></tr>';
    html += '</tbody></table></div></div>';
    
    return html;
}

function editCandidatDelf(id) {
    openCandidatDelfModal(id);
}

function updateCandTarif() {
    var niveau = document.getElementById('candNiveau').value;
    var type = document.getElementById('candType').value;
    var tarifs = DB.settings.tarifsDelf || {
        af: { A1: 9000, A2: 9000, B1: 10000, B2: 11000, C1: 13000, C2: 16000 },
        libre: { A1: 15000, A2: 15000, B1: 16000, B2: 17000, C1: 18000, C2: 20000 }
    };
    var tarif = (tarifs[type] && tarifs[type][niveau]) ? tarifs[type][niveau] : 10000;
    document.getElementById('candTarif').value = tarif;
}

function updateDelfCandidat(id, field, value) {
    var candidat = (DB.candidatsDelf || []).find(function(c) { return c.id === id; });
    if (candidat) {
        candidat[field] = value;
        save();
    }
}

function updateDelfNote(id, field, value) {
    var candidat = (DB.candidatsDelf || []).find(function(c) { return c.id === id; });
    if (candidat) {
        candidat[field] = value ? parseInt(value) : null;
        
        // Calculer le résultat automatiquement
        var total = (candidat.co || 0) + (candidat.ce || 0) + (candidat.pe || 0) + (candidat.po || 0);
        if (total > 0 && candidat.presentCollectif && candidat.presentIndividuel) {
            candidat.resultat = total >= 50 ? 'admis' : 'refusé';
        } else if (!candidat.presentCollectif && !candidat.presentIndividuel && (candidat.co || candidat.ce || candidat.pe || candidat.po)) {
            candidat.resultat = 'absent';
        }
        
        save();
        renderDelf();
    }
}

function deleteCandidatDelf(id) {
    if (!confirm('Supprimer ce candidat ?')) return;
    DB.candidatsDelf = (DB.candidatsDelf || []).filter(function(c) { return c.id !== id; });
    save();
    renderDelf();
    notify('Candidat supprimé', 'success');
}

function deleteSessionDelf(idx) {
    if (!confirm('Supprimer cette session et tous ses candidats ?')) return;
    var session = DB.sessionsDelf[idx];
    if (session) {
        // Supprimer les candidats de cette session
        DB.candidatsDelf = (DB.candidatsDelf || []).filter(function(c) { return c.sessionId !== session.id; });
        DB.sessionsDelf.splice(idx, 1);
        currentDelfSession = DB.sessionsDelf.length > 0 ? DB.sessionsDelf[0].id : null;
        save();
        renderDelf();
        notify('Session supprimée', 'success');
    }
}

// ===== BIBLIOTHÈQUE =====
function renderBiblio() {
    var adhesions = DB.adhesionsBiblio || [];
    var today = new Date().toISOString().slice(0, 10);
    
    var actives = adhesions.filter(function(a) { return a.dateExpiration >= today; });
    var expirees = adhesions.filter(function(a) { return a.dateExpiration < today; });
    var expireBientot = adhesions.filter(function(a) { 
        var exp = new Date(a.dateExpiration);
        var now = new Date();
        var diff = (exp - now) / (1000 * 60 * 60 * 24);
        return diff > 0 && diff <= 30;
    });
    
    var html = '<div class="stats-grid" style="margin-bottom:20px;">';
    html += '<div class="stat-card"><div class="stat-icon blue">📖</div><div class="stat-info"><h4>Total adhérents</h4><div class="value">' + adhesions.length + '</div></div></div>';
    html += '<div class="stat-card"><div class="stat-icon green">✅</div><div class="stat-info"><h4>Adhésions actives</h4><div class="value">' + actives.length + '</div></div></div>';
    html += '<div class="stat-card"><div class="stat-icon yellow">⏰</div><div class="stat-info"><h4>Expire dans 30j</h4><div class="value">' + expireBientot.length + '</div></div></div>';
    html += '<div class="stat-card"><div class="stat-icon red">❌</div><div class="stat-info"><h4>Expirées</h4><div class="value">' + expirees.length + '</div></div></div>';
    html += '</div>';
    
    // Alertes
    if (expireBientot.length > 0) {
        html += '<div class="alert alert-warning" style="margin-bottom:15px;">⚠️ <strong>' + expireBientot.length + ' adhésion(s)</strong> expirent dans les 30 prochains jours !</div>';
    }
    
    html += '<div class="card"><div class="card-header"><h3>📚 Liste des adhérents</h3><button class="btn btn-sm btn-success" onclick="exportBiblioExcel()">📥 Excel</button></div><div class="card-body">';
    
    if (adhesions.length === 0) {
        html += '<p style="text-align:center;color:var(--gray-500);padding:20px;">Aucun adhérent. Cliquez sur "Nouvelle adhésion" pour commencer.</p>';
    } else {
        html += '<table><thead><tr><th style="width:60px;">Photo</th><th>N° Carte</th><th>Nom</th><th>Type</th><th>Téléphone</th><th>Adhésion</th><th>Expiration</th><th>Statut</th><th>Actions</th></tr></thead><tbody>';
        
        // Trier par nom
        adhesions.sort(function(a, b) { return (a.nom + ' ' + (a.prenom || '')).localeCompare(b.nom + ' ' + (b.prenom || '')); });
        
        adhesions.forEach(function(a, idx) {
            var isActive = a.dateExpiration >= today;
            var expireSoon = false;
            if (isActive) {
                var exp = new Date(a.dateExpiration);
                var now = new Date();
                var diff = (exp - now) / (1000 * 60 * 60 * 24);
                expireSoon = diff <= 30;
            }
            var statutBadge = isActive ? (expireSoon ? 'badge-warning' : 'badge-success') : 'badge-danger';
            var statutText = isActive ? (expireSoon ? '⏰ Expire bientôt' : '✅ Active') : '❌ Expirée';
            
            // Photo ou avatar
            var photoHTML = a.photo ? 
                '<img src="' + a.photo + '" style="width:50px;height:50px;border-radius:50%;object-fit:cover;">' :
                '<div style="width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#da002e,#ff6b6b);color:white;display:flex;align-items:center;justify-content:center;font-weight:bold;">' + (a.nom ? a.nom.charAt(0).toUpperCase() : '?') + '</div>';
            
            // Numéro de carte
            var numCarte = a.numCarte || 'BIB-' + (a.id || '').slice(-6).toUpperCase();
            
            html += '<tr>';
            html += '<td>' + photoHTML + '</td>';
            html += '<td><code style="font-size:0.8rem;background:#f0f0f0;padding:3px 6px;border-radius:4px;">' + numCarte + '</code></td>';
            html += '<td><strong>' + a.nom + ' ' + (a.prenom || '') + '</strong></td>';
            html += '<td>' + (a.type === 'enfant' ? '👶 Enfant' : '👨 Adulte') + '</td>';
            html += '<td style="font-size:0.85rem;">' + (a.telephone || '-') + '</td>';
            html += '<td style="font-size:0.85rem;">' + formatDate(a.dateAdhesion) + '</td>';
            html += '<td style="font-size:0.85rem;">' + formatDate(a.dateExpiration) + '</td>';
            html += '<td><span class="badge ' + statutBadge + '">' + statutText + '</span></td>';
            html += '<td style="white-space:nowrap;">';
            html += '<button class="btn btn-sm btn-info" onclick="generateCarteBiblio(' + idx + ')" title="Carte + QR Code">🪪</button> ';
            html += '<button class="btn btn-sm btn-primary" onclick="renouvelerAdhesion(' + idx + ')" title="Renouveler">🔄</button> ';
            html += '<button class="btn btn-sm btn-secondary" onclick="editAdhesion(' + idx + ')" title="Modifier">✏️</button> ';
            html += '<button class="btn btn-sm btn-danger" onclick="deleteAdhesion(' + idx + ')" title="Supprimer">🗑️</button>';
            html += '</td>';
            html += '</tr>';
        });
        
        html += '</tbody></table>';
    }
    
    html += '</div></div>';
    
    document.getElementById('biblioContent').innerHTML = html;
}

function openAdhesionModal(idx) {
    var tarifs = DB.settings.tarifsBibliotheque || { enfant: 2000, adulte: 4000 };
    var adh = idx !== undefined ? DB.adhesionsBiblio[idx] : null;
    
    var content = '<div class="form-grid">' +
        '<div class="form-group"><label>Nom *</label><input type="text" id="adhNom" value="' + (adh ? adh.nom : '') + '"></div>' +
        '<div class="form-group"><label>Prénom</label><input type="text" id="adhPrenom" value="' + (adh ? adh.prenom || '' : '') + '"></div>' +
        '<div class="form-group"><label>📞 Téléphone</label><input type="tel" id="adhTel" value="' + (adh ? adh.telephone || '' : '') + '"></div>' +
        '<div class="form-group"><label>📧 Email</label><input type="email" id="adhEmail" value="' + (adh ? adh.email || '' : '') + '"></div>' +
        '<div class="form-group"><label>Type *</label><select id="adhType" onchange="updateAdhTarif()"><option value="enfant"' + (adh && adh.type === 'enfant' ? ' selected' : '') + '>Enfant/Ado (2 000 KMF)</option><option value="adulte"' + (adh && adh.type === 'adulte' ? ' selected' : '') + '>Adulte (4 000 KMF)</option></select></div>' +
        '<div class="form-group"><label>💰 Tarif</label><input type="number" id="adhTarif" value="' + (adh ? adh.tarif : tarifs.enfant) + '"></div>' +
        '<div class="form-group"><label>📅 Date adhésion</label><input type="date" id="adhDate" value="' + (adh ? adh.dateAdhesion : new Date().toISOString().slice(0,10)) + '"></div>' +
        '<div class="form-group full-width"><label>📸 Photo (URL ou base64)</label><div style="display:flex;gap:10px;"><input type="text" id="adhPhoto" value="' + (adh ? adh.photo || '' : '') + '" placeholder="URL de la photo ou cliquez pour uploader" style="flex:1;"><button type="button" class="btn btn-sm btn-info" onclick="uploadBiblioPhoto()">📷</button></div></div>' +
        '<div class="form-group full-width"><label>📝 Notes</label><textarea id="adhNotes" rows="2" style="width:100%;padding:8px;border:1px solid var(--gray-300);border-radius:6px;">' + (adh ? adh.notes || '' : '') + '</textarea></div>' +
        '</div>' +
        '<input type="file" id="biblioPhotoInput" accept="image/*" style="display:none" onchange="handleBiblioPhotoUpload(event)">';
    
    showModal(adh ? '✏️ Modifier adhérent' : '➕ Nouvelle adhésion bibliothèque', content, function() {
        var nom = document.getElementById('adhNom').value.trim();
        if (!nom) { notify('Nom requis', 'error'); return; }
        
        var dateAdh = document.getElementById('adhDate').value;
        var dateExp = new Date(dateAdh);
        dateExp.setFullYear(dateExp.getFullYear() + 1);
        
        var data = {
            id: adh ? adh.id : genId(),
            nom: nom,
            prenom: document.getElementById('adhPrenom').value.trim(),
            telephone: document.getElementById('adhTel').value.trim(),
            email: document.getElementById('adhEmail').value.trim(),
            type: document.getElementById('adhType').value,
            tarif: parseInt(document.getElementById('adhTarif').value) || 2000,
            dateAdhesion: dateAdh,
            dateExpiration: adh ? adh.dateExpiration : dateExp.toISOString().slice(0, 10),
            photo: document.getElementById('adhPhoto').value.trim(),
            notes: document.getElementById('adhNotes').value.trim()
        };
        
        if (!DB.adhesionsBiblio) DB.adhesionsBiblio = [];
        
        if (idx !== undefined) {
            // Garder la date d'expiration originale si on édite
            data.dateExpiration = adh.dateExpiration;
            DB.adhesionsBiblio[idx] = data;
        } else {
            // Générer un numéro de carte unique pour le nouvel adhérent
            data.numCarte = generateNumCarte();
            DB.adhesionsBiblio.push(data);
            // Ajouter à la caisse
            if (!DB.caisse) DB.caisse = [];
            DB.caisse.push({
                id: genId(),
                date: dateAdh,
                type: 'entree',
                categorie: 'Bibliothèque',
                description: 'Adhésion ' + nom + ' ' + (data.prenom || '') + ' (Carte: ' + data.numCarte + ')',
                montant: data.tarif
            });
        }
        
        save();
        closeModal();
        renderBiblio();
        notify(idx !== undefined ? 'Adhérent modifié' : 'Adhésion enregistrée', 'success');
    });
}

function handleBiblioPhotoUpload(event) {
    var file = event.target.files[0];
    if (!file) return;
    
    var reader = new FileReader();
    reader.onload = function(e) {
        document.getElementById('adhPhoto').value = e.target.result;
        notify('Photo chargée !', 'success');
    };
    reader.readAsDataURL(file);
}

function updateAdhTarif() {
    var type = document.getElementById('adhType').value;
    var tarifs = DB.settings.tarifsBibliotheque || { enfant: 2000, adulte: 4000 };
    document.getElementById('adhTarif').value = tarifs[type] || 2000;
}

function renouvelerAdhesion(idx) {
    var adh = DB.adhesionsBiblio[idx];
    if (!adh) return;
    
    var tarifs = DB.settings.tarifsBibliotheque || { enfant: 2000, adulte: 4000 };
    var tarif = tarifs[adh.type] || 2000;
    
    if (!confirm('Renouveler l\'adhésion de ' + adh.nom + ' ' + (adh.prenom || '') + ' pour ' + formatMoney(tarif) + ' ?')) return;
    
    var newExp = new Date(adh.dateExpiration);
    newExp.setFullYear(newExp.getFullYear() + 1);
    adh.dateExpiration = newExp.toISOString().slice(0, 10);
    
    // Ajouter à la caisse
    if (!DB.caisse) DB.caisse = [];
    DB.caisse.push({
        id: genId(),
        date: new Date().toISOString().slice(0, 10),
        type: 'entree',
        categorie: 'Bibliothèque',
        description: 'Renouvellement ' + adh.nom + ' ' + (adh.prenom || ''),
        montant: tarif
    });
    
    save();
    renderBiblio();
    notify('Adhésion renouvelée jusqu\'au ' + formatDate(adh.dateExpiration), 'success');
}

function deleteAdhesion(idx) {
    if (!confirm('Supprimer cette adhésion ?')) return;
    DB.adhesionsBiblio.splice(idx, 1);
    save();
    renderBiblio();
    notify('Adhésion supprimée', 'success');
}

}

// Fonction pour générer le numéro de carte unique
function generateNumCarte() {
    var year = new Date().getFullYear().toString().slice(-2);
    var random = Math.random().toString(36).substring(2, 6).toUpperCase();
    var seq = ((DB.adhesionsBiblio || []).length + 1).toString().padStart(4, '0');
    return 'BIB-' + year + '-' + seq + '-' + random;
}

    document.getElementById('centresContent').innerHTML = html;
}

function openCentreModal(idx) {
    var c = idx !== undefined ? DB.settings.centres[idx] : null;
    
    var content = '<div class="form-grid">' +
        '<div class="form-group full-width"><label>Nom du centre *</label><input type="text" id="centreNom" value="' + (c ? c.nom : '') + '"></div>' +
        '<div class="form-group full-width"><label>Type</label><select id="centreType"><option value="antenne"' + (c && c.type === 'antenne' ? ' selected' : '') + '>📍 Antenne</option><option value="siege"' + (c && c.type === 'siege' ? ' selected' : '') + '>🏛️ Siège</option></select></div>' +
        '</div>';
    
    showModal(c ? '✏️ Modifier centre' : '➕ Nouveau centre', content, function() {
        var nom = document.getElementById('centreNom').value.trim();
        if (!nom) { notify('Nom requis', 'error'); return; }
        
        var id = c ? c.id : nom.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
        
        var data = {
            id: id,
            nom: nom,
            type: document.getElementById('centreType').value
        };
        
        if (!DB.settings.centres) DB.settings.centres = [];
        
        if (idx !== undefined) {
            DB.settings.centres[idx] = data;
        } else {
            DB.settings.centres.push(data);
        }
        
        save();
        closeModal();
        renderCentres();
        notify('Centre enregistré', 'success');
    });
}

function deleteCentre(idx) {
    if (!confirm('Supprimer ce centre ?')) return;
    DB.settings.centres.splice(idx, 1);
    save();
    renderCentres();
    notify('Centre supprimé', 'success');
}

// ===== CAISSE =====
var currentCaisseTab = 'caisseJournal';

function renderCaisse() {
    var centres = DB.settings.centres || [];
    
    // Mettre à jour le filtre des centres
    var filterCentre = document.getElementById('filterCaisseCentre');
    if (filterCentre) {
        var opts = '<option value="">Tous centres</option>';
        centres.forEach(function(c) {
            opts += '<option value="' + c.id + '">' + c.nom + '</option>';
        });
        filterCentre.innerHTML = opts;
    }
    
    // Définir les dates par défaut (mois en cours)
    var today = new Date();
    var firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
    if (!document.getElementById('filterCaisseDebut').value) {
        document.getElementById('filterCaisseDebut').value = firstDay.toISOString().slice(0, 10);
    }
    if (!document.getElementById('filterCaisseFin').value) {
        document.getElementById('filterCaisseFin').value = today.toISOString().slice(0, 10);
    }
    
    var html = '';
    switch (currentCaisseTab) {
        case 'caisseJournal': html = renderCaisseJournal(); break;
        case 'caisseResume': html = renderCaisseResume(); break;
        case 'caisseVersements': html = renderCaisseVersements(); break;
        default: html = renderCaisseJournal();
    }
    document.getElementById('caisseContent').innerHTML = html;
}

function switchCaisseTab(btn, tabId) {
    document.querySelectorAll('#section-caisse .tab').forEach(function(t) { t.classList.remove('active'); });
    btn.classList.add('active');
    currentCaisseTab = tabId;
    renderCaisse();
}

function renderCaisseJournal() {
    var caisse = DB.caisse || [];
    var centres = DB.settings.centres || [];
    var filterCentre = document.getElementById('filterCaisseCentre').value;
    var dateDebut = document.getElementById('filterCaisseDebut').value;
    var dateFin = document.getElementById('filterCaisseFin').value;
    
    // Filtrer
    var filtered = caisse.filter(function(e) {
        if (filterCentre && e.centreId !== filterCentre) return false;
        if (dateDebut && e.date < dateDebut) return false;
        if (dateFin && e.date > dateFin) return false;
        return true;
    });
    
    // Trier par date décroissante
    filtered.sort(function(a, b) { return b.date.localeCompare(a.date); });
    
    // Calculer totaux
    var totalEntrees = 0, totalSorties = 0;
    filtered.forEach(function(e) {
        if (e.type === 'entree') totalEntrees += e.montant;
        else totalSorties += e.montant;
    });
    var solde = totalEntrees - totalSorties;
    
    var html = '<div class="stats-grid" style="margin-bottom:20px;">';
    html += '<div class="stat-card"><div class="stat-icon green">💵</div><div class="stat-info"><h4>Entrées</h4><div class="value" style="color:var(--success);">+' + formatMoney(totalEntrees) + '</div></div></div>';
    html += '<div class="stat-card"><div class="stat-icon red">💸</div><div class="stat-info"><h4>Sorties</h4><div class="value" style="color:var(--danger);">-' + formatMoney(totalSorties) + '</div></div></div>';
    html += '<div class="stat-card"><div class="stat-icon blue">🏦</div><div class="stat-info"><h4>Solde</h4><div class="value" style="color:' + (solde >= 0 ? 'var(--success)' : 'var(--danger)') + ';">' + formatMoney(solde) + '</div></div></div>';
    html += '</div>';
    
    html += '<div class="card"><div class="card-header"><h3>📋 Journal de caisse</h3><button class="btn btn-sm btn-success" onclick="exportCaisseExcel()">📥 Excel</button></div><div class="card-body">';
    
    if (filtered.length === 0) {
        html += '<p style="text-align:center;color:var(--gray-500);padding:20px;">Aucune opération sur cette période.</p>';
    } else {
        html += '<table><thead><tr><th>Date</th><th>Type</th><th>Catégorie</th><th>Description</th><th>Centre</th><th>Montant</th><th>Actions</th></tr></thead><tbody>';
        
        filtered.forEach(function(e, idx) {
            var centre = centres.find(function(c) { return c.id === e.centreId; });
            var typeIcon = e.type === 'entree' ? '<span style="color:var(--success);">➕ Entrée</span>' : '<span style="color:var(--danger);">➖ Sortie</span>';
            var montantStyle = e.type === 'entree' ? 'color:var(--success);' : 'color:var(--danger);';
            var montantSign = e.type === 'entree' ? '+' : '-';
            
            html += '<tr>';
            html += '<td>' + formatDate(e.date) + '</td>';
            html += '<td>' + typeIcon + '</td>';
            html += '<td>' + (e.categorie || '-') + '</td>';
            html += '<td>' + (e.description || '-') + '</td>';
            html += '<td>' + (centre ? centre.nom : '-') + '</td>';
            html += '<td style="' + montantStyle + 'font-weight:bold;">' + montantSign + formatMoney(e.montant) + '</td>';
            html += '<td><button class="btn btn-sm btn-danger" onclick="deleteCaisseEntry(\'' + e.id + '\')">🗑️</button></td>';
            html += '</tr>';
        });
        
        html += '</tbody></table>';
    }
    
    html += '</div></div>';
    return html;
}

function renderCaisseResume() {
    var caisse = DB.caisse || [];
    var centres = DB.settings.centres || [];
    var dateDebut = document.getElementById('filterCaisseDebut').value;
    var dateFin = document.getElementById('filterCaisseFin').value;
    
    // Calculer par centre
    var parCentre = {};
    centres.forEach(function(c) {
        parCentre[c.id] = { nom: c.nom, type: c.type, entrees: 0, sorties: 0 };
    });
    parCentre['non-defini'] = { nom: 'Non défini', type: '', entrees: 0, sorties: 0 };
    
    caisse.forEach(function(e) {
        if (dateDebut && e.date < dateDebut) return;
        if (dateFin && e.date > dateFin) return;
        
        var cid = e.centreId || 'non-defini';
        if (!parCentre[cid]) parCentre[cid] = { nom: cid, type: '', entrees: 0, sorties: 0 };
        
        if (e.type === 'entree') parCentre[cid].entrees += e.montant;
        else parCentre[cid].sorties += e.montant;
    });
    
    var html = '<div class="card"><div class="card-header"><h3>📊 Résumé par centre</h3></div><div class="card-body">';
    html += '<table><thead><tr><th>Centre</th><th>Type</th><th>Entrées</th><th>Sorties</th><th>Solde</th></tr></thead><tbody>';
    
    var totalE = 0, totalS = 0;
    Object.keys(parCentre).forEach(function(cid) {
        var c = parCentre[cid];
        if (c.entrees > 0 || c.sorties > 0) {
            var solde = c.entrees - c.sorties;
            var typeLabel = c.type === 'siege' ? '🏛️ Siège' : c.type === 'antenne' ? '📍 Antenne' : '-';
            html += '<tr><td><strong>' + c.nom + '</strong></td><td>' + typeLabel + '</td><td style="color:var(--success);">+' + formatMoney(c.entrees) + '</td><td style="color:var(--danger);">-' + formatMoney(c.sorties) + '</td><td style="font-weight:bold;color:' + (solde >= 0 ? 'var(--success)' : 'var(--danger)') + ';">' + formatMoney(solde) + '</td></tr>';
            totalE += c.entrees;
            totalS += c.sorties;
        }
    });
    
    html += '<tr style="background:var(--gray-100);font-weight:bold;"><td colspan="2">TOTAL</td><td style="color:var(--success);">+' + formatMoney(totalE) + '</td><td style="color:var(--danger);">-' + formatMoney(totalS) + '</td><td style="color:' + (totalE - totalS >= 0 ? 'var(--success)' : 'var(--danger)') + ';">' + formatMoney(totalE - totalS) + '</td></tr>';
    html += '</tbody></table></div></div>';
    
    // Par catégorie
    var parCategorie = {};
    caisse.forEach(function(e) {
        if (dateDebut && e.date < dateDebut) return;
        if (dateFin && e.date > dateFin) return;
        
        var cat = e.categorie || 'Autre';
        if (!parCategorie[cat]) parCategorie[cat] = { entrees: 0, sorties: 0 };
        if (e.type === 'entree') parCategorie[cat].entrees += e.montant;
        else parCategorie[cat].sorties += e.montant;
    });
    
    html += '<div class="card" style="margin-top:15px;"><div class="card-header"><h3>📂 Par catégorie</h3></div><div class="card-body">';
    html += '<table><thead><tr><th>Catégorie</th><th>Entrées</th><th>Sorties</th></tr></thead><tbody>';
    
    Object.keys(parCategorie).sort().forEach(function(cat) {
        var c = parCategorie[cat];
        html += '<tr><td><strong>' + cat + '</strong></td><td style="color:var(--success);">' + (c.entrees > 0 ? '+' + formatMoney(c.entrees) : '-') + '</td><td style="color:var(--danger);">' + (c.sorties > 0 ? '-' + formatMoney(c.sorties) : '-') + '</td></tr>';
    });
    
    html += '</tbody></table></div></div>';
    
    return html;
}

function renderCaisseVersements() {
    var versements = (DB.caisse || []).filter(function(e) { return e.categorie === 'Versement au siège'; });
    var centres = DB.settings.centres || [];
    
    var html = '<div class="card"><div class="card-header"><h3>💸 Versements des antennes au siège</h3><button class="btn btn-sm btn-primary" onclick="openVersementModal()">➕ Nouveau versement</button></div><div class="card-body">';
    
    if (versements.length === 0) {
        html += '<p style="text-align:center;color:var(--gray-500);padding:20px;">Aucun versement enregistré.</p>';
    } else {
        html += '<table><thead><tr><th>Date</th><th>Antenne</th><th>Montant</th><th>Note</th></tr></thead><tbody>';
        
        versements.sort(function(a, b) { return b.date.localeCompare(a.date); }).forEach(function(v) {
            var centre = centres.find(function(c) { return c.id === v.centreId; });
            html += '<tr><td>' + formatDate(v.date) + '</td><td>' + (centre ? centre.nom : '-') + '</td><td style="color:var(--success);font-weight:bold;">+' + formatMoney(v.montant) + '</td><td>' + (v.description || '-') + '</td></tr>';
        });
        
        html += '</tbody></table>';
    }
    
    html += '</div></div>';
    return html;
}

function openVersementModal() {
    var centres = DB.settings.centres || [];
    var antennes = centres.filter(function(c) { return c.type === 'antenne'; });
    var centresOpts = '<option value="">-- Sélectionner --</option>';
    antennes.forEach(function(c) {
        centresOpts += '<option value="' + c.id + '">' + c.nom + '</option>';
    });
    
    var content = '<div class="form-grid">' +
        '<div class="form-group"><label>Antenne *</label><select id="versementCentre">' + centresOpts + '</select></div>' +
        '<div class="form-group"><label>Montant (KMF) *</label><input type="number" id="versementMontant"></div>' +
        '<div class="form-group"><label>Date</label><input type="date" id="versementDate" value="' + new Date().toISOString().slice(0,10) + '"></div>' +
        '<div class="form-group full-width"><label>Note</label><input type="text" id="versementNote"></div>' +
        '</div>';
    
    showModal('💸 Versement d\'antenne au siège', content, function() {
        var montant = parseInt(document.getElementById('versementMontant').value) || 0;
        var centreId = document.getElementById('versementCentre').value;
        if (montant <= 0 || !centreId) { notify('Antenne et montant requis', 'error'); return; }
        
        var centre = centres.find(function(c) { return c.id === centreId; });
        var siege = centres.find(function(c) { return c.type === 'siege'; });
        
        if (!DB.caisse) DB.caisse = [];
        
        // Sortie pour l'antenne
        DB.caisse.push({
            id: genId(),
            date: document.getElementById('versementDate').value,
            type: 'sortie',
            categorie: 'Versement au siège',
            description: 'Versement de ' + (centre ? centre.nom : centreId) + ' au siège',
            montant: montant,
            centreId: centreId
        });
        
        // Entrée pour le siège
        DB.caisse.push({
            id: genId(),
            date: document.getElementById('versementDate').value,
            type: 'entree',
            categorie: 'Versement au siège',
            description: 'Versement reçu de ' + (centre ? centre.nom : centreId),
            montant: montant,
            centreId: siege ? siege.id : 'mutsamudu'
        });
        
        save();
        closeModal();
        renderCaisse();
        notify('Versement enregistré', 'success');
    });
}

function deleteCaisseEntry(id) {
    if (!confirm('Supprimer cette opération ?')) return;
    DB.caisse = (DB.caisse || []).filter(function(e) { return e.id !== id; });
    save();
    renderCaisse();
    notify('Opération supprimée', 'success');
}
