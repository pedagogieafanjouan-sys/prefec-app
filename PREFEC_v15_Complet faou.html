:root {
    --primary: #da002e; --primary-light: #2d5a8a; --primary-dark: #0f2440;
    --secondary: #e8b923; --secondary-light: #ffd54f;
    --accent: #00a896; --danger: #dc3545; --success: #28a745; --warning: #ffc107; --info: #17a2b8;
    --white: #ffffff; --gray-100: #f8f9fa; --gray-200: #e9ecef; --gray-300: #dee2e6;
    --gray-500: #adb5bd; --gray-600: #6c757d; --gray-700: #495057; --dark: #343a40;
    --shadow: 0 4px 12px rgba(0,0,0,0.1); --radius: 12px; --radius-lg: 20px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%); min-height: 100vh; color: var(--dark); line-height: 1.6; }

.login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); }
.login-box { background: var(--white); padding: 40px; border-radius: var(--radius-lg); box-shadow: 0 8px 25px rgba(0,0,0,0.15); width: 100%; max-width: 420px; }
.login-logo { text-align: center; margin-bottom: 25px; }
.login-logo h1 { font-size: 2.2rem; color: var(--primary); }
.login-logo .subtitle { color: var(--gray-600); font-size: 0.9rem; }
.login-logo .sbadge { display: inline-block; background: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-light) 100%); color: var(--primary-dark); padding: 4px 12px; border-radius: 15px; font-size: 0.75rem; font-weight: 600; margin-top: 8px; }

.form-group { margin-bottom: 18px; }
.form-group label { display: block; margin-bottom: 6px; font-weight: 600; color: var(--gray-700); font-size: 0.85rem; }
.form-group input, .form-group select, .form-group textarea { width: 100%; padding: 11px 14px; border: 2px solid var(--gray-300); border-radius: var(--radius); font-size: 0.95rem; }
.form-group input:focus, .form-group select:focus { outline: none; border-color: var(--primary); }
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
.form-group.full-width { grid-column: 1 / -1; }

.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 18px; border: none; border-radius: var(--radius); font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; }
.btn-primary { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%); color: var(--white); }
.btn-secondary { background: var(--gray-200); color: var(--gray-700); }
.btn-success { background: linear-gradient(135deg, var(--success) 0%, #34ce57 100%); color: var(--white); }
.btn-danger { background: linear-gradient(135deg, var(--danger) 0%, #e35d6a 100%); color: var(--white); }
.btn-warning { background: linear-gradient(135deg, var(--warning) 0%, var(--secondary-light) 100%); color: var(--dark); }
.btn-info { background: linear-gradient(135deg, var(--info) 0%, #3ab8d8 100%); color: var(--white); }
.btn-sm { padding: 6px 12px; font-size: 0.8rem; }
.btn-lg { padding: 12px 24px; font-size: 1rem; }
.btn-block { width: 100%; }

.login-error { background: #fee; color: var(--danger); padding: 10px; border-radius: 6px; margin-bottom: 15px; display: none; border-left: 4px solid var(--danger); font-size: 0.85rem; }

.dashboard { display: none; min-height: 100vh; }
.sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 240px; background: linear-gradient(180deg, var(--primary-dark) 0%, var(--primary) 100%); color: var(--white); overflow-y: auto; z-index: 1000; }
.sidebar-header { padding: 18px; background: rgba(0,0,0,0.2); border-bottom: 1px solid rgba(255,255,255,0.1); }
.sidebar-header h2 { font-size: 1.2rem; margin-bottom: 4px; }
.sidebar-header .user-info { font-size: 0.75rem; opacity: 0.8; }
.sidebar-header .user-role { font-size: 0.65rem; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }

.session-selector { padding: 12px 15px; background: rgba(0,0,0,0.15); border-bottom: 1px solid rgba(255,255,255,0.1); }
.session-selector label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; display: block; margin-bottom: 5px; }
.session-selector select { width: 100%; padding: 7px; border-radius: 6px; border: none; background: rgba(255,255,255,0.15); color: white; font-size: 0.8rem; }
.session-selector select option { color: var(--dark); }

.sidebar-nav { padding: 10px 0; }
.nav-section-title { padding: 8px 15px; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.5; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 15px; color: rgba(255,255,255,0.8); cursor: pointer; border-left: 3px solid transparent; transition: all 0.2s ease; font-size: 0.85rem; }
.nav-item:hover { background: rgba(255,255,255,0.1); color: var(--white); }
.nav-item.active { background: rgba(255,255,255,0.15); border-left-color: var(--secondary); color: var(--white); }

.main-content { margin-left: 240px; padding: 20px; min-height: 100vh; }
.top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid var(--gray-200); flex-wrap: wrap; gap: 10px; }
.top-bar h1 { font-size: 1.4rem; color: var(--primary); }

.card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 18px; }
.card-header { padding: 14px 18px; background: linear-gradient(135deg, var(--gray-100) 0%, var(--white) 100%); border-bottom: 1px solid var(--gray-200); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
.card-header h3 { font-size: 1rem; color: var(--primary); }
.card-body { padding: 18px; }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 18px; }
.stat-card { background: var(--white); border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 12px; cursor: pointer; transition: transform 0.2s; }
.stat-card:hover { transform: translateY(-2px); }
.stat-icon { width: 42px; height: 42px; border-radius: var(--radius); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
.stat-icon.blue { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%); color: white; }
.stat-icon.green { background: linear-gradient(135deg, var(--success) 0%, #34ce57 100%); color: white; }
.stat-icon.yellow { background: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-light) 100%); color: var(--primary-dark); }
.stat-icon.teal { background: linear-gradient(135deg, var(--accent) 0%, #02c8b3 100%); color: white; }
.stat-icon.red { background: linear-gradient(135deg, var(--danger) 0%, #e35d6a 100%); color: white; }
.stat-info h4 { font-size: 0.7rem; color: var(--gray-600); margin-bottom: 2px; }
.stat-info .value { font-size: 1.3rem; font-weight: 700; color: var(--primary); }

.table-container { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
th, td { padding: 9px 10px; text-align: left; border-bottom: 1px solid var(--gray-200); }
th { background: var(--gray-100); font-weight: 600; color: var(--gray-700); font-size: 0.72rem; text-transform: uppercase; white-space: nowrap; }
th.sortable { cursor: pointer; user-select: none; }
th.sortable:hover { background: var(--gray-200); }
tr:hover { background: var(--gray-100); }
.clickable-row { cursor: pointer; }
.clickable-row:hover { background: #e3f2fd !important; }

.badge { display: inline-block; padding: 3px 8px; border-radius: 15px; font-size: 0.68rem; font-weight: 600; }
.badge-success { background: #d4edda; color: #155724; }
.badge-warning { background: #fff3cd; color: #856404; }
.badge-danger { background: #f8d7da; color: #721c24; }
.badge-info { background: #d1ecf1; color: #0c5460; }
.badge-secondary { background: #e2e3e5; color: #383d41; }
.badge-primary { background: #cce5ff; color: #004085; }
.badge-primary { background: #cce5ff; color: #004085; }
.badge-a2 { background: #e3f2fd; color: #1565c0; }
.badge-b1 { background: #fff8e1; color: #f57c00; }
.badge-b2 { background: #f3e5f5; color: #7b1fa2; }

.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: flex-start; z-index: 2000; opacity: 0; visibility: hidden; transition: all 0.2s ease; padding: 15px; overflow-y: auto; }
.modal-overlay.active { opacity: 1; visibility: visible; }
.modal { background: var(--white); border-radius: var(--radius-lg); width: 100%; max-width: 900px; margin: 15px auto; overflow: hidden; transform: scale(0.95); transition: all 0.2s ease; }
.modal-overlay.active .modal { transform: scale(1); }
.modal-header { padding: 14px 18px; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%); color: var(--white); display: flex; justify-content: space-between; align-items: center; }
.modal-header h3 { font-size: 1.05rem; }
.modal-close { background: none; border: none; color: var(--white); font-size: 1.4rem; cursor: pointer; }
.modal-body { padding: 18px; max-height: 75vh; overflow-y: auto; }
.modal-footer { padding: 12px 18px; background: var(--gray-100); display: flex; justify-content: flex-end; gap: 8px; }

.tabs { display: flex; border-bottom: 2px solid var(--gray-200); margin-bottom: 15px; gap: 3px; flex-wrap: wrap; }
.tab { padding: 10px 16px; background: none; border: none; cursor: pointer; font-size: 0.85rem; font-weight: 500; color: var(--gray-600); border-bottom: 3px solid transparent; margin-bottom: -2px; }
.tab:hover { color: var(--primary); background: var(--gray-100); }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); background: var(--white); }
.tab-content { display: none; }
.tab-content.active { display: block; }

.search-bar { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
.search-input { flex: 1; min-width: 140px; padding: 9px 12px; border: 2px solid var(--gray-300); border-radius: var(--radius); font-size: 0.85rem; }
.filter-select { padding: 9px 12px; border: 2px solid var(--gray-300); border-radius: var(--radius); font-size: 0.85rem; background: var(--white); }

.file-upload-zone { border: 3px dashed var(--gray-300); border-radius: var(--radius); padding: 22px; text-align: center; cursor: pointer; }
.file-upload-zone:hover { border-color: var(--primary); background: var(--gray-100); }

.alert { padding: 11px 14px; border-radius: var(--radius); margin-bottom: 14px; font-size: 0.82rem; }
.alert-info { background: #d1ecf1; color: #0c5460; border-left: 4px solid var(--info); }
.alert-success { background: #d4edda; color: #155724; border-left: 4px solid var(--success); }
.alert-warning { background: #fff3cd; color: #856404; border-left: 4px solid var(--warning); }
.alert-danger { background: #f8d7da; color: #721c24; border-left: 4px solid var(--danger); }

.notification { position: fixed; top: 20px; right: 20px; padding: 11px 18px; border-radius: var(--radius); box-shadow: 0 8px 25px rgba(0,0,0,0.15); z-index: 3000; animation: slideIn 0.3s ease-out; font-size: 0.85rem; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
.notification.success { background: var(--success); color: var(--white); }
.notification.error { background: var(--danger); color: var(--white); }

.section { display: none; }
.section.active { display: block; }

.info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
.info-item { padding: 12px; background: var(--gray-100); border-radius: var(--radius); }
.info-item label { display: block; font-size: 0.7rem; color: var(--gray-600); text-transform: uppercase; margin-bottom: 4px; }
.info-item .value { font-size: 1rem; font-weight: 600; color: var(--primary); }
.info-item input, .info-item select { width: 100%; padding: 8px; border: 1px solid var(--gray-300); border-radius: 6px; font-size: 0.9rem; }

.presence-grid { display: grid; gap: 8px; }
.presence-row { display: flex; align-items: center; padding: 10px 12px; background: var(--gray-100); border-radius: var(--radius); gap: 10px; }
.presence-row .nom { flex: 1; font-weight: 500; }
.presence-btn { padding: 6px 12px; border: 2px solid var(--gray-300); border-radius: 6px; background: white; cursor: pointer; font-size: 0.75rem; font-weight: 600; }
.presence-btn.active.present { background: var(--success); color: white; border-color: var(--success); }
.presence-btn.active.retard { background: var(--warning); color: var(--dark); border-color: var(--warning); }
.presence-btn.active.absent { background: var(--danger); color: white; border-color: var(--danger); }

.seance-card { background: var(--gray-100); border-radius: var(--radius); padding: 15px; margin-bottom: 10px; border-left: 4px solid var(--info); }
.seance-card.done { border-left-color: var(--success); }
.seance-card.cancelled { border-left-color: var(--danger); opacity: 0.7; }
.seance-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.seance-date { font-weight: 700; color: var(--primary); }
.seance-details { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; font-size: 0.85rem; }

.eval-table input { width: 60px; padding: 5px; text-align: center; border: 1px solid var(--gray-300); border-radius: 4px; }
.eval-header { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; align-items: center; }

.back-btn { display: inline-flex; align-items: center; gap: 5px; padding: 8px 15px; background: var(--gray-200); border-radius: var(--radius); cursor: pointer; font-size: 0.85rem; margin-bottom: 15px; }
.back-btn:hover { background: var(--gray-300); }

@media (max-width: 800px) {
    .sidebar { width: 55px; }
    .sidebar-header h2, .sidebar-header .user-info, .sidebar-header .user-role, .nav-section-title, .nav-item span, .session-selector { display: none; }
    .nav-item { justify-content: center; padding: 12px 5px; }
    .main-content { margin-left: 55px; padding: 12px; }
}
    </style>

function createSession(nom) {
    return {
        id: genId(), nom: nom,
        dateDebut: new Date().toISOString().slice(0,10), dateFin: '',
        classes: [], apprenants: [], professeurs: [], seances: [],
        finances: {
            depenses: [],
            deplacementsProfs: [],
            deplacementsApprenants: []
        }
    };
}

function genId() { return 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2,9); }
function formatDate(d) { return d ? new Date(d).toLocaleDateString('fr-FR') : '-'; }
function clean(v) { return (v === null || v === undefined || v === ' - - ' || v === '-' || v === '') ? '' : String(v).trim(); }
function num(v) { var n = parseFloat(clean(v)); return isNaN(n) ? null : n; }
function formatMoney(n) { return new Intl.NumberFormat('fr-FR').format(n) + ' KMF'; }
function notify(msg, type) { var n = document.createElement('div'); n.className = 'notification ' + type; n.textContent = msg; document.body.appendChild(n); setTimeout(function() { n.remove(); }, 3000); }

// Fonction pour obtenir le statut d'une session
function getSessionStatus(session) {
    if (!session) return 'unknown';
    var today = new Date().toISOString().slice(0, 10);
    
    if (!session.dateDebut && !session.dateFin) return 'active'; // Pas de dates = toujours active
    
    if (session.dateFin && session.dateFin < today) return 'terminee';
    if (session.dateDebut && session.dateDebut > today) return 'avenir';
    return 'active';
}

// Fonction pour obtenir le label du statut
function getSessionStatusLabel(status) {
    switch(status) {
        case 'terminee': return { text: 'Terminée', class: 'badge-secondary', icon: '✓' };
        case 'avenir': return { text: 'À venir', class: 'badge-info', icon: '📅' };
        case 'active': return { text: 'En cours', class: 'badge-success', icon: '▶' };
        default: return { text: 'Inconnue', class: 'badge-warning', icon: '?' };
    }
}

function getSession() { return DB.sessions.find(function(s) { return s.id === DB.currentSessionId; }); }
function save() { 
    try { 
        localStorage.setItem('PREFEC_DB_V13', JSON.stringify(DB)); 
        markUnsaved(false);
        // Sauvegarde Electron (fichier local)
        if (window.electronAPI && window.electronAPI.saveLocalData) {
            window.electronAPI.saveLocalData(DB);
        }
        // Auto-sync vers Firebase (silencieux)
        if (typeof pushProfsToFirebase === 'function') {
            clearTimeout(window.firebasePushTimeout);
            window.firebasePushTimeout = setTimeout(pushProfsToFirebase, 2000); // Délai de 2s pour éviter trop d'appels
        }

function load() {
    try {
        // D'abord, vérifier si des données sont embarquées
        if (typeof EMBEDDED_DATA !== 'undefined' && EMBEDDED_DATA && EMBEDDED_DATA.sessions) {
            console.log('Chargement des données embarquées...');
            DB.sessions = EMBEDDED_DATA.sessions || [];
            DB.currentSessionId = EMBEDDED_DATA.currentSessionId;
            DB.settings = EMBEDDED_DATA.settings || DB.settings;
            DB.admins = EMBEDDED_DATA.admins || DB.admins;
            console.log('Données embarquées chargées:', DB.sessions.length, 'sessions');
            // Sauvegarder dans localStorage pour les prochaines fois
            save();
        } else if (window.electronAPI && window.electronAPI.loadLocalData) {
            // Charger depuis Electron (fichier local)
            window.electronAPI.loadLocalData().then(function(result) {
                if (result.success && result.data) {
                    DB.sessions = result.data.sessions || [];
                    DB.currentSessionId = result.data.currentSessionId;
                    DB.settings = result.data.settings || DB.settings;
                    DB.admins = result.data.admins || DB.admins;
                    console.log('Données Electron chargées:', DB.sessions.length, 'sessions');
                    if (DB.currentUser) updateAll();
                }
            }).catch(function(e) { console.log('Electron load error:', e); });
            // Charger aussi depuis localStorage en backup
            var saved = localStorage.getItem('PREFEC_DB_V13');
            if (saved) {
                var data = JSON.parse(saved);
                DB.sessions = data.sessions || [];
                DB.currentSessionId = data.currentSessionId;
                DB.settings = data.settings || DB.settings;
                DB.admins = data.admins || DB.admins;
            }
        } else {
            // Sinon, charger depuis localStorage
            var saved = localStorage.getItem('PREFEC_DB_V13');
            if (saved) {
                var data = JSON.parse(saved);
                DB.sessions = data.sessions || [];
                DB.currentSessionId = data.currentSessionId;
                DB.settings = data.settings || DB.settings;
                DB.admins = data.admins || DB.admins;
            }
        }
        if (DB.sessions.length === 0) { var def = createSession('Session ' + new Date().getFullYear()); DB.sessions.push(def); DB.currentSessionId = def.id; save(); }
        if (!DB.currentSessionId) DB.currentSessionId = DB.sessions[0].id;
    } catch(e) { console.error(e); }
}

// ===== CALCULS =====
function calcHeuresSession(classeId) {
    var session = getSession(); if (!session) return 0;
    var total = 0;
    (session.seances || []).forEach(function(s) { 
        if (s.classeId === classeId && s.statut === 'done') {
            total += parseFloat(s.heures) || 0;
        }
    });
    return Math.round(total * 10) / 10;
}

function calcHeuresProf(profId) {
    var session = getSession(); 
    if (!session || !profId) return 0;
    
    var profIdStr = String(profId);
    var profClasses = session.classes.filter(function(c) { 
        return c.profId && String(c.profId) === profIdStr; 
    }).map(function(c) { return c.id; });
    
    var total = 0;
    (session.seances || []).forEach(function(s) { 
        if (profClasses.indexOf(s.classeId) !== -1 && s.statut === 'done') {
            total += parseFloat(s.heures) || 0;
        }
    });
    return Math.round(total * 10) / 10;
}

// Calcul du taux de présence - VERSION CORRIGÉE
function calcTauxPresence(apprenantId, classeId) {
    var session = getSession(); 
    if (!session) return null;
    
    // Trouver toutes les séances effectuées de cette classe
    var seancesEffectuees = (session.seances || []).filter(function(s) { 
        return s.classeId === classeId && s.statut === 'done';
    });
    
    if (seancesEffectuees.length === 0) return null;
    
    // Compter les présences
    var nbPresent = 0;
    var nbTotal = 0;
    
    seancesEffectuees.forEach(function(s) {
        if (s.presences && s.presences[apprenantId] !== undefined) {
            nbTotal++;
            if (s.presences[apprenantId] === 'present' || s.presences[apprenantId] === 'retard') {
                nbPresent++;
            }
        }
    });
    
    if (nbTotal === 0) return null;
    return Math.round((nbPresent / nbTotal) * 100);
}

// Calcul détaillé de l'assiduité avec stats
function calcAssiduiteDetail(apprenantId, classeId) {
    var session = getSession(); 
    if (!session) return { taux: null, present: 0, retard: 0, absent: 0, total: 0 };
    
    var result = { taux: null, present: 0, retard: 0, absent: 0, total: 0 };
    
    var seancesEffectuees = (session.seances || []).filter(function(s) { 
        return s.classeId === classeId && s.statut === 'done';
    });
    
    seancesEffectuees.forEach(function(s) {
        if (s.presences && s.presences[apprenantId] !== undefined) {
            result.total++;
            var status = s.presences[apprenantId];
            if (status === 'present') result.present++;
            else if (status === 'retard') result.retard++;
            else if (status === 'absent') result.absent++;
        }
    });
    
    if (result.total > 0) {
        result.taux = Math.round(((result.present + result.retard) / result.total) * 100);
    }
    
    return result;
}

// ===== CALCUL HEURES CUMULÉES PAR APPRENANT =====
// Calcule les heures totales d'un apprenant sur toutes les sessions par niveau
function calcHeuresCumuleesApprenant(apprenantNom) {
    var result = {
        parNiveau: {},  // { 'A2': { heures: X, sessions: [...] }, 'B1': {...} }
        total: 0
    };
    
    // Parcourir toutes les sessions
    DB.sessions.forEach(function(session) {
        // Trouver l'apprenant dans cette session (par nom car le matricule peut changer)
        var apprenant = session.apprenants.find(function(a) {
            return a.nom.toLowerCase() === apprenantNom.toLowerCase();
        });
        
        if (apprenant) {
            // Trouver sa classe
            var classe = session.classes.find(function(c) { return c.id === apprenant.classeId; });
            if (classe) {
                var niveau = classe.niveau || 'Autre';
                
                // Calculer les heures de présence dans cette classe
                var heures = 0;
                (session.seances || []).forEach(function(s) {
                    if (s.classeId === classe.id && s.statut === 'done') {
                        if (s.presences && (s.presences[apprenant.id] === 'present' || s.presences[apprenant.id] === 'retard')) {
                            heures += parseFloat(s.heures) || 0;
                        }
                    }
                });
                
                if (heures > 0) {
                    if (!result.parNiveau[niveau]) {
                        result.parNiveau[niveau] = { heures: 0, sessions: [] };
                    }
                    result.parNiveau[niveau].heures += heures;
                    result.parNiveau[niveau].sessions.push({
                        session: session.nom,
                        classe: classe.nom,
                        heures: heures
                    });
                    result.total += heures;
                }
            }
        }
    });
    
    return result;
}

// Obtenir le récapitulatif des heures par niveau pour tous les apprenants de la session courante
function getRecapHeuresNiveau() {
    var recap = {};
    var niveaux = ['A2', 'B1', 'B2'];
    
    niveaux.forEach(function(niv) {
        recap[niv] = { requis: niv === 'A2' ? 100 : (niv === 'B1' ? 160 : 200), apprenants: [] };
    });
    
    var session = getSession();
    if (!session) return recap;
    
    // Pour chaque apprenant de la session courante
    session.apprenants.forEach(function(a) {
        var cumul = calcHeuresCumuleesApprenant(a.nom);
        var classe = session.classes.find(function(c) { return c.id === a.classeId; });
        var niveauActuel = classe ? classe.niveau : 'Autre';
        
        // Calculer le total par niveau
        niveaux.forEach(function(niv) {
            if (cumul.parNiveau[niv]) {
                recap[niv].apprenants.push({
                    nom: a.nom,
                    heures: Math.round(cumul.parNiveau[niv].heures * 10) / 10,
                    niveauActuel: niveauActuel,
                    details: cumul.parNiveau[niv].sessions
                });
            }
        });
    });
    
    return recap;
}

// Fonction centralisée pour calculer la rémunération d'une classe - VERSION CORRIGÉE
function calcRemunerationClasse(classeId) {
    var session = getSession(); 
    if (!session) return { heures: 0, remuneration: 0, frais: 0, total: 0, seances: 0 };
    
    var result = { heures: 0, remuneration: 0, frais: 0, total: 0, seances: 0 };
    var classe = session.classes.find(function(c) { return c.id === classeId; });
    var tauxDefaut = (classe && classe.tauxHoraire) ? parseInt(classe.tauxHoraire) : (DB.settings.tauxHoraire || 5000);
    
    (session.seances || []).forEach(function(s) {
        if (s.classeId === classeId && s.statut === 'done') {
            var heures = parseFloat(s.heures) || 0;
            var taux = parseInt(s.tauxHoraire) || tauxDefaut;
            var frais = parseInt(s.autresFrais) || 0;
            
            result.heures += heures;
            result.remuneration += Math.round(heures * taux);
            result.frais += frais;
            result.seances++;
        }
    });
    
    result.heures = Math.round(result.heures * 10) / 10;
    result.total = result.remuneration + result.frais;
    return result;
}

// Fonction centralisée pour calculer la rémunération d'un prof - VERSION CORRIGÉE
function calcRemunerationProf(profId) {
    var session = getSession(); 
    if (!session || !profId) return { heures: 0, remuneration: 0, frais: 0, total: 0, seances: 0, classes: 0 };
    
    var result = { heures: 0, remuneration: 0, frais: 0, total: 0, seances: 0, classes: 0 };
    
    // Convertir profId en string pour comparaison cohérente
    var profIdStr = String(profId);
    
    // Trouver les classes de ce prof
    var profClasses = session.classes.filter(function(c) { 
        return c.profId && String(c.profId) === profIdStr; 
    });
    
    result.classes = profClasses.length;
    
    // Debug: console.log('Prof ' + profIdStr + ' a ' + profClasses.length + ' classes');
    
    profClasses.forEach(function(c) {
        var cr = calcRemunerationClasse(c.id);
        result.heures += cr.heures;
        result.remuneration += cr.remuneration;
        result.frais += cr.frais;
        result.seances += cr.seances;
    });
    
    result.heures = Math.round(result.heures * 10) / 10;
    result.total = result.remuneration + result.frais;
    return result;
}

function updateAll() {
    var session = getSession();
    if (!session) return;
    if (DB.currentUser.type === 'admin') {
        updateStats();
        renderClassesList();
        renderApprenantsTable();
        renderProfsTable();
        renderSessionsTable();
        populateFilters();
    }
}

function updateStats() {
    var session = getSession();
    document.getElementById('statClasses').textContent = session.classes.length;
    document.getElementById('statApprenants').textContent = session.apprenants.length;
    document.getElementById('statProfs').textContent = session.professeurs.length;
    
    var seancesEffectuees = (session.seances || []).filter(function(s) { return s.statut === 'done'; });
    var totalSeances = seancesEffectuees.length;
    document.getElementById('statSeances').textContent = totalSeances;
    
    // En-tête avec date actuelle
    var today = new Date();
    var moisNoms = ['janvier', 'février', 'mars', 'avril', 'mai', 'juin', 'juillet', 'août', 'septembre', 'octobre', 'novembre', 'décembre'];
    var joursNoms = ['Dimanche', 'Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi', 'Samedi'];
    
    var dateHeader = '<div class="card" style="margin-bottom:20px;background:linear-gradient(135deg,var(--primary) 0%,var(--primary-light) 100%);color:white;">';
    dateHeader += '<div class="card-body" style="display:flex;justify-content:space-between;align-items:center;padding:15px 20px;flex-wrap:wrap;gap:10px;">';
    dateHeader += '<div><div style="font-size:0.8rem;opacity:0.9;">Aujourd\'hui</div>';
    dateHeader += '<div style="font-size:1.3rem;font-weight:bold;">' + joursNoms[today.getDay()] + ' ' + today.getDate() + ' ' + moisNoms[today.getMonth()] + ' ' + today.getFullYear() + '</div></div>';
    dateHeader += '<div style="text-align:right;"><div style="font-size:0.8rem;opacity:0.9;">Session active</div>';
    dateHeader += '<div style="font-size:1.1rem;font-weight:bold;">' + session.nom + '</div></div>';
    dateHeader += '</div></div>';
    
    document.getElementById('adminDateHeader').innerHTML = dateHeader;
    
    // Vérifier jours fériés en cours ou à venir
    var todayStr = today.toISOString().slice(0, 10);
    var feries = DB.settings.joursFeries || [];
    var ferieEnCours = feries.find(function(f) { return f.debut <= todayStr && f.fin >= todayStr; });
    var prochainFerie = feries.filter(function(f) { return f.debut > todayStr; }).sort(function(a, b) { return a.debut.localeCompare(b.debut); })[0];
    
    var ferieHtml = '';
    if (ferieEnCours) {
        ferieHtml += '<div class="alert alert-danger" style="margin-bottom:15px;">🚫 <strong>Période fériée en cours :</strong> ' + ferieEnCours.nom + ' (jusqu\'au ' + formatDate(ferieEnCours.fin) + ')</div>';
    }
    if (prochainFerie && !ferieEnCours) {
        var joursAvant = Math.ceil((new Date(prochainFerie.debut) - today) / (1000 * 60 * 60 * 24));
        if (joursAvant <= 7) {
            ferieHtml += '<div class="alert alert-warning" style="margin-bottom:15px;">⏰ <strong>À venir dans ' + joursAvant + ' jour(s) :</strong> ' + prochainFerie.nom + ' (du ' + formatDate(prochainFerie.debut) + ' au ' + formatDate(prochainFerie.fin) + ')</div>';
        }
    }
    document.getElementById('adminFerieAlert').innerHTML = ferieHtml;
    
    // Tableau récapitulatif des formateurs avec rémunération
    if (session.professeurs.length === 0) {
        document.getElementById('salaireContainer').innerHTML = '<p style="color:var(--gray-500);">Aucun formateur</p>';
        return;
    }
    
    var html = '<table><thead><tr><th>Formateur</th><th>Classes</th><th>Séances</th><th>Heures</th><th>Rémunération</th><th>Frais</th><th style="color:var(--success);">Total</th></tr></thead><tbody>';
    
    var grandTotal = { heures: 0, rem: 0, frais: 0, seances: 0, classes: 0 };
    
    session.professeurs.forEach(function(p) {
        var profIdStr = String(p.id);
        
        // Trouver les classes de ce prof
        var profClasses = session.classes.filter(function(c) { 
            return c.profId && String(c.profId) === profIdStr; 
        });
        
        // Utiliser calcRemunerationClasse pour chaque classe
        var totalHeures = 0, totalRem = 0, totalFrais = 0, nbSeances = 0;
        
        for (var i = 0; i < profClasses.length; i++) {
            var c = profClasses[i];
            var calc = calcRemunerationClasse(c.id);
            totalHeures += calc.heures;
            totalRem += calc.remuneration;
            totalFrais += calc.frais;
            nbSeances += calc.seances;
        }
        
        totalHeures = Math.round(totalHeures * 10) / 10;
        
        grandTotal.heures += totalHeures;
        grandTotal.rem += totalRem;
        grandTotal.frais += totalFrais;
        grandTotal.seances += nbSeances;
        grandTotal.classes += profClasses.length;
        
        html += '<tr>' +
            '<td><strong>' + p.nom + '</strong></td>' +
            '<td>' + profClasses.length + '</td>' +
            '<td>' + nbSeances + '</td>' +
            '<td><strong>' + totalHeures + 'h</strong></td>' +
            '<td>' + formatMoney(totalRem) + '</td>' +
            '<td>' + formatMoney(totalFrais) + '</td>' +
            '<td style="color:var(--success);font-weight:bold;">' + formatMoney(totalRem + totalFrais) + '</td>' +
            '</tr>';
    });
    
    html += '</tbody>';
    html += '<tfoot><tr style="background:var(--gray-100);font-weight:bold;">' +
        '<td>TOTAL</td>' +
        '<td>' + grandTotal.classes + '</td>' +
        '<td>' + grandTotal.seances + '</td>' +
        '<td>' + grandTotal.heures + 'h</td>' +
        '<td>' + formatMoney(grandTotal.rem) + '</td>' +
        '<td>' + formatMoney(grandTotal.frais) + '</td>' +
        '<td style="color:var(--success);font-size:1.1rem;">' + formatMoney(grandTotal.rem + grandTotal.frais) + '</td>' +
        '</tr></tfoot>';
    html += '</table>';
    
    document.getElementById('salaireContainer').innerHTML = html;
}

// ===== CLASSES =====
function renderClassesList() {
    var session = getSession();
    var search = (document.getElementById('searchClasses')?.value || '').toLowerCase();
    var niveau = document.getElementById('filterNiveau')?.value || '';
    var sortBy = document.getElementById('sortClasses')?.value || 'nom';
    
    // Filtrer
    var classes = session.classes.filter(function(c) {
        var matchSearch = c.nom.toLowerCase().indexOf(search) !== -1;
        var matchNiveau = !niveau || c.niveau === niveau;
        return matchSearch && matchNiveau;
    });
    
    // Ajouter les données de calcul pour le tri
    classes = classes.map(function(c) {
        var profIdStr = c.profId ? String(c.profId) : '';
        var prof = profIdStr ? session.professeurs.find(function(p) { return String(p.id) === profIdStr; }) : null;
        var nbEleves = session.apprenants.filter(function(a) { return a.classeId === c.id; }).length;
        var calc = calcRemunerationClasse(c.id);
        return { classe: c, prof: prof, nbEleves: nbEleves, calc: calc };
    });
    
    // Trier
    classes.sort(function(a, b) {
        if (sortBy === 'nom') return a.classe.nom.localeCompare(b.classe.nom);
        if (sortBy === 'niveau') return (a.classe.niveau || '').localeCompare(b.classe.niveau || '');
        if (sortBy === 'heures') return b.calc.heures - a.calc.heures;
        if (sortBy === 'eleves') return b.nbEleves - a.nbEleves;
        if (sortBy === 'prof') return (a.prof ? a.prof.nom : 'ZZZ').localeCompare(b.prof ? b.prof.nom : 'ZZZ');
        return 0;
    });
    
    var html = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:15px;">';
    classes.forEach(function(item) {
        var c = item.classe;
        var prof = item.prof;
        var nbEleves = item.nbEleves;
        var calc = item.calc;
        
        html += '<div class="card" style="cursor:pointer;margin:0;" onclick="openClasseDetail(\'' + c.id + '\')">';
        html += '<div class="card-header"><h3>' + c.nom + '</h3><span class="badge badge-' + c.niveau.toLowerCase() + '">' + c.niveau + (c.sousNiveau ? ' ' + c.sousNiveau : '') + '</span></div>';
        html += '<div class="card-body">';
        html += '<p><strong>📍 Lieu:</strong> ' + (c.lieu || DB.settings.cipr || '-') + '</p>';
        html += '<p><strong>🎓 Formateur:</strong> ' + (prof ? prof.nom : '-') + '</p>';
        html += '<p><strong>👥 Élèves:</strong> ' + nbEleves + '</p>';
        html += '<p><strong>⏱️ Heures:</strong> ' + calc.heures + '/' + (c.heuresSession || 26) + 'h (session)</p>';
        html += '<p><strong>📊 Total module:</strong> ' + (c.heuresPrevues || 100) + 'h</p>';
        if (calc.total > 0) {
            html += '<p style="color:var(--success);font-weight:bold;"><strong>💰 Rémunération:</strong> ' + formatMoney(calc.total) + '</p>';
        }
        html += '</div></div>';
    });
    html += '</div>';
    document.getElementById('classesList').innerHTML = html;
}

function switchClasseTab(btn, tabId) {
    btn.parentElement.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    btn.classList.add('active');
    btn.closest('.card-body').querySelectorAll('.tab-content').forEach(function(tc) { tc.classList.remove('active'); });
    document.getElementById(tabId).classList.add('active');
}

function updateClasseInfo() {
    var session = getSession();
    var c = session.classes.find(function(cl) { return cl.id === DB.editingId; });
    if (!c) return;
    
    c.nom = document.getElementById('infoNom').value.trim();
    c.lieu = document.getElementById('infoLieu').value.trim();
    c.niveau = document.getElementById('infoNiveau').value;
    c.sousNiveau = document.getElementById('infoSousNiveau').value;
    c.heuresPrevues = parseInt(document.getElementById('infoHeuresPrevues').value) || 100;
    c.heuresSession = parseInt(document.getElementById('infoHeuresSession').value) || 26;
    c.trancheAge = document.getElementById('infoAge').value.trim();
    c.dateDebut = document.getElementById('infoDebut').value;
    c.dateFin = document.getElementById('infoFin').value;
    c.salle = document.getElementById('infoSalle').value.trim();
    c.profId = document.getElementById('infoProf').value;
    c.tauxHoraire = parseInt(document.getElementById('infoTaux').value) || DB.settings.tauxHoraire;
    
    save();
}

function updateHeuresPrevues() {
    var niveau = document.getElementById('infoNiveau').value;
    var heures = 100;
    if (niveau === 'B1') heures = 160;
    else if (niveau === 'B2') heures = 200;
    document.getElementById('infoHeuresPrevues').value = heures;
    updateClasseInfo();
}

function calcDureeCreneau(debut, fin) {
    if (!debut || !fin) return 2;
    var hd = debut.split(':'), hf = fin.split(':');
    var duree = (parseInt(hf[0]) + parseInt(hf[1])/60) - (parseInt(hd[0]) + parseInt(hd[1])/60);
    return Math.round(duree * 10) / 10;
}

function toggleCreneau(jour) {
    var session = getSession();
    var c = session.classes.find(function(cl) { return cl.id === DB.editingId; });
    if (!c) return;
    
    if (!c.creneaux) c.creneaux = {};
    var cb = document.querySelector('.creneauActif[data-jour="' + jour + '"]');
    var debutInput = document.querySelector('.creneauDebut[data-jour="' + jour + '"]');
    var finInput = document.querySelector('.creneauFin[data-jour="' + jour + '"]');
    var row = cb.closest('.creneau-row');
    
    if (!c.creneaux[jour]) {
        c.creneaux[jour] = { actif: false, debut: '08:00', fin: '10:00' };
    }
    
    c.creneaux[jour].actif = cb.checked;
    
    if (cb.checked) {
        row.style.background = '#e8f5e9';
        row.style.borderLeftColor = 'var(--success)';
        debutInput.disabled = false;
        finInput.disabled = false;
        debutInput.parentElement.style.opacity = '1';
    } else {
        row.style.background = 'var(--gray-100)';
        row.style.borderLeftColor = 'var(--gray-300)';
        debutInput.disabled = true;
        finInput.disabled = true;
        debutInput.parentElement.style.opacity = '0.5';
    }
    
    save();
    updateApercuHeures();
}

function updateCreneau(jour) {
    var session = getSession();
    var c = session.classes.find(function(cl) { return cl.id === DB.editingId; });
    if (!c) return;
    
    if (!c.creneaux) c.creneaux = {};
    if (!c.creneaux[jour]) c.creneaux[jour] = { actif: true, debut: '08:00', fin: '10:00' };
    
    var debutInput = document.querySelector('.creneauDebut[data-jour="' + jour + '"]');
    var finInput = document.querySelector('.creneauFin[data-jour="' + jour + '"]');

// Calculer la date de fin estimée en fonction des heures et créneaux
function calculerDateFinEstimee(dateDebut, heuresVoulues, creneaux) {
    if (!dateDebut || heuresVoulues <= 0) return null;
    
    var feries = DB.settings.joursFeries || [];
    
    function estFerie(dateStr) {
        for (var i = 0; i < feries.length; i++) {
            if (dateStr >= feries[i].debut && dateStr <= feries[i].fin) {
                return true;
            }
        }
        return false;
    }
    
    var heuresCumulees = 0;
    var current = new Date(dateDebut);
    var maxIterations = 365; // Sécurité: max 1 an
    var iterations = 0;
    
    while (heuresCumulees < heuresVoulues && iterations < maxIterations) {
        var jourSemaine = current.getDay();
        if (jourSemaine === 0) jourSemaine = 7;
        
        var dateStr = current.toISOString().slice(0, 10);
        
        if (creneaux[jourSemaine] && creneaux[jourSemaine].actif && !estFerie(dateStr)) {
            var duree = calcDureeCreneau(creneaux[jourSemaine].debut, creneaux[jourSemaine].fin);
            heuresCumulees += duree;
        }
        
        current.setDate(current.getDate() + 1);
        iterations++;
    }
    
    // Revenir d'un jour car on a dépassé
    current.setDate(current.getDate() - 1);
    return current.toISOString().slice(0, 10);
}

function genererSeancesAuto(classeId) {
    var session = getSession();
    var c = session.classes.find(function(cl) { return cl.id === classeId; });
    if (!c) return;
    
    if (!c.dateDebut || !c.dateFin) {
        notify('Définissez les dates de début et fin', 'error');
        return;
    }
    
    // Vérifier qu'au moins un créneau est actif
    var creneaux = c.creneaux || {};
    var joursActifs = [];
    for (var j = 1; j <= 6; j++) {
        if (creneaux[j] && creneaux[j].actif) {
            joursActifs.push(j);
        }
    }
    
    if (joursActifs.length === 0) {
        notify('Sélectionnez au moins un jour de cours avec ses horaires', 'error');
        return;
    }
    
    var aujourdhui = new Date().toISOString().slice(0, 10);
    var joursNoms = ['', 'Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi', 'Samedi'];
    var feries = DB.settings.joursFeries || [];
    
    // Fonction pour vérifier si une date est fériée
    function estFerie(dateStr) {
        for (var i = 0; i < feries.length; i++) {
            if (dateStr >= feries[i].debut && dateStr <= feries[i].fin) {
                return feries[i];
            }
        }
        return null;
    }
    
    // Générer les dates
    var debut = new Date(c.dateDebut);
    var fin = new Date(c.dateFin);
    var nouvSeances = [];
    var totalHeures = 0;
    var joursExclus = 0;
    
    var current = new Date(debut);
    while (current <= fin) {
        var jourSemaine = current.getDay(); // 0=Dim, 1=Lun, etc.
        if (jourSemaine === 0) jourSemaine = 7; // Dimanche = 7
        
        // Vérifier si ce jour a un créneau actif
        if (creneaux[jourSemaine] && creneaux[jourSemaine].actif) {
            var cr = creneaux[jourSemaine];
            var duree = calcDureeCreneau(cr.debut, cr.fin);
            var dateStr = current.toISOString().slice(0, 10);
            
            // Vérifier si ce jour est férié
            var ferie = estFerie(dateStr);
            if (ferie) {
                joursExclus++;
            } else {
                // Déterminer le statut : si la date est passée, marquer comme effectuée
                var statut = dateStr < aujourdhui ? 'done' : 'planned';
                
                nouvSeances.push({
                    id: genId(),
                    classeId: classeId,
                    date: dateStr,
                    heureDebut: cr.debut,
                    heureFin: cr.fin,
                    heures: duree,
                    salle: c.salle || '',
                    tauxHoraire: c.tauxHoraire || DB.settings.tauxHoraire,
                    autresFrais: 0,
                    statut: statut,
                    presences: {}
                });
                
                totalHeures += duree;
            }
        }
        
        current.setDate(current.getDate() + 1);
    }
    
    if (nouvSeances.length === 0) {
        notify('Aucune séance générée. Vérifiez les dates et créneaux.', 'error');
        return;
    }
    
    // Compter les séances passées vs planifiées
    var nbPassees = nouvSeances.filter(function(s) { return s.statut === 'done'; }).length;
    var nbPlanifiees = nouvSeances.length - nbPassees;
    
    // Résumé des créneaux
    var resumeCreneaux = joursActifs.map(function(j) {
        var cr = creneaux[j];
        return joursNoms[j] + ' ' + cr.debut + '-' + cr.fin + ' (' + calcDureeCreneau(cr.debut, cr.fin) + 'h)';
    }).join('\n');
    
    // Demander confirmation
    var msg = 'Générer ' + nouvSeances.length + ' séances ?\n\n' +
        '📅 Créneaux:\n' + resumeCreneaux + '\n\n' +
        '⏱️ Total: ' + Math.round(totalHeures * 10) / 10 + ' heures\n' +
        '✅ Passées (effectuées): ' + nbPassees + '\n' +
        '📋 À venir (planifiées): ' + nbPlanifiees;
    
    if (joursExclus > 0) {
        msg += '\n🚫 Jours fériés exclus: ' + joursExclus;
    }
    
    if (!confirm(msg)) {
        return;
    }
    
    // Supprimer les anciennes séances et ajouter les nouvelles
    if (!session.seances) session.seances = [];
    session.seances = session.seances.filter(function(s) {
        return s.classeId !== classeId;
    });
    session.seances = session.seances.concat(nouvSeances);
    
    save();
    openClasseDetail(classeId);
    
    // Ouvrir l'onglet séances
    setTimeout(function() {
        var btn = document.querySelector('[onclick*="tabSeances"]');
        if (btn) switchClasseTab(btn, 'tabSeances');
    }, 100);
    
    notify(nouvSeances.length + ' séances générées (' + nbPassees + ' effectuées, ' + nbPlanifiees + ' planifiées)', 'success');
}

// Reporter une classe vers la session suivante avec les heures restantes
function reporterClasseSessionSuivante(classeId) {
    var session = getSession();
    var c = session.classes.find(function(cl) { return cl.id === classeId; });
    if (!c) return;
    
    // Calculer les heures effectuées
    var calc = calcRemunerationClasse(classeId);
    var heuresEffectuees = calc.heures;
    var heuresSession = c.heuresSession || 26;
    var heuresRestantes = Math.max(0, heuresSession - heuresEffectuees);
    
    // Trouver les autres sessions
    var autresSessions = DB.sessions.filter(function(s) { return s.id !== session.id; });
    
    if (autresSessions.length === 0) {
        // Proposer de créer une nouvelle session
        var nomSession = prompt('Aucune autre session trouvée.\nCréer une nouvelle session?\n\nNom de la session:', 'Session Suivante');
        if (!nomSession) return;
        
        var newSession = createSession(nomSession);
        DB.sessions.push(newSession);
        autresSessions = [newSession];
    }
    
    // Sélectionner la session cible
    var sessionOptions = autresSessions.map(function(s, i) { return (i + 1) + '. ' + s.nom; }).join('\n');
    var choix = prompt('Reporter les heures restantes de "' + c.nom + '"\n\n' +
        '📊 Heures effectuées: ' + heuresEffectuees + 'h / ' + heuresSession + 'h\n' +
        '📤 Heures à reporter: ' + heuresRestantes + 'h\n\n' +
        'Sélectionnez la session cible:\n' + sessionOptions + '\n\nEntrez le numéro:');
    
    if (!choix) return;
    var idx = parseInt(choix) - 1;
    if (idx < 0 || idx >= autresSessions.length) {
        notify('Choix invalide', 'error');
        return;
    }
    
    var sessionCible = autresSessions[idx];
    
    // Ouvrir le modal de configuration
    openReporterClasseModal(classeId, sessionCible.id, heuresRestantes);
}

function executerReport(classeIdSource, sessionCibleId) {
    var session = getSession();
    var c = session.classes.find(function(cl) { return cl.id === classeIdSource; });
    var sessionCible = DB.sessions.find(function(s) { return s.id === sessionCibleId; });
    var eleves = session.apprenants.filter(function(a) { return a.classeId === classeIdSource; });
    
    // Récupérer les valeurs du formulaire
    var nom = document.getElementById('reportNom').value.trim();
    var niveau = document.getElementById('reportNiveau').value;
    var sousNiveau = document.getElementById('reportSousNiveau').value;
    var heuresSession = parseInt(document.getElementById('reportHeures').value) || 26;
    var profId = document.getElementById('reportProf').value;
    var dateDebut = document.getElementById('reportDateDebut').value;
    var dateFin = document.getElementById('reportDateFin').value;
    
    // Récupérer les créneaux
    var creneaux = {};
    for (var j = 1; j <= 6; j++) {
        var actif = document.querySelector('.reportCreneauActif[data-jour="' + j + '"]').checked;
        var debut = document.querySelector('.reportCreneauDebut[data-jour="' + j + '"]').value;
        var fin = document.querySelector('.reportCreneauFin[data-jour="' + j + '"]').value;
        creneaux[j] = { actif: actif, debut: debut, fin: fin };
    }
    
    // Créer la nouvelle classe
    var newClasseId = genId();
    var newClasse = {
        id: newClasseId,
        nom: nom,
        niveau: niveau,
        sousNiveau: sousNiveau,
        lieu: c.lieu || DB.settings.cipr,
        profId: profId,
        heuresPrevues: c.heuresPrevues || getObjectifHeures(niveau),
        heuresSession: heuresSession,
        tauxHoraire: c.tauxHoraire || DB.settings.tauxHoraire,
        trancheAge: c.trancheAge || '',
        salle: c.salle || '',
        dateDebut: dateDebut,
        dateFin: dateFin,
        creneaux: creneaux,
        sourceClasseId: classeIdSource, // Lien vers la classe d'origine pour le suivi
        sourceSessionId: session.id
    };
    
    if (!sessionCible.classes) sessionCible.classes = [];
    sessionCible.classes.push(newClasse);
    
    // Copier les élèves
    if (!sessionCible.apprenants) sessionCible.apprenants = [];
    eleves.forEach(function(e) {
        // Vérifier si l'élève n'existe pas déjà (par nom)
        var existe = sessionCible.apprenants.find(function(a) { 
            return a.nom.toLowerCase() === e.nom.toLowerCase(); 
        });
        
        if (!existe) {
            sessionCible.apprenants.push({
                id: genId(),
                nom: e.nom,
                matricule: e.matricule,
                adresse: e.adresse,
                nin: e.nin,
                classeId: newClasseId
            });
        } else {
            // Mettre à jour la classe de l'élève existant
            existe.classeId = newClasseId;
        }
    });
    
    save();
    closeModal();
    
    notify('✓ Classe "' + nom + '" créée dans ' + sessionCible.nom + ' avec ' + eleves.length + ' élèves', 'success');
    
    // Proposer d'aller à la session cible
    if (confirm('Voulez-vous basculer vers la session "' + sessionCible.nom + '" ?')) {
        DB.currentSessionId = sessionCibleId;
        save();
        updateAll();
    }
}

function renderSeancesList(seances, classeId) {
    if (seances.length === 0) return '<p style="color:var(--gray-500);">Aucune séance</p>';
    
    var totalHeures = 0, totalRem = 0, totalFrais = 0;
    var nbEffectuees = 0, nbPlanifiees = 0, nbAnnulees = 0;
    
    var html = seances.map(function(s) {
        var statusClass = s.statut === 'done' ? 'done' : s.statut === 'cancelled' ? 'cancelled' : '';
        var heures = parseFloat(s.heures) || 0;
        var taux = parseInt(s.tauxHoraire) || DB.settings.tauxHoraire;
        var frais = parseInt(s.autresFrais) || 0;
        var rem = heures * taux;
        
        if (s.statut === 'done') {
            totalHeures += heures;
            totalRem += rem;
            totalFrais += frais;
            nbEffectuees++;
        } else if (s.statut === 'cancelled') {
            nbAnnulees++;
        } else {
            nbPlanifiees++;
        }
        
        return '<div class="seance-card ' + statusClass + '">' +
            '<div class="seance-header"><span class="seance-date">' + formatDate(s.date) + '</span>' +
            '<div><button class="btn btn-sm btn-secondary" onclick="editSeance(\'' + s.id + '\',\'' + classeId + '\')">✏️</button> ' +
            '<button class="btn btn-sm btn-danger" onclick="deleteSeance(\'' + s.id + '\',\'' + classeId + '\')">🗑️</button></div></div>' +
            '<div class="seance-details">' +
            '<div><strong>Horaires:</strong> ' + (s.heureDebut || '-') + ' - ' + (s.heureFin || '-') + '</div>' +
            '<div><strong>Durée:</strong> ' + heures + 'h</div>' +
            '<div><strong>Salle:</strong> ' + (s.salle || '-') + '</div>' +
            '<div><strong>Statut:</strong> <span class="badge badge-' + (s.statut === 'done' ? 'success' : s.statut === 'cancelled' ? 'danger' : 'info') + '">' + (s.statut === 'done' ? 'Effectuée' : s.statut === 'cancelled' ? 'Annulée' : 'Planifiée') + '</span></div>' +
            '<div><strong>Rém.:</strong> ' + formatMoney(rem) + '</div>' +
            (frais > 0 ? '<div><strong>Frais:</strong> ' + formatMoney(frais) + '</div>' : '') +
            '</div></div>';
    }).join('');
    
    // Résumé en haut
    var resume = '<div class="alert alert-success" style="margin-bottom:15px;">' +
        '<div style="display:flex;flex-wrap:wrap;gap:20px;align-items:center;">' +
        '<div><strong>📊 Résumé:</strong></div>' +
        '<div>✅ Effectuées: <strong>' + nbEffectuees + '</strong></div>' +
        '<div>📋 Planifiées: <strong>' + nbPlanifiees + '</strong></div>' +
        (nbAnnulees > 0 ? '<div>❌ Annulées: <strong>' + nbAnnulees + '</strong></div>' : '') +
        '<div>⏱️ Heures: <strong>' + Math.round(totalHeures * 10) / 10 + 'h</strong></div>' +
        '<div>💰 Rémunération: <strong style="color:var(--success);">' + formatMoney(totalRem) + '</strong></div>' +
        (totalFrais > 0 ? '<div>📝 Autres frais: <strong>' + formatMoney(totalFrais) + '</strong></div>' : '') +
        '<div style="font-size:1.1rem;border-left:2px solid var(--success);padding-left:10px;">TOTAL: <strong style="color:var(--success);">' + formatMoney(totalRem + totalFrais) + '</strong></div>' +
        '</div></div>';
    
    return resume + html;
}

function addSeance(classeId) {
    var session = getSession();
    var c = session.classes.find(function(cl) { return cl.id === classeId; });
    
    var content = '<div class="form-grid">' +
        '<div class="form-group"><label>Date *</label><input type="date" id="seanceDate" value="' + new Date().toISOString().slice(0,10) + '"></div>' +
        '<div class="form-group"><label>Heure début</label><input type="time" id="seanceDebut" value="08:00"></div>' +
        '<div class="form-group"><label>Heure fin</label><input type="time" id="seanceFin" value="10:00"></div>' +
        '<div class="form-group"><label>Salle</label><input type="text" id="seanceSalle" value="' + (c.salle || '') + '"></div>' +
        '<div class="form-group"><label>Rém./heure (KMF)</label><input type="number" id="seanceTaux" value="' + (c.tauxHoraire || DB.settings.tauxHoraire) + '"></div>' +
        '<div class="form-group"><label>Autres frais (KMF)</label><input type="number" id="seanceFrais" value="0"></div>' +
        '<div class="form-group"><label>Statut</label><select id="seanceStatut"><option value="planned">Planifiée</option><option value="done">Effectuée</option><option value="cancelled">Annulée</option></select></div>' +
        '</div>';
    
    showModal('➕ Nouvelle séance', content, function() {
        var date = document.getElementById('seanceDate').value;
        if (!date) { notify('Date requise', 'error'); return; }
        
        var debut = document.getElementById('seanceDebut').value;
        var fin = document.getElementById('seanceFin').value;
        var heures = 2;
        if (debut && fin) {
            var d = debut.split(':'), f = fin.split(':');
            heures = Math.round(((parseInt(f[0]) + parseInt(f[1])/60) - (parseInt(d[0]) + parseInt(d[1])/60)) * 10) / 10;
            if (heures <= 0) heures = 2;
        }
        
        if (!session.seances) session.seances = [];
        session.seances.push({
            id: genId(),
            classeId: classeId,
            date: date,
            heureDebut: debut,
            heureFin: fin,
            heures: heures,
            salle: document.getElementById('seanceSalle').value.trim(),
            tauxHoraire: parseInt(document.getElementById('seanceTaux').value) || DB.settings.tauxHoraire,
            autresFrais: parseInt(document.getElementById('seanceFrais').value) || 0,
            statut: document.getElementById('seanceStatut').value,
            presences: {}
        });
        
        save();
        closeModal();
        openClasseDetail(classeId);
        notify('Séance ajoutée', 'success');
    });
}

function editSeance(seanceId, classeId) {
    var session = getSession();

    if (!s) return;
    
    var content = '<div class="form-grid">' +

        '<div class="form-group"><label>Heure début</label><input type="time" id="seanceDebut" value="' + (s.heureDebut || '') + '"></div>' +
        '<div class="form-group"><label>Heure fin</label><input type="time" id="seanceFin" value="' + (s.heureFin || '') + '"></div>' +

        '<div class="form-group"><label>Salle</label><input type="text" id="seanceSalle" value="' + (s.salle || '') + '"></div>' +
        '<div class="form-group"><label>Rém./heure (KMF)</label><input type="number" id="seanceTaux" value="' + (s.tauxHoraire || DB.settings.tauxHoraire) + '"></div>' +
        '<div class="form-group"><label>Autres frais (KMF)</label><input type="number" id="seanceFrais" value="' + (s.autresFrais || 0) + '"></div>' +
        '<div class="form-group"><label>Statut</label><select id="seanceStatut"><option value="planned"' + (s.statut === 'planned' ? ' selected' : '') + '>Planifiée</option><option value="done"' + (s.statut === 'done' ? ' selected' : '') + '>Effectuée</option><option value="cancelled"' + (s.statut === 'cancelled' ? ' selected' : '') + '>Annulée</option></select></div>' +
        '</div>';
    
    showModal('✏️ Modifier séance', content, function() {
        s.date = document.getElementById('seanceDate').value;
        s.heureDebut = document.getElementById('seanceDebut').value;
        s.heureFin = document.getElementById('seanceFin').value;
        s.heures = parseFloat(document.getElementById('seanceHeures').value) || 2;
        s.salle = document.getElementById('seanceSalle').value.trim();
        s.tauxHoraire = parseInt(document.getElementById('seanceTaux').value) || DB.settings.tauxHoraire;

function deleteSeance(seanceId, classeId) {
    if (!confirm('Supprimer cette séance ?')) return;
    var session = getSession();
    session.seances = (session.seances || []).filter(function(s) { return s.id !== seanceId; });
    save();
    openClasseDetail(classeId);
    notify('Séance supprimée', 'success');
}

function loadPresences(classeId) {
    var session = getSession();
    var seanceSelect = document.getElementById('presenceSeance');
    if (!seanceSelect) return;
    
    var seanceId = seanceSelect.value;
    if (!seanceId) return;
    
    var seance = (session.seances || []).find(function(s) { return s.id === seanceId; });
    var eleves = session.apprenants.filter(function(a) { return a.classeId === classeId; });
    
    if (!seance || eleves.length === 0) return;
    
    var nbPresent = 0, nbRetard = 0, nbAbsent = 0, nbNonMarque = 0;
    
    var html = '<div class="presence-grid">';
    eleves.forEach(function(a, idx) {
        var status = seance.presences ? seance.presences[a.id] : null;
        if (status === 'present') nbPresent++;
        else if (status === 'retard') nbRetard++;
        else if (status === 'absent') nbAbsent++;
        else nbNonMarque++;
        
        // Calculer assiduité globale
        var assi = calcAssiduiteDetail(a.id, classeId);
        var assiText = assi.taux !== null ? ' <span style="font-size:0.7rem;color:var(--gray-500);">(global: ' + assi.taux + '%)</span>' : '';
        
        html += '<div class="presence-row" data-apprenant="' + a.id + '" style="padding:12px;">' +
            '<span style="width:30px;font-weight:bold;color:var(--gray-600);">' + (idx + 1) + '.</span>' +
            '<span class="nom" style="flex:1;font-size:1rem;">' + a.nom + assiText + '</span>' +
            '<div style="display:flex;gap:5px;">' +
            '<button class="presence-btn present' + (status === 'present' ? ' active' : '') + '" onclick="setPresenceBtn(this,\'present\')" style="min-width:45px;">✅ P</button>' +
            '<button class="presence-btn retard' + (status === 'retard' ? ' active' : '') + '" onclick="setPresenceBtn(this,\'retard\')" style="min-width:45px;">⏰ R</button>' +
            '<button class="presence-btn absent' + (status === 'absent' ? ' active' : '') + '" onclick="setPresenceBtn(this,\'absent\')" style="min-width:45px;">❌ A</button>' +
            '</div></div>';
    });
    html += '</div>';
    
    // Boutons rapides
    html = '<div style="margin-bottom:15px;display:flex;gap:10px;flex-wrap:wrap;">' +
        '<button class="btn btn-success btn-sm" onclick="setAllPresences(\'present\')">✅ Tous présents</button>' +
        '<button class="btn btn-warning btn-sm" onclick="setAllPresences(\'retard\')">⏰ Tous en retard</button>' +
        '<button class="btn btn-danger btn-sm" onclick="setAllPresences(\'absent\')">❌ Tous absents</button>' +
        '</div>' + html;
    
    document.getElementById('presencesList').innerHTML = html;
    
    // Stats
    var statsHtml = '<span class="badge badge-success" style="font-size:0.85rem;">✅ P: ' + nbPresent + '</span> ';
    statsHtml += '<span class="badge badge-warning" style="font-size:0.85rem;">⏰ R: ' + nbRetard + '</span> ';
    statsHtml += '<span class="badge badge-danger" style="font-size:0.85rem;">❌ A: ' + nbAbsent + '</span>';
    if (nbNonMarque > 0) statsHtml += ' <span class="badge badge-info" style="font-size:0.85rem;">❓ Non marqué: ' + nbNonMarque + '</span>';
    
    var presenceStatsDiv = document.getElementById('presenceStats');
    if (presenceStatsDiv) presenceStatsDiv.innerHTML = statsHtml;
}

function setAllPresences(status) {
    document.querySelectorAll('#presencesList .presence-row').forEach(function(row) {
        row.querySelectorAll('.presence-btn').forEach(function(b) { b.classList.remove('active'); });
        row.querySelector('.presence-btn.' + status).classList.add('active');
    });
}

function setPresenceBtn(btn, status) {
    var row = btn.closest('.presence-row');
    row.querySelectorAll('.presence-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
}

function savePresences(classeId) {
    var session = getSession();
    var seanceSelect = document.getElementById('presenceSeance');
    if (!seanceSelect) return;
    
    var seanceId = seanceSelect.value;
    var seance = (session.seances || []).find(function(s) { return s.id === seanceId; });
    
    if (!seance) {
        notify('Sélectionnez une séance', 'error');
        return;
    }
    
    if (!seance.presences) seance.presences = {};
    
    var nbSaved = 0;
    document.querySelectorAll('#presencesList .presence-row').forEach(function(row) {
        var appId = row.dataset.apprenant;
        var activeBtn = row.querySelector('.presence-btn.active');
        if (activeBtn && appId) {
            if (activeBtn.classList.contains('present')) {
                seance.presences[appId] = 'present';
                nbSaved++;
            } else if (activeBtn.classList.contains('retard')) {
                seance.presences[appId] = 'retard';
                nbSaved++;
            } else if (activeBtn.classList.contains('absent')) {
                seance.presences[appId] = 'absent';
                nbSaved++;
            }
        }
    });
    
    // Marquer la séance comme effectuée
    seance.statut = 'done';
    
    save();
    
    // Rafraîchir les stats de présence
    loadPresences(classeId);
    
    notify('✅ ' + nbSaved + ' présences enregistrées', 'success');
}
