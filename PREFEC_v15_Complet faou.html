    html += '<div style="display:flex;gap:8px;">';
    html += '<button class="btn btn-success btn-sm" onclick="exportEvaluationsClasse(\'' + classeId + '\')">📥 Export Évaluations</button>';
    html += '<button class="btn btn-info btn-sm" onclick="exportAssiduiteClasse(\'' + classeId + '\')">📈 Export Assiduité</button>';
    html += '</div>';
    html += '</div>';
    
    // Tableau récapitulatif des élèves avec assiduité
    html += '<div class="card" style="margin-bottom:20px;"><div class="card-header"><h3>📊 Récapitulatif Assiduité & Notes</h3></div>';
    html += '<div class="card-body"><div class="table-container"><table>';
    html += '<thead><tr><th>N°</th><th>Élève</th><th>Assiduité</th><th>Détail présences</th>';
    c.evaluations.forEach(function(ev, idx) {
        html += '<th>' + ev.nom + '</th>';
    });
    html += '<th>Moyenne</th></tr></thead><tbody>';
    
    eleves.forEach(function(a, idx) {
        var assi = calcAssiduiteDetail(a.id, classeId);
        var tauxColor = assi.taux === null ? 'var(--gray-500)' : assi.taux >= 80 ? 'var(--success)' : assi.taux >= 50 ? 'var(--warning)' : 'var(--danger)';
        var tauxBadge = assi.taux === null ? 'badge-info' : assi.taux >= 80 ? 'badge-success' : assi.taux >= 50 ? 'badge-warning' : 'badge-danger';
        var detailPresences = assi.total > 0 ? '<span style="color:var(--success);">✅' + assi.present + '</span> <span style="color:var(--warning);">⏰' + assi.retard + '</span> <span style="color:var(--danger);">❌' + assi.absent + '</span>' : '-';
        
        html += '<tr><td>' + (idx + 1) + '</td><td><strong>' + a.nom + '</strong></td>';
        html += '<td><span class="badge ' + tauxBadge + '" style="font-size:0.9rem;">' + (assi.taux !== null ? assi.taux + '%' : '-') + '</span></td>';
        html += '<td style="font-size:0.8rem;">' + detailPresences + '</td>';
        
        var totalNotes = 0, nbEvals = 0;
        c.evaluations.forEach(function(ev) {
            var notes = ev.notes[a.id] || {};
            var totalEv = 0, maxEv = ev.competences.length * 25;
            ev.competences.forEach(function(comp) {
                if (notes[comp] !== undefined && notes[comp] !== '') totalEv += parseFloat(notes[comp]) || 0;
            });
            var pourcent = maxEv > 0 ? Math.round((totalEv / maxEv) * 100) : 0;
            if (Object.keys(notes).length > 0) {
                totalNotes += pourcent;
                nbEvals++;
            }
            html += '<td>' + (Object.keys(notes).length > 0 ? totalEv + '/' + maxEv + ' <span style="color:var(--gray-500);">(' + pourcent + '%)</span>' : '-') + '</td>';
        });
        
        var moyenne = nbEvals > 0 ? Math.round(totalNotes / nbEvals) : null;
        var moyColor = moyenne === null ? 'var(--gray-500)' : moyenne >= 60 ? 'var(--success)' : moyenne >= 40 ? 'var(--warning)' : 'var(--danger)';
        html += '<td style="font-weight:bold;color:' + moyColor + ';">' + (moyenne !== null ? moyenne + '%' : '-') + '</td></tr>';
    });
    
    html += '</tbody></table></div></div></div>';
    
    // Évaluations détaillées
    if (c.evaluations.length === 0) {
        html += '<p style="color:var(--gray-500);">Aucune évaluation créée. Cliquez sur le bouton ci-dessus pour en ajouter une.</p>';
    } else {
        c.evaluations.forEach(function(ev, evIdx) {
            html += '<div class="card" style="margin-bottom:15px;"><div class="card-header"><h3>📝 ' + ev.nom + '</h3>';
            html += '<button class="btn btn-sm btn-danger" onclick="deleteEvaluation(\'' + classeId + '\',' + evIdx + ')">🗑️</button></div>';
            html += '<div class="card-body"><div class="table-container"><table class="eval-table"><thead><tr><th style="min-width:150px;">Élève</th><th>Assiduité</th>';
            ev.competences.forEach(function(comp) { html += '<th>' + comp + '<br><span style="font-size:0.7rem;color:var(--gray-500);">/25</span></th>'; });
            html += '<th>Total<br><span style="font-size:0.7rem;color:var(--gray-500);">/' + (ev.competences.length * 25) + '</span></th><th>%</th></tr></thead><tbody>';
            
            eleves.forEach(function(a) {
                var notes = ev.notes[a.id] || {};
                var total = 0;
                var assi = calcAssiduiteDetail(a.id, classeId);
                var tauxBadge = assi.taux === null ? 'badge-info' : assi.taux >= 80 ? 'badge-success' : assi.taux >= 50 ? 'badge-warning' : 'badge-danger';
                
                html += '<tr><td><strong>' + a.nom + '</strong></td>';
                html += '<td><span class="badge ' + tauxBadge + '">' + (assi.taux !== null ? assi.taux + '%' : '-') + '</span></td>';
                
                ev.competences.forEach(function(comp) {
                    var note = notes[comp] !== undefined ? notes[comp] : '';
                    if (note !== '') total += parseFloat(note) || 0;
                    html += '<td><input type="number" value="' + note + '" min="0" max="25" step="0.25" onchange="updateNote(\'' + classeId + '\',' + evIdx + ',\'' + a.id + '\',\'' + comp + '\',this.value)"></td>';
                });
                
                var maxTotal = ev.competences.length * 25;
                var pourcent = maxTotal > 0 ? Math.round((total / maxTotal) * 100) : 0;
                var pColor = pourcent >= 60 ? 'var(--success)' : pourcent >= 40 ? 'var(--warning)' : 'var(--danger)';
                
                html += '<td><strong>' + total + '</strong></td>';
                html += '<td style="color:' + pColor + ';font-weight:bold;">' + pourcent + '%</td></tr>';
            });
            
            html += '</tbody></table></div></div></div>';
        });
    }
    
    return html;
}

function addEvaluation(classeId) {
    var content = '<div class="form-grid">' +
        '<div class="form-group full-width"><label>Nom de l\'évaluation *</label><input type="text" id="evalNom" placeholder="Ex: Évaluation 1"></div>' +
        '<div class="form-group full-width"><label>Compétences (cochez)</label>' +
        '<div style="display:flex;flex-wrap:wrap;gap:10px;">' +
        '<label><input type="checkbox" value="CO" checked> CO (Compréhension Orale)</label>' +
        '<label><input type="checkbox" value="CE" checked> CE (Compréhension Écrite)</label>' +
        '<label><input type="checkbox" value="PO" checked> PO (Production Orale)</label>' +
        '<label><input type="checkbox" value="PE" checked> PE (Production Écrite)</label>' +
        '<label><input type="checkbox" value="TSL"> TSL</label>' +
        '</div></div></div>';
    
    showModal('➕ Nouvelle évaluation', content, function() {
        var nom = document.getElementById('evalNom').value.trim();
        if (!nom) { notify('Nom requis', 'error'); return; }
        
        var competences = [];
        document.querySelectorAll('#dynamicModal input[type="checkbox"]:checked').forEach(function(cb) {
            competences.push(cb.value);
        });
        
        if (competences.length === 0) { notify('Sélectionnez au moins une compétence', 'error'); return; }
        
        var session = getSession();
        var c = session.classes.find(function(cl) { return cl.id === classeId; });
        if (!c.evaluations) c.evaluations = [];
        c.evaluations.push({ nom: nom, competences: competences, notes: {} });
        
        save();
        closeModal();
        openClasseDetail(classeId);
        // Réouvrir l'onglet évaluations
        setTimeout(function() {
            var btn = document.querySelector('[onclick*="tabEvaluations"]');
            if (btn) switchClasseTab(btn, 'tabEvaluations');
        }, 100);
        notify('Évaluation créée', 'success');
    });
}

function updateNote(classeId, evIdx, apprenantId, competence, value) {
    var session = getSession();
    var c = session.classes.find(function(cl) { return cl.id === classeId; });
    if (!c || !c.evaluations[evIdx]) return;
    
    if (!c.evaluations[evIdx].notes[apprenantId]) c.evaluations[evIdx].notes[apprenantId] = {};
    c.evaluations[evIdx].notes[apprenantId][competence] = value !== '' ? parseFloat(value) : '';
    save();
}

function deleteEvaluation(classeId, evIdx) {
    if (!confirm('Supprimer cette évaluation ?')) return;
    var session = getSession();
    var c = session.classes.find(function(cl) { return cl.id === classeId; });
    c.evaluations.splice(evIdx, 1);
    save();
    openClasseDetail(classeId);
    setTimeout(function() {
        var btn = document.querySelector('[onclick*="tabEvaluations"]');
        if (btn) switchClasseTab(btn, 'tabEvaluations');
    }, 100);
    notify('Évaluation supprimée', 'success');
}

// ===== APPRENANTS =====
function renderApprenantsTable() {
    var session = getSession();
    var search = (document.getElementById('searchApprenants')?.value || '').toLowerCase();
    var classeFilter = document.getElementById('filterAppClasse')?.value || '';
    var sortBy = document.getElementById('sortApprenants')?.value || 'nom';
    
    // Filtrer et enrichir avec données de classe
    var apprenants = session.apprenants.filter(function(a) {
        var matchSearch = a.nom.toLowerCase().indexOf(search) !== -1 || (a.matricule || '').toLowerCase().indexOf(search) !== -1;
        var matchClasse = !classeFilter || a.classeId === classeFilter;
        return matchSearch && matchClasse;
    }).map(function(a) {
        var c = session.classes.find(function(cl) { return cl.id === a.classeId; });
        return { apprenant: a, classe: c };
    });
    
    // Trier
    apprenants.sort(function(a, b) {
        if (sortBy === 'nom') return a.apprenant.nom.localeCompare(b.apprenant.nom);
        if (sortBy === 'matricule') return (a.apprenant.matricule || '').localeCompare(b.apprenant.matricule || '');
        if (sortBy === 'classe') return (a.classe ? a.classe.nom : 'ZZZ').localeCompare(b.classe ? b.classe.nom : 'ZZZ');
        return 0;
    });
    
    var html = apprenants.map(function(item) {
        var a = item.apprenant;
        var c = item.classe;
        
        return '<tr><td><input type="checkbox" class="selectApprenant" value="' + a.id + '"></td>' +
            '<td><code>' + (a.matricule || '-') + '</code></td>' +
            '<td>' + a.nom + '</td>' +
            '<td>' + (a.adresse || '-') + '</td>' +
            '<td>' + (a.nin || '-') + '</td>' +
            '<td>' + (c ? c.nom : '-') + '</td>' +
            '<td><button class="btn btn-sm btn-secondary" onclick="openApprenantModal(\'' + a.id + '\')">✏️</button> <button class="btn btn-sm btn-danger" onclick="deleteApprenant(\'' + a.id + '\')">🗑️</button></td></tr>';
    }).join('');
    
    document.getElementById('apprenantsTable').innerHTML = html || '<tr><td colspan="7">Aucun</td></tr>';
    
    var selectAll = document.getElementById('selectAllApprenants');
    if (selectAll) selectAll.checked = false;
}

// Suivi des heures par NIVEAU sur TOUTES les sessions
function showSuiviHeuresNiveau() {
    // Initialiser les parcours si pas encore fait
    if (!DB.settings.parcours) DB.settings.parcours = [];
    
    // Collecter toutes les classes de toutes les sessions avec leurs heures
    var toutesClasses = [];
    DB.sessions.forEach(function(session) {
        session.classes.forEach(function(classe) {
            var heures = 0;
            (session.seances || []).forEach(function(s) {
                if (s.classeId === classe.id && s.statut === 'done') {
                    heures += parseFloat(s.heures) || 0;
                }
            });
            toutesClasses.push({
                sessionId: session.id,
                sessionNom: session.nom,
                classeId: classe.id,
                classeNom: classe.nom,
                niveau: classe.niveau || 'A2',
                heures: Math.round(heures * 10) / 10
            });
        });
    });
    
    // Générer le HTML
    var html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">';
    html += '<span>Créez des <strong>parcours</strong> pour regrouper les classes qui se suivent entre sessions.</span>';
    html += '<button class="btn btn-primary btn-sm" onclick="creerParcours()">➕ Nouveau parcours</button>';
    html += '</div>';
    
    // Afficher les parcours existants
    if (DB.settings.parcours.length > 0) {
        DB.settings.parcours.forEach(function(parcours, idx) {
            var heuresTotal = 0;
            var detailSessions = [];
            
            // Calculer les heures pour ce parcours
            parcours.classes.forEach(function(classeKey) {
                var found = toutesClasses.find(function(c) { 
                    return c.sessionNom + '|' + c.classeNom === classeKey; 
                });
                if (found && found.heures > 0) {
                    heuresTotal += found.heures;
                    detailSessions.push(found.sessionNom + ' (' + found.classeNom + '): ' + found.heures + 'h');
                }
            });
            
            var objectif = getObjectifHeures(parcours.niveau);
            var pct = Math.min(100, Math.round((heuresTotal / objectif) * 100));
            var restant = Math.max(0, objectif - heuresTotal);
            var color = pct >= 100 ? 'var(--success)' : (pct >= 50 ? 'var(--warning)' : 'var(--danger)');
            var complete = pct >= 100;
            
            html += '<div class="card" style="margin-bottom:15px;border-left:4px solid ' + color + ';">';
            html += '<div class="card-header" style="background:' + (complete ? '#d4edda' : '#f8f9fa') + ';">';
            html += '<div style="display:flex;justify-content:space-between;align-items:center;width:100%;">';
            html += '<span><strong>' + parcours.nom + '</strong> <span class="badge badge-' + parcours.niveau.toLowerCase() + '">' + parcours.niveau + '</span></span>';
            html += '<div>';
            html += '<button class="btn btn-sm btn-secondary" onclick="modifierParcours(' + idx + ')" style="margin-right:5px;">✏️</button>';
            html += '<button class="btn btn-sm btn-danger" onclick="supprimerParcours(' + idx + ')">🗑️</button>';
            html += '</div></div></div>';
            
            html += '<div class="card-body">';
            html += '<div style="font-size:1.5rem;font-weight:bold;color:' + color + ';margin-bottom:10px;">' + heuresTotal + 'h / ' + objectif + 'h';
            if (complete) html += ' <span class="badge badge-success">✓ COMPLET</span>';
            else html += ' <span style="font-size:0.9rem;color:var(--danger);">(reste ' + restant + 'h)</span>';
            html += '</div>';
            
            // Barre de progression
            html += '<div style="background:#e9ecef;border-radius:10px;height:12px;margin-bottom:10px;">';
            html += '<div style="width:' + pct + '%;background:' + color + ';height:100%;border-radius:10px;"></div>';
            html += '</div>';
            
            // Détail
            if (detailSessions.length > 0) {
                html += '<div style="font-size:0.85rem;color:#666;">' + detailSessions.join(' → ') + '</div>';
            } else {
                html += '<div style="font-size:0.85rem;color:#999;">Aucune heure effectuée</div>';
            }
            
            html += '</div></div>';
        });
    } else {
        html += '<div class="alert alert-warning">Aucun parcours créé. Cliquez sur "➕ Nouveau parcours" pour commencer le suivi.</div>';
    }
    
    // Classes non assignées
    var classesAssignees = [];
    DB.settings.parcours.forEach(function(p) {
        classesAssignees = classesAssignees.concat(p.classes);
    });
    
    var classesNonAssignees = toutesClasses.filter(function(c) {
        return classesAssignees.indexOf(c.sessionNom + '|' + c.classeNom) === -1;
    });
    
    if (classesNonAssignees.length > 0) {
        html += '<div class="card" style="margin-top:20px;"><div class="card-header"><h4>📋 Classes non assignées à un parcours</h4></div>';
        html += '<div class="card-body"><table><thead><tr><th>Session</th><th>Classe</th><th>Niveau</th><th>Heures</th></tr></thead><tbody>';
        classesNonAssignees.forEach(function(c) {
            html += '<tr><td>' + c.sessionNom + '</td><td>' + c.classeNom + '</td><td><span class="badge badge-' + c.niveau.toLowerCase() + '">' + c.niveau + '</span></td><td>' + c.heures + 'h</td></tr>';
        });
        html += '</tbody></table></div></div>';
    }
    
    showModal('📊 Suivi des heures par parcours', html, null);
}

function creerParcours() {
    var nom = prompt('Nom du parcours (ex: A2 SIMA, B1 MUTS...):');
    if (!nom) return;
    
    var niveau = prompt('Niveau (A2, B1, B2...):', 'A2');
    if (!niveau) return;
    
    if (!DB.settings.parcours) DB.settings.parcours = [];
    
    var parcours = {
        id: 'parcours_' + Date.now(),
        nom: nom,
        niveau: niveau.toUpperCase(),
        classes: []
    };
    
    DB.settings.parcours.push(parcours);
    save();
    
    // Ouvrir directement la modification pour ajouter les classes
    modifierParcours(DB.settings.parcours.length - 1);
}

function modifierParcours(idx) {
    var parcours = DB.settings.parcours[idx];
    if (!parcours) return;
    
    // Collecter toutes les classes disponibles
    var toutesClasses = [];
    DB.sessions.forEach(function(session) {
        session.classes.forEach(function(classe) {
            var heures = 0;
            (session.seances || []).forEach(function(s) {
                if (s.classeId === classe.id && s.statut === 'done') {
                    heures += parseFloat(s.heures) || 0;
                }
            });
            toutesClasses.push({
                key: session.nom + '|' + classe.nom,
                label: session.nom + ' → ' + classe.nom + ' (' + (classe.niveau || '?') + ') - ' + Math.round(heures * 10) / 10 + 'h',
                heures: heures
            });
        });
    });
    
    var html = '<div class="form-group"><label>Nom du parcours</label>';
    html += '<input type="text" id="parcoursNom" value="' + parcours.nom + '"></div>';
    
    html += '<div class="form-group"><label>Niveau</label>';
    html += '<select id="parcoursNiveau">';
    var niveaux = ['A1', 'A2', 'B1', 'B2', 'C1'];
    niveaux.forEach(function(n) {
        html += '<option value="' + n + '"' + (parcours.niveau === n ? ' selected' : '') + '>' + n + ' (' + getObjectifHeures(n) + 'h)</option>';
    });
    html += '</select></div>';
    
    html += '<div class="form-group"><label>Classes incluses (cochez celles qui font partie de ce parcours)</label>';
    html += '<div style="max-height:300px;overflow-y:auto;border:1px solid #ddd;border-radius:8px;padding:10px;">';
    
    toutesClasses.forEach(function(c) {
        var checked = parcours.classes.indexOf(c.key) !== -1 ? ' checked' : '';
        html += '<label style="display:block;padding:8px;border-bottom:1px solid #eee;cursor:pointer;">';
        html += '<input type="checkbox" class="parcoursClasse" value="' + c.key + '"' + checked + '> ';
        html += c.label;
        html += '</label>';
    });
    
    html += '</div></div>';
    
    html += '<div style="display:flex;gap:10px;margin-top:15px;">';
    html += '<button class="btn btn-success" onclick="sauverParcours(' + idx + ')">💾 Enregistrer</button>';
    html += '<button class="btn btn-secondary" onclick="showSuiviHeuresNiveau()">Annuler</button>';
    html += '</div>';
    
    showModal('✏️ Modifier le parcours: ' + parcours.nom, html, null);
}

function sauverParcours(idx) {
    var parcours = DB.settings.parcours[idx];
    if (!parcours) return;
    
    parcours.nom = document.getElementById('parcoursNom').value || parcours.nom;
    parcours.niveau = document.getElementById('parcoursNiveau').value || parcours.niveau;
    
    parcours.classes = [];
    document.querySelectorAll('.parcoursClasse:checked').forEach(function(cb) {
        parcours.classes.push(cb.value);
    });
    
    save();
    notify('Parcours "' + parcours.nom + '" enregistré', 'success');
    showSuiviHeuresNiveau();
}

function supprimerParcours(idx) {
    var parcours = DB.settings.parcours[idx];
    if (!parcours) return;
    
    if (!confirm('Supprimer le parcours "' + parcours.nom + '" ?\n\nCela ne supprime pas les classes, juste le regroupement.')) return;
    
    DB.settings.parcours.splice(idx, 1);

}

function updateTransfertClasses() {
    var sessionId = document.getElementById('transferSession').value;
    var targetSession = DB.sessions.find(function(s) { return s.id === sessionId; });
    
    if (!targetSession) return;
    
    var html = '<option value="">-- Choisir une classe --</option>';
    
    if (targetSession.classes.length === 0) {
        html += '<option value="__new__">➕ Créer une nouvelle classe</option>';
    } else {
        targetSession.classes.forEach(function(c) {
            var nbEleves = targetSession.apprenants.filter(function(a) { return a.classeId === c.id; }).length;
            html += '<option value="' + c.id + '">' + c.nom + ' (' + nbEleves + ' élèves)</option>';
        });
        html += '<option value="__new__">➕ Créer une nouvelle classe</option>';
    }
    
    document.getElementById('transferClasse').innerHTML = html;
}

function executeTransfert(preSelected) {
    var selected = preSelected.length > 0 ? preSelected : [];
    
    // Si pas de présélection, récupérer depuis les checkboxes du modal
    if (selected.length === 0) {
        document.querySelectorAll('.transferSelect:checked').forEach(function(cb) {
            selected.push(cb.value);
        });
    }
    
    if (selected.length === 0) {
        notify('Sélectionnez au moins un élève', 'error');
        return;
    }
    
    var targetSessionId = document.getElementById('transferSession').value;
    var targetClasseId = document.getElementById('transferClasse').value;
    var mode = document.querySelector('input[name="transferMode"]:checked').value;
    var keepNotes = document.getElementById('transferKeepNotes').checked;
    
    if (!targetClasseId) {
        notify('Sélectionnez une classe de destination', 'error');
        return;
    }
    
    var sourceSession = getSession();
    var targetSession = DB.sessions.find(function(s) { return s.id === targetSessionId; });
    
    if (!targetSession) {
        notify('Session introuvable', 'error');
        return;
    }
    
    // Créer nouvelle classe si nécessaire
    if (targetClasseId === '__new__') {
        var nomClasse = prompt('Nom de la nouvelle classe :');
        if (!nomClasse) return;
        
        var newClasse = {
            id: genId(),
            nom: nomClasse,
            niveau: 'A2',
            sousNiveau: '',
            profId: '',
            lieu: DB.settings.cipr || '',
            heuresPrevues: 100,
            heuresSession: 26,
            evaluations: [],
            modules: [],
            creneaux: {}
        };
        targetSession.classes.push(newClasse);
        targetClasseId = newClasse.id;
    }
    
    var transferred = 0;
    var sameSession = sourceSession.id === targetSessionId;
    
    selected.forEach(function(appId) {
        var sourceApp = sourceSession.apprenants.find(function(a) { return a.id === appId; });
        if (!sourceApp) return;
        
        if (mode === 'move') {
            if (sameSession) {
                // Simple changement de classe dans la même session
                sourceApp.classeId = targetClasseId;
            } else {
                // Déplacer vers autre session
                var newApp = JSON.parse(JSON.stringify(sourceApp));
                newApp.id = genId();
                newApp.classeId = targetClasseId;
                targetSession.apprenants.push(newApp);
                
                // Supprimer de la session source
                sourceSession.apprenants = sourceSession.apprenants.filter(function(a) { return a.id !== appId; });
            }
        } else {
            // Mode copie
            var newApp = JSON.parse(JSON.stringify(sourceApp));
            newApp.id = genId();
            newApp.classeId = targetClasseId;
            
            if (!sameSession || !keepNotes) {
                // Réinitialiser les données si session différente ou si on ne garde pas les notes
                delete newApp.total;
                delete newApp.assiduite;
            }
            
            targetSession.apprenants.push(newApp);
        }
        
        transferred++;
    });
    
    save();
    closeModal();
    updateAll();
    
    var modeText = mode === 'move' ? 'déplacé(s)' : 'copié(s)';
    notify('✅ ' + transferred + ' élève(s) ' + modeText + ' avec succès', 'success');
}

function openApprenantModal(id, defaultClasseId) {

        return '<option value="' + c.id + '"' + (selected ? ' selected' : '') + '>' + c.nom + '</option>'; 
    }).join('');
    
    // Options centres
    var centres = DB.settings.centres || [];
    var centresOpts = '<option value="">-- Sélectionner --</option>';
    centres.forEach(function(c) {
        var sel = a && a.centreId === c.id ? ' selected' : '';
        centresOpts += '<option value="' + c.id + '"' + sel + '>' + c.nom + (c.type === 'siege' ? ' (Siège)' : '') + '</option>';
    });
    
    // Options nationalités
    var nationalites = DB.settings.nationalites || ['Comorienne', 'Malgache', 'Française', 'Autre'];
    var natOpts = nationalites.map(function(n) {

        '<div class="form-group"><label>📞 Téléphone</label><input type="tel" id="appTelephone" value="' + (a ? a.telephone || '' : '') + '" placeholder="Ex: 3210000"></div>' +
        '<div class="form-group"><label>🎂 Date naissance</label><input type="date" id="appDateNaissance" value="' + (a ? a.dateNaissance || '' : '') + '"></div>' +
        '<div class="form-group"><label>🌍 Nationalité</label><select id="appNationalite">' + natOpts + '</select></div>' +
        '<div class="form-group"><label>📍 Ville/Quartier</label><select id="appVille">' + villesOpts + '</select></div>' +
        '<div class="form-group"><label>🏢 Centre/Antenne</label><select id="appCentre">' + centresOpts + '</select></div>' +
        '<div class="form-group"><label>👥 Genre</label><select id="appGenre"><option value="">--</option><option value="M"' + (a && a.genre === 'M' ? ' selected' : '') + '>Masculin</option><option value="F"' + (a && a.genre === 'F' ? ' selected' : '') + '>Féminin</option></select></div>' +
        '<div class="form-group full-width"><label>📚 Classe *</label><select id="appClasse">' + classesOpts + '</select></div>' +
        '<div class="form-group full-width"><label>📝 Notes</label><textarea id="appNotes" rows="2" style="width:100%;padding:8px;border:1px solid var(--gray-300);border-radius:6px;">' + (a ? a.notes || '' : '') + '</textarea></div>' +
        '</div>';
    
    showModal(id ? '✏️ Modifier élève' : '➕ Nouvel élève', content, function() {
        var nom = document.getElementById('appNom').value.trim();
        var prenom = document.getElementById('appPrenom').value.trim();
        var classeId = document.getElementById('appClasse').value;
        if (!nom || !classeId) { notify('Nom et classe requis', 'error'); return; }
        
        // Calculer l'âge à partir de la date de naissance
        var dateNaissance = document.getElementById('appDateNaissance').value;
        var age = null;
        if (dateNaissance) {
            var today = new Date();
            var birth = new Date(dateNaissance);
            age = today.getFullYear() - birth.getFullYear();
            var m = today.getMonth() - birth.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
        }
        
        var data = {
            matricule: document.getElementById('appMatricule').value.trim() || 'MAT-' + Date.now().toString().slice(-6),
            nin: document.getElementById('appNin').value.trim(),
            nom: nom,
            prenom: prenom,
            telephone: document.getElementById('appTelephone').value.trim(),
            dateNaissance: dateNaissance,
            age: age,
            nationalite: document.getElementById('appNationalite').value,
            ville: document.getElementById('appVille').value,
            centreId: document.getElementById('appCentre').value,
            genre: document.getElementById('appGenre').value,
            notes: document.getElementById('appNotes').value.trim(),
            classeId: classeId
        };
        
        // Rétro-compatibilité : garder le champ adresse (= ville maintenant)
        data.adresse = data.ville;
        
        if (DB.editingId) {
            var ap = session.apprenants.find(function(x) { return x.id === DB.editingId; });
            if (ap) Object.assign(ap, data);
        } else {
            data.id = genId();
            data.dateInscription = new Date().toISOString().slice(0, 10);
            session.apprenants.push(data);
        }
        
        save();
        closeModal();
        updateAll();
        if (DB.editingId && defaultClasseId) openClasseDetail(defaultClasseId);
        notify('Enregistré', 'success');
    });
}

// Voir le détail d'un apprenant avec toutes ses notes
function openApprenantDetail(id) {

    var c = session.classes.find(function(cl) { return cl.id === a.classeId; });

    var tauxBadge = assi.taux === null ? 'badge-info' : assi.taux >= 80 ? 'badge-success' : assi.taux >= 50 ? 'badge-warning' : 'badge-danger';
    
    // Trouver le centre
    var centre = (DB.settings.centres || []).find(function(ct) { return ct.id === a.centreId; });
    
    // Nom complet
    var nomComplet = a.prenom ? a.nom + ' ' + a.prenom : a.nom;
    
    var html = '<div style="text-align:center;margin-bottom:20px;">';
    html += '<div style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg, #da002e, #740d10);color:white;display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 15px;">' + (a.genre === 'F' ? '👩' : '👨') + '</div>';
    html += '<h3>' + nomComplet + '</h3>';
    html += '<p style="color:var(--gray-500);">' + (c ? c.nom + ' - ' + c.niveau : '-') + '</p>';
    if (centre) html += '<p style="color:var(--primary);font-size:0.9rem;">🏢 ' + centre.nom + '</p>';
    html += '</div>';
    
    // Infos personnelles
    html += '<div style="background:var(--gray-100);border-radius:10px;padding:15px;margin-bottom:20px;">';
    html += '<h4 style="margin-bottom:10px;color:var(--primary);">👤 Informations personnelles</h4>';
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">';
    html += '<p><strong>📋 Matricule:</strong> ' + (a.matricule || '-') + '</p>';
    html += '<p><strong>🆔 NIN:</strong> ' + (a.nin || '-') + '</p>';
    html += '<p><strong>📞 Téléphone:</strong> ' + (a.telephone || '-') + '</p>';
    html += '<p><strong>🎂 Date naissance:</strong> ' + (a.dateNaissance ? formatDate(a.dateNaissance) + ' (' + (a.age || '?') + ' ans)' : '-') + '</p>';
    html += '<p><strong>🌍 Nationalité:</strong> ' + (a.nationalite || '-') + '</p>';
    html += '<p><strong>📍 Ville:</strong> ' + (a.ville || a.adresse || '-') + '</p>';
    html += '<p><strong>👥 Genre:</strong> ' + (a.genre === 'M' ? 'Masculin' : a.genre === 'F' ? 'Féminin' : '-') + '</p>';
    html += '<p><strong>📅 Inscrit le:</strong> ' + (a.dateInscription ? formatDate(a.dateInscription) : '-') + '</p>';
    html += '</div>';
    if (a.notes) html += '<p style="margin-top:10px;"><strong>📝 Notes:</strong> ' + a.notes + '</p>';
    html += '</div>';
    
    // Assiduité
    html += '<div style="background:#e3f2fd;border-radius:10px;padding:15px;margin-bottom:20px;">';
    html += '<h4 style="margin-bottom:10px;">📊 Assiduité</h4>';
    html += '<p style="font-size:2rem;font-weight:bold;"><span class="badge ' + tauxBadge + '" style="font-size:1.5rem;padding:10px 20px;">' + (assi.taux !== null ? assi.taux + '%' : '-') + '</span></p>';
    if (assi.total > 0) {
        html += '<p style="margin-top:10px;"><span style="color:var(--success);">✅ Présent: ' + assi.present + '</span> &nbsp;|&nbsp; ';
        html += '<span style="color:var(--warning);">⏰ Retard: ' + assi.retard + '</span> &nbsp;|&nbsp; ';
        html += '<span style="color:var(--danger);">❌ Absent: ' + assi.absent + '</span></p>';
        html += '<p style="color:var(--gray-500);font-size:0.85rem;">Sur ' + assi.total + ' séances</p>';
    }
    html += '</div>';
    
    // Notes par évaluation
    html += '<h4 style="margin-bottom:15px;">📝 Notes aux évaluations</h4>';
    
    if (c && c.evaluations && c.evaluations.length > 0) {
        var totalGlobal = 0, maxGlobal = 0, nbEvals = 0;
        
        c.evaluations.forEach(function(ev, evIdx) {
            var notes = ev.notes[a.id] || {};
            var total = 0, max = ev.competences.length * 25;
            var hasNotes = false;
            
            html += '<div style="background:white;border:1px solid #ddd;border-radius:10px;padding:15px;margin-bottom:15px;">';
            html += '<h5 style="margin-bottom:10px;color:var(--primary);">' + ev.nom + '</h5>';
            html += '<table style="width:100%;"><thead><tr>';
            ev.competences.forEach(function(comp) {
                html += '<th style="text-align:center;">' + comp + '<br><span style="font-size:0.7rem;color:var(--gray-500);">/25</span></th>';
            });
            html += '<th style="text-align:center;">Total<br><span style="font-size:0.7rem;color:var(--gray-500);">/' + max + '</span></th>';
            html += '<th style="text-align:center;">%</th></tr></thead><tbody><tr>';
            
            ev.competences.forEach(function(comp) {
                var note = notes[comp] !== undefined ? notes[comp] : '-';
                if (note !== '-' && note !== '') {
                    total += parseFloat(note) || 0;
                    hasNotes = true;
                }
                var noteColor = note === '-' ? 'var(--gray-500)' : note >= 20 ? 'var(--success)' : note >= 12.5 ? 'var(--warning)' : 'var(--danger)';
                html += '<td style="text-align:center;font-weight:bold;color:' + noteColor + ';">' + note + '</td>';
            });
            
            var pourcent = max > 0 && hasNotes ? Math.round((total / max) * 100) : null;
            var pColor = pourcent === null ? 'var(--gray-500)' : pourcent >= 60 ? 'var(--success)' : pourcent >= 40 ? 'var(--warning)' : 'var(--danger)';
            
            html += '<td style="text-align:center;font-weight:bold;">' + (hasNotes ? total : '-') + '</td>';
            html += '<td style="text-align:center;font-weight:bold;color:' + pColor + ';">' + (pourcent !== null ? pourcent + '%' : '-') + '</td>';
            html += '</tr></tbody></table></div>';
            
            if (hasNotes) {
                totalGlobal += total;
                maxGlobal += max;
                nbEvals++;
            }
        });
        
        // Moyenne générale
        if (nbEvals > 0) {
            var moyenneGlobale = Math.round((totalGlobal / maxGlobal) * 100);
            var moyColor = moyenneGlobale >= 60 ? 'var(--success)' : moyenneGlobale >= 40 ? 'var(--warning)' : 'var(--danger)';
            html += '<div style="background:linear-gradient(135deg, #da002e, #740d10);color:white;border-radius:10px;padding:20px;text-align:center;">';
            html += '<h4 style="margin-bottom:10px;">🎯 Moyenne Générale</h4>';
            html += '<p style="font-size:2.5rem;font-weight:bold;">' + moyenneGlobale + '%</p>';
            html += '<p style="opacity:0.8;">' + totalGlobal + ' / ' + maxGlobal + ' points sur ' + nbEvals + ' évaluation(s)</p>';
            html += '</div>';
        }
    } else {
        html += '<p style="color:var(--gray-500);text-align:center;padding:20px;">Aucune évaluation pour cette classe.</p>';
    }
    
    showModal('👤 Fiche de ' + a.nom, html, null);
}

    }
    
    var session = getSession();

    // Options de sessions
    var sessionsOpts = DB.sessions.map(function(s) {
        return '<option value="' + s.id + '"' + (s.id === DB.currentSessionId ? ' selected' : '') + '>' + s.nom + (s.id === DB.currentSessionId ? ' (actuelle)' : '') + '</option>';
    }).join('');
    
    // Liste des élèves sélectionnés
    var elevesNoms = selected.map(function(id) {
        var a = session.apprenants.find(function(ap) { return ap.id === id; });

    }).filter(function(n) { return n; });
    
    var content = '<div class="alert alert-info" style="margin-bottom:15px;">' +
        '<strong>📋 ' + selected.length + ' élève(s) à transférer depuis ' + sourceClasse.nom + '</strong>' +
        '<div style="font-size:0.85rem;margin-top:5px;max-height:100px;overflow-y:auto;">' + elevesNoms.join(', ') + '</div>' +
        '</div>';
    
    content += '<div class="form-grid">' +
        '<div class="form-group"><label>Session de destination *</label><select id="transferSession" onchange="updateTransfertClasses()">' + sessionsOpts + '</select></div>' +
        '<div class="form-group"><label>Classe de destination *</label><select id="transferClasse"></select></div>' +
        '</div>';
    
    content += '<div class="form-group"><label>Mode de transfert</label>' +

        '<label style="cursor:pointer;padding:10px;background:var(--gray-100);border-radius:6px;"><input type="radio" name="transferMode" value="move" checked> <strong>🔄 Déplacer</strong> - Les élèves sont retirés de ' + sourceClasse.nom + '</label>' +
        '<label style="cursor:pointer;padding:10px;background:var(--gray-100);border-radius:6px;"><input type="radio" name="transferMode" value="copy"> <strong>📋 Copier</strong> - Les élèves restent aussi dans ' + sourceClasse.nom + '</label>' +
        '</div></div>';
    
    content += '<div class="form-group"><label><input type="checkbox" id="transferKeepNotes"> Conserver les notes et présences existantes (si copie vers même session)</label></div>';
    
    showModal('🔄 Transférer depuis ' + sourceClasse.nom, content, function() {
        executeTransfertFromClasse(selected, classeId);
    });
    
    setTimeout(updateTransfertClasses, 100);
}

function executeTransfertFromClasse(selected, sourceClasseId) {
    var targetSessionId = document.getElementById('transferSession').value;
    var targetClasseId = document.getElementById('transferClasse').value;
    var mode = document.querySelector('input[name="transferMode"]:checked').value;
    var keepNotes = document.getElementById('transferKeepNotes').checked;
    
    if (!targetClasseId) {
        notify('Sélectionnez une classe de destination', 'error');
        return;
    }
    
    var sourceSession = getSession();
    var targetSession = DB.sessions.find(function(s) { return s.id === targetSessionId; });
    
    if (!targetSession) {
        notify('Session introuvable', 'error');
        return;
    }
    
    // Créer nouvelle classe si nécessaire
    if (targetClasseId === '__new__') {
        var nomClasse = prompt('Nom de la nouvelle classe :');
        if (!nomClasse) return;
        
        var sourceClasse = sourceSession.classes.find(function(c) { return c.id === sourceClasseId; });
        var newClasse = {
            id: genId(),
            nom: nomClasse,
            niveau: sourceClasse ? sourceClasse.niveau : 'A2',
            sousNiveau: sourceClasse ? sourceClasse.sousNiveau : '',
            profId: '',
            lieu: DB.settings.cipr || '',
            heuresPrevues: sourceClasse ? sourceClasse.heuresPrevues : 100,
            heuresSession: sourceClasse ? sourceClasse.heuresSession : 26,
            evaluations: [],
            modules: [],
            creneaux: {}
        };
        targetSession.classes.push(newClasse);
        targetClasseId = newClasse.id;
    }
    
    var transferred = 0;
    var sameSession = sourceSession.id === targetSessionId;
    
    selected.forEach(function(appId) {
        var sourceApp = sourceSession.apprenants.find(function(a) { return a.id === appId; });
        if (!sourceApp) return;
        
        if (mode === 'move') {
            if (sameSession) {
                sourceApp.classeId = targetClasseId;
            } else {
                var newApp = JSON.parse(JSON.stringify(sourceApp));
                newApp.id = genId();
                newApp.classeId = targetClasseId;
                targetSession.apprenants.push(newApp);
                sourceSession.apprenants = sourceSession.apprenants.filter(function(a) { return a.id !== appId; });
            }
        } else {
            var newApp = JSON.parse(JSON.stringify(sourceApp));
            newApp.id = genId();
            newApp.classeId = targetClasseId;
            if (!sameSession || !keepNotes) {
                delete newApp.total;
                delete newApp.assiduite;
            }
            targetSession.apprenants.push(newApp);
        }
        
        transferred++;
    });
    
    save();
    closeModal();
    
    // Rafraîchir
    openClasseDetail(sourceClasseId);
    setTimeout(function() {
        var btn = document.querySelector('[onclick*="tabEleves"]');
        if (btn) switchClasseTab(btn, 'tabEleves');
    }, 100);
    
    var modeText = mode === 'move' ? 'déplacé(s)' : 'copié(s)';
    notify('✅ ' + transferred + ' élève(s) ' + modeText + ' avec succès', 'success');
}

// ===== FORMATEURS =====
function renderProfsTable() {
    var session = getSession();
    if (!session) return;
    
    var html = session.professeurs.map(function(p) {
        var profIdStr = String(p.id);
        
        // Trouver les classes de ce prof
        var profClasses = session.classes.filter(function(c) { 
            return c.profId && String(c.profId) === profIdStr; 
        });
        var classesNoms = profClasses.map(function(c) { return c.nom; }).join(', ');
        
        // Utiliser calcRemunerationClasse pour chaque classe (comme showProfDetail)
        var totalHeures = 0, totalRem = 0, totalFrais = 0, totalSeances = 0;
        
        for (var i = 0; i < profClasses.length; i++) {
            var c = profClasses[i];
            var calc = calcRemunerationClasse(c.id);
            totalHeures += calc.heures;
            totalRem += calc.remuneration;
            totalFrais += calc.frais;
            totalSeances += calc.seances;
        }
        
        totalHeures = Math.round(totalHeures * 10) / 10;
        var totalGeneral = totalRem + totalFrais;
        
        return '<tr>' +
            '<td><input type="checkbox" class="selectProf" value="' + p.id + '"></td>' +
            '<td><code>' + p.id + '</code></td>' +
            '<td><strong>' + p.nom + '</strong></td>' +
            '<td><code>' + p.password + '</code></td>' +
            '<td style="font-size:0.75rem;max-width:150px;">' + (classesNoms || '-') + '</td>' +
            '<td><strong>' + totalHeures + 'h</strong></td>' +
            '<td>' + formatMoney(totalRem) + '</td>' +
            '<td>' + formatMoney(totalFrais) + '</td>' +
            '<td style="color:var(--success);font-weight:bold;font-size:1.1rem;">' + formatMoney(totalGeneral) + '</td>' +
            '<td>' +
                '<button class="btn btn-sm btn-success" onclick="generateProfMobile(\'' + p.id + '\')" title="Générer fichier mobile">📱</button> ' +
                '<button class="btn btn-sm btn-info" onclick="showProfDetail(\'' + p.id + '\')">📊</button> ' +
                '<button class="btn btn-sm btn-warning" onclick="exportFichePaye(\'' + p.id + '\')" title="Fiche de paye">💰</button> ' +
                '<button class="btn btn-sm btn-secondary" onclick="openProfModal(\'' + p.id + '\')">✏️</button> ' +
                '<button class="btn btn-sm btn-danger" onclick="deleteProf(\'' + p.id + '\')">🗑️</button>' +
            '</td></tr>';
    }).join('');
    
    document.getElementById('profsTable').innerHTML = html || '<tr><td colspan="10">Aucun</td></tr>';
    
    // Reset select all checkbox
    var selectAll = document.getElementById('selectAllProfs');
    if (selectAll) selectAll.checked = false;
}

function debugProfsData() {
    var session = getSession();
    var debug = '=== DEBUG DONNÉES ===\n\n';
    
    debug += 'PROFESSEURS (' + session.professeurs.length + '):\n';
    session.professeurs.forEach(function(p) {
        debug += '  - ID: "' + p.id + '" | Nom: ' + p.nom + '\n';
    });
    
    debug += '\nCLASSES (' + session.classes.length + '):\n';
    session.classes.forEach(function(c) {
        debug += '  - ' + c.nom + ' | profId: "' + c.profId + '" | tauxHoraire: ' + (c.tauxHoraire || 'non défini') + '\n';
    });
    
    debug += '\nSÉANCES (' + (session.seances || []).length + '):\n';
    var seancesDone = (session.seances || []).filter(function(s) { return s.statut === 'done'; });
    debug += '  - Total: ' + (session.seances || []).length + ' | Done: ' + seancesDone.length + '\n';
    seancesDone.slice(0, 5).forEach(function(s) {
        debug += '  - classeId: ' + s.classeId + ' | heures: ' + s.heures + ' | taux: ' + (s.tauxHoraire || 'non défini') + '\n';
    });
    if (seancesDone.length > 5) debug += '  ... et ' + (seancesDone.length - 5) + ' autres\n';
    
    debug += '\n=== CALCULS PAR PROF ===\n';
    session.professeurs.forEach(function(p) {
        var profIdStr = String(p.id);
        var profClasses = session.classes.filter(function(c) { 
            return c.profId && String(c.profId) === profIdStr; 
        });
        
        var totalH = 0, totalR = 0, nbS = 0;
        profClasses.forEach(function(c) {
            var tauxDefaut = parseInt(c.tauxHoraire) || DB.settings.tauxHoraire || 5000;
            (session.seances || []).forEach(function(s) {
                if (s.classeId === c.id && s.statut === 'done') {
                    var h = parseFloat(s.heures) || 0;
                    var t = parseInt(s.tauxHoraire) || tauxDefaut;
                    totalH += h;
                    totalR += h * t;
                    nbS++;
                }
            });
        });
        
        debug += '\n' + p.nom + ':\n';
        debug += '  Classes: ' + profClasses.length + ' | Séances done: ' + nbS + '\n';
        debug += '  Heures: ' + totalH + ' | Rémunération: ' + totalR + ' KMF\n';
    });
    
    // Afficher dans une nouvelle fenêtre pour pouvoir tout voir

function executeTransfertProfs(preSelected) {
    var selected = preSelected.length > 0 ? preSelected : [];
    
    // Si pas de présélection, récupérer depuis les checkboxes du modal
    if (selected.length === 0) {
        document.querySelectorAll('.transferProfSelect:checked').forEach(function(cb) {
            selected.push(cb.value);
        });
    }
    
    if (selected.length === 0) {
        notify('Sélectionnez au moins un formateur', 'error');
        return;
    }
    
    var targetSessionId = document.getElementById('transferProfSession').value;
    if (!targetSessionId) {
        notify('Sélectionnez une session de destination', 'error');
        return;
    }
    
    var mode = document.querySelector('input[name="transferProfMode"]:checked').value;
    var transferClasses = document.getElementById('transferProfClasses').checked;
    var keepPassword = document.getElementById('transferProfKeepPassword').checked;
    
    var sourceSession = getSession();
    var targetSession = DB.sessions.find(function(s) { return s.id === targetSessionId; });
    
    if (!targetSession) {
        notify('Session introuvable', 'error');
        return;
    }
    
    var transferred = 0;
    var classesTransferred = 0;
    
    selected.forEach(function(profId) {
        var profIdStr = String(profId);
        var sourceProf = sourceSession.professeurs.find(function(p) { return String(p.id) === profIdStr; });
        if (!sourceProf) return;
        
        // Vérifier si le prof existe déjà dans la session cible
        var existingProf = targetSession.professeurs.find(function(p) { return String(p.id) === profIdStr || p.nom === sourceProf.nom; });
        
        var newProfId;
        
        if (existingProf) {
            // Le prof existe déjà, on utilise son ID
            newProfId = existingProf.id;
            // Mettre à jour ses infos si nécessaire
            if (keepPassword) existingProf.password = sourceProf.password;
        } else {
            // Créer le prof dans la session cible
            var newProf = {
                id: sourceProf.id,
                nom: sourceProf.nom,
                password: keepPassword ? sourceProf.password : 'prefec123',
                classes: []
            };
            
            // Vérifier si l'ID est déjà utilisé
            var idExists = targetSession.professeurs.find(function(p) { return p.id === newProf.id; });
            if (idExists) {
                newProf.id = sourceProf.id + '_' + Date.now().toString().slice(-4);
            }
            
            targetSession.professeurs.push(newProf);
            newProfId = newProf.id;
            transferred++;
        }
        
        // Transférer les classes si demandé
        if (transferClasses) {
            var profClasses = sourceSession.classes.filter(function(c) { return c.profId && String(c.profId) === profIdStr; });
            profClasses.forEach(function(c) {
                // Vérifier si une classe similaire existe déjà
                var existingClasse = targetSession.classes.find(function(tc) { return tc.nom === c.nom; });
                if (!existingClasse) {
                    var newClasse = JSON.parse(JSON.stringify(c));
                    newClasse.id = genId();
                    newClasse.profId = newProfId;
                    // Réinitialiser les données de session
                    newClasse.evaluations = [];
                    newClasse.modules = [];
                    targetSession.classes.push(newClasse);
                    classesTransferred++;
                }
            });
        }
        
        // Si mode déplacer, supprimer de la source
        if (mode === 'move') {
            // Désassigner les classes
            sourceSession.classes.forEach(function(c) {
                if (c.profId && String(c.profId) === profIdStr) c.profId = '';
            });
            // Supprimer le prof
            sourceSession.professeurs = sourceSession.professeurs.filter(function(p) { return String(p.id) !== profIdStr; });
        }
    });
    
    save();
    closeModal();
    updateAll();
    
    var msg = '✅ ' + transferred + ' formateur(s) transféré(s)';
    if (classesTransferred > 0) msg += ' avec ' + classesTransferred + ' classe(s)';
    notify(msg, 'success');
}

// Fonctions de date
function getWeekDates(date) {
    var d = new Date(date);
    var day = d.getDay();
    var diff = d.getDate() - day + (day === 0 ? -6 : 1); // Lundi comme premier jour
    var monday = new Date(d.setDate(diff));
    var week = [];
    for (var i = 0; i < 7; i++) {
        var current = new Date(monday);
        current.setDate(monday.getDate() + i);
        week.push(current);
    }
    return week;
}

function formatDateFr(d) {
    var jours = ['Dimanche', 'Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi', 'Samedi'];
    var mois = ['janvier', 'février', 'mars', 'avril', 'mai', 'juin', 'juillet', 'août', 'septembre', 'octobre', 'novembre', 'décembre'];
    return jours[d.getDay()] + ' ' + d.getDate() + ' ' + mois[d.getMonth()];
}

function formatDateShort(d) {
    var jours = ['Dim', 'Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam'];
    return jours[d.getDay()] + ' ' + d.getDate();
}

function isSameDay(d1, d2) {
    return d1.getFullYear() === d2.getFullYear() && d1.getMonth() === d2.getMonth() && d1.getDate() === d2.getDate();
}

function isJourFerie(date) {
    var dateStr = date.toISOString().slice(0, 10);
    var feries = DB.settings.joursFeries || [];
    
    for (var i = 0; i < feries.length; i++) {
        var f = feries[i];
        if (dateStr >= f.debut && dateStr <= f.fin) {
            return f;
        }
    }
    return null;
}

        html += '<div class="alert alert-info" style="margin-bottom:20px;">';
        html += '<strong>📅 Session à venir</strong><br>';
        html += 'La session "' + session.nom + '" commencera le ' + formatDate(session.dateDebut) + '.';
        html += '</div>';
    }
    
    html += '<div class="alert alert-success" style="margin-bottom:20px;">👋 Bienvenue <strong>' + DB.currentUser.nom + '</strong> ! Vous avez <strong>' + myClasses.length + '</strong> cours assigné(s).</div>';
    
    if (myClasses.length === 0) {
        html += '<div class="card"><div class="card-body"><p style="color:var(--gray-500);">Aucun cours assigné pour cette session.</p></div></div>';
        document.getElementById('profAgendaContent').innerHTML = html;
        return;
    }
    
    // Semaine actuelle
    var debutSemaine = weekDates[0];
    var finSemaine = weekDates[6];
    var semaineLabel = debutSemaine.getDate() + ' au ' + finSemaine.getDate() + ' ' + moisNoms[finSemaine.getMonth()] + ' ' + finSemaine.getFullYear();
    
    html += '<div class="card" style="margin-bottom:20px;"><div class="card-header"><h3>📅 Semaine du ' + semaineLabel + '</h3></div><div class="card-body">';
    html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:8px;">';
    
    // Afficher chaque jour de la semaine
    weekDates.forEach(function(dateJour, idx) {
        var jourIdx = dateJour.getDay();
        var jourKey = joursKeys[jourIdx];
        var isToday = isSameDay(dateJour, today);
        var ferie = isJourFerie(dateJour);
        
        // Trouver les cours de ce jour
        var coursJour = myClasses.filter(function(c) {
            return c.creneaux && c.creneaux[jourKey] && c.creneaux[jourKey].actif;
        });
        
        var bgColor, textColor, borderStyle;
        if (ferie) {
            bgColor = '#ffebee';
            textColor = 'var(--danger)';
            borderStyle = '2px solid var(--danger)';
        } else if (isToday) {
            bgColor = 'var(--primary)';
            textColor = 'white';
            borderStyle = '3px solid var(--secondary)';
        } else if (coursJour.length > 0) {
            bgColor = 'var(--primary-light)';
            textColor = 'white';
            borderStyle = 'none';
        } else {
            bgColor = 'var(--gray-100)';
            textColor = 'var(--gray-600)';
            borderStyle = 'none';
        }
        
        html += '<div style="background:' + bgColor + ';color:' + textColor + ';padding:10px;border-radius:var(--radius);text-align:center;border:' + borderStyle + ';min-height:100px;">';
        html += '<div style="font-weight:bold;font-size:0.8rem;">' + joursNoms[jourIdx].substr(0, 3) + '</div>';
        html += '<div style="font-size:1.4rem;font-weight:bold;margin:3px 0;">' + dateJour.getDate() + '</div>';
        
        if (ferie) {
            html += '<div style="font-size:0.65rem;background:var(--danger);color:white;padding:2px 4px;border-radius:4px;margin-top:5px;">🚫 ' + ferie.nom + '</div>';
        } else if (coursJour.length > 0) {
            coursJour.forEach(function(c) {
                var cr = c.creneaux[jourKey];
                html += '<div style="font-size:0.6rem;margin-top:4px;background:rgba(255,255,255,0.25);padding:3px;border-radius:4px;">' + c.nom.substring(0, 10) + '<br>' + (cr.debut || '') + '</div>';
            });
        } else {
            html += '<div style="font-size:0.7rem;margin-top:8px;opacity:0.7;">-</div>';
        }
        
        if (isToday) {
            html += '<div style="font-size:0.65rem;margin-top:5px;background:var(--secondary);color:var(--primary-dark);padding:2px 6px;border-radius:10px;font-weight:bold;">Aujourd\'hui</div>';
        }
        
        html += '</div>';
    });
    
    html += '</div></div></div>';
    
    // Liste des cours avec compteur de séances
    html += '<div class="card"><div class="card-header"><h3>📚 Mes cours</h3></div><div class="card-body">';
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:15px;">';
    
    myClasses.forEach(function(c) {
        var nbEleves = session.apprenants.filter(function(a) { return a.classeId === c.id; }).length;
        var seances = (session.seances || []).filter(function(s) { return s.classeId === c.id; });
        var seancesDone = seances.filter(function(s) { return s.statut === 'done'; });
        
        // Calculer le nombre total de séances prévu
        var heuresParSeance = 2.5;
        if (c.creneaux) {
            var cr = Object.values(c.creneaux).find(function(cr) { return cr.actif && cr.heures; });
            if (cr) heuresParSeance = parseFloat(cr.heures) || 2.5;
        }
        var totalSeancesPrevues = Math.ceil((c.heuresPrevues || 100) / heuresParSeance);
        
        // Jours de cours
        var joursActifs = [];
        if (c.creneaux) {
            joursKeys.forEach(function(jour, idx) {
                if (c.creneaux[jour] && c.creneaux[jour].actif) {
                    joursActifs.push(joursNoms[idx].substr(0, 3));
                }
            });
        }
        
        html += '<div class="card" style="margin:0;cursor:pointer;transition:transform 0.2s;" onclick="openProfClasseDetail(\'' + c.id + '\')" onmouseover="this.style.transform=\'translateY(-3px)\'" onmouseout="this.style.transform=\'none\'">';
        html += '<div class="card-header"><h3 style="font-size:1rem;">' + c.nom + '</h3><span class="badge badge-' + c.niveau.toLowerCase() + '">' + c.niveau + '</span></div>';
        html += '<div class="card-body" style="padding:12px;">';
        html += '<div style="display:flex;justify-content:space-between;margin-bottom:8px;"><span>👥 Élèves</span><strong>' + nbEleves + '</strong></div>';
        html += '<div style="display:flex;justify-content:space-between;margin-bottom:8px;"><span>📅 Séances</span><strong>' + seancesDone.length + '/' + totalSeancesPrevues + '</strong></div>';
        html += '<div style="display:flex;justify-content:space-between;margin-bottom:8px;"><span>📆 Jours</span><strong>' + (joursActifs.join(', ') || '-') + '</strong></div>';
        html += '<div style="display:flex;justify-content:space-between;"><span>⏱️ Module</span><strong>' + (c.heuresPrevues || 100) + 'h</strong></div>';
        
        // Barre de progression
        var pctDone = totalSeancesPrevues > 0 ? Math.round((seancesDone.length / totalSeancesPrevues) * 100) : 0;
        html += '<div style="margin-top:10px;background:var(--gray-200);border-radius:10px;height:8px;overflow:hidden;">';
        html += '<div style="background:var(--success);height:100%;width:' + pctDone + '%;transition:width 0.3s;"></div></div>';
        html += '<div style="font-size:0.7rem;color:var(--gray-500);text-align:right;margin-top:4px;">' + pctDone + '% complété</div>';
        
        html += '</div></div>';
    });
    
    html += '</div></div></div>';
    
    // Jours fériés à venir
    var feries = DB.settings.joursFeries || [];
    var feriesAVenir = feries.filter(function(f) {
        return f.fin >= today.toISOString().slice(0, 10);
    }).sort(function(a, b) { return a.debut.localeCompare(b.debut); });
    
    if (feriesAVenir.length > 0) {
        html += '<div class="card"><div class="card-header"><h3>🚫 Jours fériés à venir</h3></div><div class="card-body">';
        html += '<table><thead><tr><th>Période</th><th>Motif</th></tr></thead><tbody>';
        feriesAVenir.slice(0, 5).forEach(function(f) {
            var debut = new Date(f.debut);
            var fin = new Date(f.fin);
            var periode = formatDate(f.debut);
            if (f.debut !== f.fin) periode += ' au ' + formatDate(f.fin);
            html += '<tr><td>' + periode + '</td><td><strong>' + f.nom + '</strong></td></tr>';
        });
        html += '</tbody></table></div></div>';
    }
    
    document.getElementById('profAgendaContent').innerHTML = html;
}

function openProfClasseDetail(classeId) {
    profCurrentClasseId = classeId;
    profCurrentTab = 'assistance';
    renderProfClasseDetail();
    showSection('prof-classe-detail');
}

function switchProfClasseTab(btn, tab) {
    document.querySelectorAll('#profClasseDetailContent .tab').forEach(function(t) { t.classList.remove('active'); });
    btn.classList.add('active');
    profCurrentTab = tab;
    renderProfClasseDetail();
}

function renderProfClasseDetail() {
    var session = getSession();
    var c = session.classes.find(function(cl) { return cl.id === profCurrentClasseId; });
    if (!c) return;
    
    var eleves = session.apprenants.filter(function(a) { return a.classeId === c.id; });
    var seances = (session.seances || []).filter(function(s) { return s.classeId === c.id; }).sort(function(a,b) { return a.date.localeCompare(b.date); });
    var seancesDone = seances.filter(function(s) { return s.statut === 'done'; });
    
    var html = '<div class="card"><div class="card-header"><h3>📚 ' + c.nom + '</h3><span class="badge badge-' + c.niveau.toLowerCase() + '" style="font-size:0.9rem;">' + c.niveau + '</span></div>';
    
    // Stats rapides
    html += '<div class="card-body"><div class="stats-grid">';
    html += '<div class="stat-card"><div class="stat-icon blue">👥</div><div class="stat-info"><h4>Élèves</h4><div class="value">' + eleves.length + '</div></div></div>';
    html += '<div class="stat-card"><div class="stat-icon green">📅</div><div class="stat-info"><h4>Séances</h4><div class="value">' + seancesDone.length + '/' + seances.length + '</div></div></div>';
    html += '<div class="stat-card"><div class="stat-icon yellow">⏱️</div><div class="stat-info"><h4>Heures</h4><div class="value">' + calcRemunerationClasse(c.id).heures + 'h</div></div></div>';
    html += '</div>';
    
    // Tabs
    html += '<div class="tabs" style="margin:15px 0;">';
    html += '<button class="tab' + (profCurrentTab === 'assistance' ? ' active' : '') + '" onclick="switchProfClasseTab(this,\'assistance\')">✅ Assistance</button>';
    html += '<button class="tab' + (profCurrentTab === 'evaluations' ? ' active' : '') + '" onclick="switchProfClasseTab(this,\'evaluations\')">📝 Évaluations</button>';
    html += '<button class="tab' + (profCurrentTab === 'suivi' ? ' active' : '') + '" onclick="switchProfClasseTab(this,\'suivi\')">📋 Suivi pédagogique</button>';
    html += '</div>';
    
    // Contenu du tab
    if (profCurrentTab === 'assistance') {
        html += renderProfAssistance(c, eleves, seances);
    } else if (profCurrentTab === 'evaluations') {
        html += renderProfEvaluations(c, eleves);
    } else if (profCurrentTab === 'suivi') {
        html += renderProfSuivi(c, seances);
    }
    
    html += '</div></div>';
    
    document.getElementById('profClasseDetailContent').innerHTML = html;
}

function renderProfAssistance(c, eleves, seances) {
    var session = getSession();
    
    var html = '<h4 style="margin-bottom:15px;">✅ Liste de présence</h4>';
    
    // Sélecteur de séance
    var seancesOpts = seances.map(function(s, idx) {
        var num = idx + 1;
        return '<option value="' + s.id + '">' + formatDate(s.date) + ' - Séance ' + num + '/' + seances.length + (s.statut === 'done' ? ' ✓' : '') + '</option>';
    }).join('');
    
    html += '<div class="form-group"><label>📅 Sélectionner une séance</label><select id="profPresenceSeance" onchange="loadProfPresences()" style="width:100%;padding:10px;border:1px solid var(--gray-300);border-radius:6px;font-size:1rem;">' + seancesOpts + '</select></div>';
    
    html += '<div id="profPresencesList"></div>';
    
    html += '<button class="btn btn-success btn-lg" onclick="saveProfPresences()" style="margin-top:15px;width:100%;">💾 Enregistrer les présences</button>';
    
    return html;
}

function loadProfPresences() {
    var session = getSession();
    var seanceId = document.getElementById('profPresenceSeance').value;
    var seance = (session.seances || []).find(function(s) { return s.id === seanceId; });
    var eleves = session.apprenants.filter(function(a) { return a.classeId === profCurrentClasseId; });
    
    if (!seance) return;
    
    var html = '<div style="margin-top:15px;">';
    eleves.forEach(function(a, idx) {
        var status = seance.presences ? seance.presences[a.id] : null;
        var assi = calcAssiduiteDetail(a.id, profCurrentClasseId);
        var assiText = assi.taux !== null ? ' <span style="font-size:0.7rem;color:var(--gray-500);">(' + assi.taux + '%)</span>' : '';
        
        html += '<div class="presence-row" data-apprenant="' + a.id + '" style="display:flex;align-items:center;gap:10px;padding:12px;background:' + (idx % 2 === 0 ? 'var(--gray-100)' : 'white') + ';border-radius:6px;margin-bottom:5px;">';
        html += '<span style="width:30px;font-weight:bold;color:var(--gray-600);">' + (idx + 1) + '</span>';
        html += '<span style="flex:1;font-weight:500;">' + a.nom + assiText + '</span>';
        html += '<button class="presence-btn present' + (status === 'present' ? ' active' : '') + '" onclick="setPresenceBtn(this,\'present\')" style="padding:8px 12px;border:none;border-radius:6px;cursor:pointer;">✅ P</button>';
        html += '<button class="presence-btn retard' + (status === 'retard' ? ' active' : '') + '" onclick="setPresenceBtn(this,\'retard\')" style="padding:8px 12px;border:none;border-radius:6px;cursor:pointer;">⏰ R</button>';
        html += '<button class="presence-btn absent' + (status === 'absent' ? ' active' : '') + '" onclick="setPresenceBtn(this,\'absent\')" style="padding:8px 12px;border:none;border-radius:6px;cursor:pointer;">❌ A</button>';
        html += '</div>';
    });
    
    // Boutons rapides
    html = '<div style="display:flex;gap:10px;flex-wrap:wrap;">' +
        '<button class="btn btn-success btn-sm" onclick="setProfAllPresences(\'present\')">✅ Tous présents</button>' +
        '<button class="btn btn-warning btn-sm" onclick="setProfAllPresences(\'retard\')">⏰ Tous en retard</button>' +
        '<button class="btn btn-danger btn-sm" onclick="setProfAllPresences(\'absent\')">❌ Tous absents</button>' +
        '</div>' + html;
    
    html += '</div>';
    
    document.getElementById('profPresencesList').innerHTML = html;
}

function setProfAllPresences(status) {
    document.querySelectorAll('#profPresencesList .presence-row').forEach(function(row) {
        row.querySelectorAll('.presence-btn').forEach(function(btn) { btn.classList.remove('active'); });
        row.querySelector('.presence-btn.' + status).classList.add('active');
    });
}

function saveProfPresences() {
    var session = getSession();
    var seanceId = document.getElementById('profPresenceSeance').value;
    var seance = (session.seances || []).find(function(s) { return s.id === seanceId; });
    
    if (!seance) { notify('Sélectionnez une séance', 'error'); return; }
    
    if (!seance.presences) seance.presences = {};
    
    var count = 0;
    document.querySelectorAll('#profPresencesList .presence-row').forEach(function(row) {
        var appId = row.dataset.apprenant;
        var activeBtn = row.querySelector('.presence-btn.active');
        if (activeBtn && appId) {
            if (activeBtn.classList.contains('present')) { seance.presences[appId] = 'present'; count++; }
            else if (activeBtn.classList.contains('retard')) { seance.presences[appId] = 'retard'; count++; }
            else if (activeBtn.classList.contains('absent')) { seance.presences[appId] = 'absent'; count++; }
        }
    });
    
    seance.statut = 'done';
    save();
    notify('✅ ' + count + ' présences enregistrées', 'success');
    renderProfClasseDetail();
}

function renderProfEvaluations(c, eleves) {
    var session = getSession();
    if (!c.evaluations) c.evaluations = [];
    
    var html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">';
    html += '<h4>📝 Évaluations</h4>';
    html += '<button class="btn btn-primary btn-sm" onclick="addProfEvaluation()">➕ Nouvelle évaluation</button>';
    html += '</div>';
    
    if (c.evaluations.length === 0) {
        html += '<p style="color:var(--gray-500);">Aucune évaluation. Cliquez sur le bouton pour en créer une.</p>';
        return html;
    }
    
    c.evaluations.forEach(function(ev, evIdx) {
        html += '<div class="card" style="margin-bottom:15px;">';
        html += '<div class="card-header"><h3 style="font-size:0.95rem;">📝 ' + ev.nom + '</h3>';
        html += '<button class="btn btn-sm btn-danger" onclick="deleteProfEvaluation(' + evIdx + ')">🗑️</button></div>';
        html += '<div class="card-body"><table><thead><tr><th>Élève</th><th>Assiduité</th>';
        ev.competences.forEach(function(comp) { html += '<th>' + comp + ' <span style="font-size:0.65rem;color:var(--gray-500);">/25</span></th>'; });
        html += '<th>Total</th></tr></thead><tbody>';
        
        eleves.forEach(function(a) {
            var notes = ev.notes[a.id] || {};
            var total = 0;
            var assi = calcAssiduiteDetail(a.id, c.id);
            var tauxBadge = assi.taux === null ? 'badge-info' : assi.taux >= 80 ? 'badge-success' : assi.taux >= 50 ? 'badge-warning' : 'badge-danger';
            
            html += '<tr><td><strong>' + a.nom + '</strong></td>';
            html += '<td><span class="badge ' + tauxBadge + '">' + (assi.taux !== null ? assi.taux + '%' : '-') + '</span></td>';
            
            ev.competences.forEach(function(comp) {
                var note = notes[comp] !== undefined ? notes[comp] : '';
                if (note !== '') total += parseFloat(note) || 0;
                html += '<td><input type="number" value="' + note + '" min="0" max="25" step="0.5" style="width:50px;padding:4px;border:1px solid var(--gray-300);border-radius:4px;text-align:center;" onchange="updateProfNote(' + evIdx + ',\'' + a.id + '\',\'' + comp + '\',this.value)"></td>';
            });
            
            var maxTotal = ev.competences.length * 25;
            html += '<td><strong>' + total + '/' + maxTotal + '</strong></td></tr>';
        });
        
        html += '</tbody></table></div></div>';
    });
    
    return html;
}

function addProfEvaluation() {
    var content = '<div class="form-group"><label>Nom de l\'évaluation *</label><input type="text" id="profEvalNom" placeholder="Ex: Évaluation mi-parcours"></div>';
    content += '<div class="form-group"><label>Compétences évaluées</label><p style="font-size:0.8rem;color:var(--gray-500);margin-bottom:10px;">4 compétences par défaut (modifiables)</p>';
    content += '<input type="text" id="profEvalComp1" value="CO" placeholder="Compétence 1" style="margin-bottom:5px;"><br>';
    content += '<input type="text" id="profEvalComp2" value="CE" placeholder="Compétence 2" style="margin-bottom:5px;"><br>';
    content += '<input type="text" id="profEvalComp3" value="PO" placeholder="Compétence 3" style="margin-bottom:5px;"><br>';
    content += '<input type="text" id="profEvalComp4" value="PE" placeholder="Compétence 4"></div>';
    
    showModal('➕ Nouvelle évaluation', content, function() {
        var nom = document.getElementById('profEvalNom').value.trim();
        if (!nom) { notify('Nom requis', 'error'); return; }
        
        var comps = [
            document.getElementById('profEvalComp1').value.trim(),
            document.getElementById('profEvalComp2').value.trim(),
            document.getElementById('profEvalComp3').value.trim(),
            document.getElementById('profEvalComp4').value.trim()
        ].filter(function(c) { return c; });
        
        if (comps.length === 0) { notify('Au moins une compétence requise', 'error'); return; }
        
        var session = getSession();
        var c = session.classes.find(function(cl) { return cl.id === profCurrentClasseId; });
        if (!c.evaluations) c.evaluations = [];
        
        c.evaluations.push({ id: genId(), nom: nom, competences: comps, notes: {} });
        save();
        closeModal();
        renderProfClasseDetail();
        notify('Évaluation créée', 'success');
    });
}

function deleteProfEvaluation(evIdx) {
    if (!confirm('Supprimer cette évaluation ?')) return;
    var session = getSession();
    var c = session.classes.find(function(cl) { return cl.id === profCurrentClasseId; });
    c.evaluations.splice(evIdx, 1);
    save();
    renderProfClasseDetail();
    notify('Évaluation supprimée', 'success');
}

function updateProfNote(evIdx, appId, comp, value) {
    var session = getSession();
    var c = session.classes.find(function(cl) { return cl.id === profCurrentClasseId; });
    if (!c.evaluations[evIdx].notes[appId]) c.evaluations[evIdx].notes[appId] = {};
    c.evaluations[evIdx].notes[appId][comp] = value === '' ? '' : parseFloat(value);
    save();
}

function renderProfSuivi(c, seances) {
    var html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">';
    html += '<h4>📋 Suivi pédagogique</h4>';
    html += '</div>';
    
    if (seances.length === 0) {
        html += '<p style="color:var(--gray-500);">Aucune séance programmée.</p>';
        return html;
    }
    
    html += '<div class="table-container"><table><thead><tr><th>N°</th><th>Date</th><th>Statut</th><th>Fiche pédagogique</th><th>Actions</th></tr></thead><tbody>';
    
    seances.forEach(function(s, idx) {
        var hasFiche = s.fichePedagogique && s.fichePedagogique.trim();
        var statusBadge = s.statut === 'done' ? '<span class="badge badge-success">✓ Effectuée</span>' : '<span class="badge badge-warning">En attente</span>';
        
        html += '<tr>';
        html += '<td><strong>' + (idx + 1) + '</strong></td>';
        html += '<td>' + formatDate(s.date) + '</td>';
        html += '<td>' + statusBadge + '</td>';
        html += '<td>' + (hasFiche ? '<span class="badge badge-success">✓ Remplie</span>' : '<span class="badge badge-info">À remplir</span>') + '</td>';
        html += '<td><button class="btn btn-sm btn-primary" onclick="openFichePedagogique(\'' + s.id + '\')">📝 Éditer</button></td>';
        html += '</tr>';
    });
    
    html += '</tbody></table></div>';
    
    return html;
}

function openFichePedagogique(seanceId) {
    var session = getSession();
    var seance = (session.seances || []).find(function(s) { return s.id === seanceId; });
    var c = session.classes.find(function(cl) { return cl.id === seance.classeId; });
    
    if (!seance) return;
    
    var content = '<div class="alert alert-info" style="margin-bottom:15px;">📅 Séance du <strong>' + formatDate(seance.date) + '</strong> - ' + c.nom + '</div>';
    
    content += '<div class="form-group"><label>📚 Objectifs du cours</label><textarea id="ficheObjectifs" rows="3" style="width:100%;padding:10px;border:1px solid var(--gray-300);border-radius:6px;">' + (seance.ficheObjectifs || '') + '</textarea></div>';
    
    content += '<div class="form-group"><label>📖 Contenu / Activités réalisées</label><textarea id="ficheContenu" rows="4" style="width:100%;padding:10px;border:1px solid var(--gray-300);border-radius:6px;">' + (seance.ficheContenu || '') + '</textarea></div>';
    
    content += '<div class="form-group"><label>📝 Observations / Remarques</label><textarea id="ficheObservations" rows="3" style="width:100%;padding:10px;border:1px solid var(--gray-300);border-radius:6px;">' + (seance.ficheObservations || '') + '</textarea></div>';

    showModal('📋 Fiche pédagogique', content, function() {

function renderProfHeures() {
    var session = getSession();
    var myClasses = getMyClasses();
    
    // Grouper les séances par mois
    var seancesParMois = {};
    
    myClasses.forEach(function(c) {
        var tauxDefaut = parseInt(c.tauxHoraire) || DB.settings.tauxHoraire || 5000;
        
        (session.seances || []).filter(function(s) { return s.classeId === c.id && s.statut === 'done'; }).forEach(function(s) {
            var mois = s.date.substring(0, 7); // YYYY-MM
            if (!seancesParMois[mois]) seancesParMois[mois] = { heures: 0, montant: 0, seances: [] };
            
            var heures = parseFloat(s.heures) || 0;
            var taux = parseInt(s.tauxHoraire) || tauxDefaut;
            var frais = parseInt(s.autresFrais) || 0;
            var montant = (heures * taux) + frais;
            
            seancesParMois[mois].heures += heures;
            seancesParMois[mois].montant += montant;
            seancesParMois[mois].seances.push({ seance: s, classe: c, heures: heures, montant: montant });
        });
    });
    
    var moisTries = Object.keys(seancesParMois).sort().reverse();
    
    // Total général
    var totalHeures = 0, totalMontant = 0;
    moisTries.forEach(function(m) { totalHeures += seancesParMois[m].heures; totalMontant += seancesParMois[m].montant; });
    
    var html = '<div class="card" style="margin-bottom:20px;"><div class="card-body" style="text-align:center;background:linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);border-radius:var(--radius);">';
    html += '<h2 style="color:var(--success);font-size:2.5rem;margin-bottom:5px;">' + formatMoney(totalMontant) + '</h2>';
    html += '<p style="font-size:1rem;color:var(--gray-700);">Rémunération totale - ' + totalHeures + ' heures</p>';
    html += '</div></div>';
    
    if (moisTries.length === 0) {
        html += '<div class="card"><div class="card-body"><p style="color:var(--gray-500);">Aucune séance effectuée.</p></div></div>';
        document.getElementById('profHeuresContent').innerHTML = html;
        return;
    }
    
    // Par mois
    html += '<div class="card"><div class="card-header"><h3>📅 Détail par mois</h3></div><div class="card-body">';
    
    moisTries.forEach(function(mois) {
        var data = seancesParMois[mois];
        var moisNom = new Date(mois + '-01').toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });
        
        html += '<div style="margin-bottom:20px;border:1px solid var(--gray-200);border-radius:var(--radius);overflow:hidden;">';
        html += '<div style="background:var(--primary);color:white;padding:12px;display:flex;justify-content:space-between;align-items:center;">';
        html += '<strong style="font-size:1.1rem;">📆 ' + moisNom + '</strong>';
        html += '<span style="font-size:1.2rem;font-weight:bold;">' + formatMoney(data.montant) + '</span>';
        html += '</div>';
        
        html += '<table style="margin:0;"><thead><tr><th>Date</th><th>Cours</th><th>Heures</th><th>Montant</th></tr></thead><tbody>';
        data.seances.forEach(function(item) {
            html += '<tr><td>' + formatDate(item.seance.date) + '</td><td>' + item.classe.nom + '</td><td>' + item.heures + 'h</td><td><strong>' + formatMoney(item.montant) + '</strong></td></tr>';
        });
        html += '<tr style="background:var(--gray-100);font-weight:bold;"><td colspan="2">Total du mois</td><td>' + data.heures + 'h</td><td style="color:var(--success);">' + formatMoney(data.montant) + '</td></tr>';
        html += '</tbody></table></div>';
    });
    
    html += '</div></div>';
    
    document.getElementById('profHeuresContent').innerHTML = html;
}

        if (profClasses.length > 0) {

                var seancesDone = (s.seances || []).filter(function(se) {
