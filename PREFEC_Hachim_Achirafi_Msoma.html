div><button class="btn btn-primary btn-block" onclick="saveCreds()">Enregistrer</button></div>';out+='<div class="card"><h3>📤 Synchronisation</h3><p style="margin-bottom:15px;color:var(--gray-500);font-size:.9rem;">Exportez vos données pour les récupérer sur un autre appareil.</p><button class="btn btn-outline btn-block" onclick="exportData()">Exporter les données</button></div>';document.getElementById("content").innerHTML=out;}function openPhotoSelect(){document.getElementById("photoInput").click();}function changePhoto(input){if(!input.files||!input.files[0])return;var file=input.files[0];if(file.size>500000){toast("Image trop grande (max 500KB)");return;}var reader=new FileReader();reader.onload=function(e){var dataUrl=e.target.result;localStorage.setItem(STORE+"_photo",dataUrl);toast("Photo mise à jour!");document.getElementById("sidebarPhoto").innerHTML='<img src="'+dataUrl+'">';renderProfil();};reader.readAsDataURL(file);}function saveCreds(){var newL=document.getElementById("profLogin").value.trim(),newP=document.getElementById("newPass").value,confP=document.getElementById("confPass").value;if(!newL){toast("Identifiant requis");return;}if(newP&&newP!==confP){toast("Mots de passe différents");return;}DATA.credentials.login=newL;if(newP)DATA.credentials.password=newP;localStorage.setItem(STORE+"_creds",JSON.stringify(DATA.credentials));document.getElementById("profEmail").textContent=newL;toast("Profil mis à jour!");renderProfil();}function exportData(){var d=localStorage.getItem(STORE+"_data");if(!d){toast("Aucune donnée");return;}var code=btoa(d);document.getElementById("modalTitle").textContent="Code de synchronisation";document.getElementById("modalBody").innerHTML='<p style="margin-bottom:15px;">Copiez ce code pour transférer vos données:</p><textarea style="width:100%;height:100px;font-size:.7rem;">'+code+'</textarea>';document.getElementById("modalOk").textContent="Copier";document.getElementById("modalOk").onclick=function(){if(navigator.clipboard)navigator.clipboard.writeText(code);toast("Code copié!");closeModal();};document.getElementById("modalBg").classList.add("show");}function renderAide(){document.getElementById("pageTitle").textContent="Aide";var syncSt=navigator.onLine?"🟢 En ligne":"🟠 Hors-ligne";var out='<div class="help-section"><div class="help-title">🔄 Synchronisation</div><div class="help-card"><p><strong>Statut:</strong> '+syncSt+'</p><p style="margin-top:10px;">Vos données se synchronisent automatiquement avec le serveur.</p><button class="btn btn-primary btn-block" onclick="manualSync()" style="margin-top:15px;">🔄 Actualiser maintenant</button></div></div>';out+='<div class="help-section"><div class="help-title">📅 Mon agenda</div><div class="help-card"><p>L\'agenda permet de visualiser vos séances organisées par date.</p><p>Utilisez les flèches <strong>‹</strong> et <strong>›</strong> pour naviguer entre les semaines.</p><div class="help-tip"><strong>💡 Astuce:</strong> En appuyant sur une séance, accédez aux options Présence, Évaluations et Suivi.</div></div></div>';out+='<div class="help-section"><div class="help-title">📚 Mes cours</div><div class="help-card"><p>Cette section affiche tous les cours qui vous sont assignés.</p><ul><li>Cliquez sur un cours pour accéder aux évaluations</li><li>Créez des évaluations avec les compétences CE, CO, PE, PO</li><li>Les notes sont automatiquement synchronisées</li></ul></div></div>';out+='<div class="help-section"><div class="help-title">✅ Présences</div><div class="help-card"><p>Pour marquer les présences:</p><ul><li><strong>P</strong> = Présent (vert)</li><li><strong>R</strong> = Retard (orange)</li><li><strong>A</strong> = Absent (rouge)</li></ul><p>La sauvegarde est automatique.</p></div></div>';out+='<div class="help-section"><div class="help-title">⏱️ Mes heures</div><div class="help-card"><p>Suivez vos heures de travail et votre rémunération:</p><ul><li>Sélectionnez la période avec les dates</li><li>Basculez entre vue par Jours ou par Cours</li><li
