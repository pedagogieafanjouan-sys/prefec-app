ackground:#d4edda;border-color:var(--green)":"")+" onclick=setPres("+i+",1,this)>P</button><button class=r"+(st==="retard"?" style=background:#fff3cd;border-color:var(--orange)":"")+" onclick=setPres("+i+",2,this)>R</button><button class=a"+(st==="absent"?" style=background:#f8d7da;border-color:#dc3545":"")+" onclick=setPres("+i+",3,this)>A</button></div></div>";});out+="</div><button class=btn style=background:#fff;border:2px_solid_var(--red);color:var(--red) onclick=backToSeance()>Retour</button>";document.getElementById("content").innerHTML=out;document.getElementById("pageTitle").textContent="Presences";}function setPres(i,st,btn){var els=findA(curSeance.classeId,curSIdx);var a=els[i];if(!a)return;var btns=btn.parentElement.querySelectorAll("button");for(var j=0;j<btns.length;j++){btns[j].style.background="#fff";btns[j].style.borderColor="#ddd";}if(st===1){btn.style.background="#d4edda";btn.style.borderColor="var(--green)";}else if(st===2){btn.style.background="#fff3cd";btn.style.borderColor="var(--orange)";}else{btn.style.background="#f8d7da";btn.style.borderColor="#dc3545";}curSeance.presences[a.id]=st===1?"present":st===2?"retard":"absent";saveData();}function backToSeance(){var idx=ALLS.findIndex(function(x){return x.s===curSeance;});if(idx>=0)openSIdx(idx);else renderAgenda();}function openSuivi(){if(!curSeance)return;var out="<div class=card><h3>Fiche de suivi</h3><p class=auto-note>Sauvegarde auto</p><div class=form-group><label>Objectifs</label><textarea id=obj oninput=saveSuivi()>"+(curSeance.ficheObjectifs||"")+"</textarea></div><div class=form-group><label>Contenu</label><textarea id=cont oninput=saveSuivi()>"+(curSeance.ficheContenu||"")+"</textarea></div><div class=form-group><label>Observations</label><textarea id=obs oninput=saveSuivi()>"+(curSeance.ficheObservations||"")+"</textarea></div></div><button class=btn style=background:#fff;border:2px_solid_var(--red);color:var(--red) onclick=backToSeance()>Retour</button>";document.getElementById("content").innerHTML=out;document.getElementById("pageTitle").textContent="Suivi";}function saveSuivi(){curSeance.ficheObjectifs=document.getElementById("obj").value;curSeance.ficheContenu=document.getElementById("cont").value;curSeance.ficheObservations=document.getElementById("obs").value;saveData();}function openDev(){if(!curSeance)return;if(!curSeance.devoirs)curSeance.devoirs=[];var out="<div class=card><h3>Devoirs</h3><div class=form-group><label>Description</label><textarea id=devDesc></textarea></div><div class=form-group><label>Date limite</label><input type=date id=devDate></div><button class=btn-sm style=padding:6px_12px;background:#fff;border:2px_solid_var(--red);color:var(--red) onclick=addDev()>Ajouter</button></div>";if(curSeance.devoirs.length>0){out+="<div class=card><h3>Liste</h3>";curSeance.devoirs.forEach(function(d,i){out+="<div style=display:flex;padding:8px_0;border-bottom:1px_solid_#eee><div style=flex:1>"+d.description.substring(0,30)+"</div><button class=btn-sm style=padding:6px_12px;background:#dc3545;color:#fff onclick=delDev("+i+")>X</button></div>";});out+="</div>";}out+="<button class=btn style=background:#fff;border:2px_solid_var(--red);color:var(--red) onclick=backToSeance()>Retour</button>";document.getElementById("content").innerHTML=out;document.getElementById("pageTitle").textContent="Devoirs";}function addDev(){var d=document.getElementById("devDesc").value;if(!d){toast("Requis");return;}curSeance.devoirs.push({description:d,dateLimite:document.getElementById("devDate").value});saveData();openDev();}function delDev(i){curSeance.devoirs.splice(i,1);saveData();openDev();}function openEvals(){if(!curClasse)return;var c=curClasse;var els=findA(c.id,curSIdx);var sn=DATA.sessions[curSIdx].nom;var out="<div class=card><h3>"+c.nom+"</h3><p style=color:#888;font-size:.85rem>"+sn+"</p><button class=btn-sm style=margin-top:10px;padding:6px_12px;background:var(--red);color:#fff onclick=newEval()>Nouvelle</button></div>";if(c.evaluations.length===0){out+="<div class=card><p style=text-align:center;color:#888>Aucune evaluation</p></div>";}else{c.evaluations.forEach(function(ev,ei){var mx=ev.competences.length*25;out+="<div class=eval-item><div class=eval-header><span class=eval-title>"+ev.nom+" (/"+mx+")</span><button class=btn-sm style=padding:6px_12px;background:#dc3545;color:#fff onclick=delEval("+ei+")>X</button></div>";els.forEach(function(a,ai){var n=ev.notes[a.id]||{};var sum=0;ev.competences.forEach(function(cp){if(n[cp]!==undefined&&n[cp]!=="")sum+=parseFloat(n[cp])||0;});out+="<div class=eval-student><div class=eval-sname>"+a.nom+"<span class=eval-stotal>"+sum+"/"+mx+"</span></div><div class=eval-grid>";ev.competences.forEach(function(cp,ci){var v=n[cp]!==undefined?n[cp]:"";out+="<div class=eval-cell><label>"+cp+"</label><input type=number value="+v+" max=25 min=0 onchange=setNote("+ei+","+ai+","+ci+",this.value)></div>";});out+="</div></div>";});out+="</div>";});}out+="<button class=btn style=background:#fff;border:2px_solid_var(--red);color:var(--red) onclick=backToSeance()>Retour</button>";document.getElementById("content").innerHTML=out;document.getElementById("pageTitle").textContent="Evaluations";}function setNote(ei,ai,ci,v){var els=findA(curClasse.id,curSIdx);var a=els[ai];var ev=curClasse.evaluations[ei];var cp=ev.competences[ci];if(!ev.notes[a.id])ev.notes[a.id]={};ev.notes[a.id][cp]=v!==""?parseFloat(v):"";saveData();toast("OK");}function newEval(){document.getElementById("modalTitle").textContent="Nouvelle evaluation";document.getElementById("modalBody").innerHTML="<div class=form-group><label>Nom</label><input type=text id=evalNom placeholder=Evaluation></div><div class=form-group><label>Competences</label><div class=comp-btns><button class=on data-c=CE>CE</button><button class=on data-c=CO>CO</button><button class=on data-c=PE>PE</button><button class=on data-c=PO>PO</button><button data-c=TSL>TSL</button></div></div>";var btns=document.querySelectorAll(".comp-btns button");for(var i=0;i<btns.length;i++){btns[i].onclick=function(){if(this.className.indexOf("on")>=0)this.className="";else this.className="on";};}document.getElementById("modalOk").onclick=saveEval;document.getElementById("modalBg").classList.add("show");}function saveEval(){var nm=document.getElementById("evalNom").value.trim();if(!nm){toast("Nom requis");return;}var cp=[];var btns=document.querySelectorAll(".comp-btns button.on");for(var i=0;i<btns.length;i++)cp.push(btns[i].getAttribute("data-c"));if(cp.length===0){toast("Choisir competences");return;}curClasse.evaluations.push({nom:nm,competences:cp,notes:{}});saveData();closeModal();openEvals();}function delEval(i){if(confirm("Supprimer?")){curClasse.evaluations.splice(i,1);saveData();openEvals();}}function renderCours(){var out="";DATA.sessions.forEach(function(sess,si){out+="<div class=scard><h4>"+sess.nom+"</h4>";sess.classes.forEach(function(c,ci){var els=sess.apprenants.filter(function(a){return a.classeId===c.id;}).length;out+="<div class=course-item onclick=openC("+si+","+ci+")><div class=icon>C</div><div class=info><div class=name>"+c.nom+"</div><div class=time>"+els+" eleves | "+c.evaluations.length+" eval</div></div></div>";});out+="</div>";});document.getElementById("content").innerHTML=out;document.getElementById("pageTitle").textContent="Mes cours";}function openC(si,ci){curSIdx=si;var sess=DATA.sessions[si];var c=sess.classes[ci];if(!c)return;curClasse=c;curSeance={classeId:c.id};openEvals();}function renderEleves(){var out="";DATA.sessions.forEach(function(sess,si){sess.classes.forEach(function(c){var els=sess.apprenants.filter(function(a){return a.classeId===c.id;});if(els.length>0){out+="<div class=card><h3>"+c.nom+" ("+els.length+")</h3>";els.forEach(function(a){out+="<div class=presence-row><div class=presence-name>"+a.nom+"</div></div>";});out+="</div>";}});});document.getElementById("content").innerHTML=out;document.getElementById("pageTitle").textContent="Eleves";}function renderHeures(){var out="<div class=card><h3>Mes heures</h3>";var gT=0;DATA.sessions.forEach(function(sess,si){var ex=DATA.extraSeances[si]||[];var done=sess.seances.concat(ex).filter(function(s){return s.statut==="done";}).length;var total=sess.seances.concat(ex).length;gT+=done;out+="<div style=padding:10px_0;border-bottom:1px_solid_#eee><strong>"+sess.nom+"</strong><br><span style=color:var(--red)>"+done+"/"+total+" seances</span></div>";});out+="<div style=padding:12px_0;font-weight:bold;color:var(--red)>Total: "+gT+" seances effectuees</div></div>";document.getElementById("content").innerHTML=out;document.getElementById("pageTitle").textContent="Heures";}function renderProfil(){var savedPhoto=localStorage.getItem(STORE+"_photo")||"";var initials=DATA.prof.nom.split(" ").map(function(n){return n[0]||"";}).join("").substring(0,2).toUpperCase();var out="<div class=card style=text-align:center>";if(savedPhoto){out+="<div style=width:100px;height:100px;border-radius:50%;margin:0_auto_15px;overflow:hidden><img src="+savedPhoto+" style=width:100%;height:100%;object-fit:cover></div>";}else{out+="<div style=width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,#da002e,#ff6b6b);margin:0_auto_15px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:2rem;font-weight:bold>"+initials+"</div>";}out+="<h3>"+DATA.prof.nom+"</h3>";out+="<p style=color:#888>"+DATA.sessions.length+" session(s)</p>";out+="<input type=file id=photoInput accept=image/* style=display:none onchange=changePhoto(this)>";out+="<button class=btn onclick=openPhotoSelect() style=background:#fff;border:2px_solid_#da002e;color:#da002e;margin-top:12px>Changer photo</button>";out+="</div>";out+="<div class=card><h3>Securite</h3>";out+="<div style=margin-bottom:12px><label>Identifiant</label><input type=text id=profLogin value="+DATA.credentials.login+" style=width:100%;padding:10px;border:2px_solid_#eee;border-radius:8px;margin-top:5px></div>";out+="<div style=margin-bottom:12px><label>Nouveau mot de passe</label><input type=password id=newPass placeholder=Laisser_vide_si_inchange style=width:100%;padding:10px;border:2px_solid_#eee;border-radius:8px;margin-top:5px></div>";out+="<div style=margin-bottom:12px><label>Confirmer</label><input type=password id=confPass style=width:100%;padding:10px;border:2px_solid_#eee;border-radius:8px;margin-top:5px></div>";out+="<button class=btn onclick=saveCredentials() style=background:#28a745;color:#fff>Enregistrer</button>";out+="</div>";out+="<div class=card><h3>Synchronisation</h3><button class=btn onclick=exportData() style=background:#da002e;color:#fff>Exporter donnees</button></div>";document.getElementById("content").innerHTML=out;document.getElementById("pageTitle").textContent="Profil";}function openPhotoSelect(){document.getElementById("photoInput").click();}function changePhoto(input){if(!input.files||!input.files[0])return;var file=input.files[0];if(file.size>500000){toast("Image trop grande (max 500KB)");return;}var reader=new FileReader();reader.onload=function(e){var dataUrl=e.target.result;localStorage.setItem(STORE+"_photo",dataUrl);syncPhotoToFirebase(dataUrl);toast("Photo mise a jour!");renderProfil();};reader.readAsDataURL(file);}function syncPhotoToFirebase(dataUrl){if(typeof firebase==="undefined")return;var profKey=DATA.prof.nom.replace(/[^a-zA-Z0-9]/g,"");firebase.database().ref("profils/"+profKey+"/photo").set(dataUrl);}function saveCredentials(){var newLogin=document.getElementById("profLogin").value.trim();var newPass=document.getElementById("newPass").value;var confPass=document.getElementById("confPass").value;if(!newLogin){toast("Identifiant requis");return;}if(newPass&&newPass!==confPass){toast("Mots de passe différents");return;}DATA.credentials.login=newLogin;if(newPass){DATA.credentials.password=newPass;}localStorage.setItem(STORE+"_creds",JSON.stringify(DATA.credentials));syncCredentialsToFirebase();toast("Profil mis à jour!");renderProfil();}function syncCredentialsToFirebase(){if(typeof firebase==="undefined")return;var profKey=DATA.prof.nom.replace(/[^a-zA-Z0-9]/g,"");firebase.database().ref("profils/"+profKey).update({login:DATA.credentials.login,password:DATA.credentials.password,updatedAt:Date.now()});}function loadProfile(){var savedCreds=localStorage.getItem(STORE+"_creds");if(savedCreds){try{var c=JSON.parse(savedCreds);DATA.credentials.login=c.login||DATA.credentials.login;DATA.credentials.password=c.password||DATA.credentials.password;}catch(e){}}}function exportData(){var d=localStorage.getItem(STORE+"_data");if(!d){toast("Rien");return;}var code=btoa(d);document.getElementById("modalTitle").textContent="Code sync";document.getElementById("modalBody").innerHTML="<p style=margin-bottom:12px>Envoyez ce code:</p><textarea style=width:100%;height:80px;font-size:.65rem>"+code+"</textarea>";document.getElementById("modalOk").onclick=function(){if(navigator.clipboard)navigator.clipboard.writeText(code);toast("Copie!");closeModal();};document.getElementById("modalBg").classList.add("show");}function renderAide(){var out="<div class=card><h3>Agenda</h3><p>Naviguez avec les fleches.</p></div><div class=card><h3>Sauvegarde</h3><p>Automatique.</p></div><div class=card><h3>Evaluations</h3><p>Chaque competence /25.</p></div>";document.getElementById("content").innerHTML=out;document.getElementById("pageTitle").textContent="Aide";}document.addEventListener("DOMContentLoaded",init);</script></body></html>
