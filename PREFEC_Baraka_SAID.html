e;});if(idx>=0)openSIdx(idx);else renderAgenda();}function openPres(){if(!curSeance)return;var els=findA(curSeance.classeId,curSIdx);if(!curSeance.presences)curSeance.presences={};var out='<div class="card"><h3>Présences ('+els.length+' élèves)</h3><p class="auto-note">Sauvegarde automatique</p>';if(els.length===0)out+='<p style="color:var(--danger);">Aucun élève trouvé.</p>';els.forEach(function(a,i){var st=curSeance.presences[a.id]||"";out+='<div class="presence-row"><div class="presence-name">'+a.nom+'</div><div class="presence-btns"><button class="p'+(st==="present"?' sel-p':'')+'" onclick="setPres('+i+',1,this)">P</button><button class="r'+(st==="retard"?' sel-r':'')+'" onclick="setPres('+i+',2,this)">R</button><button class="a'+(st==="absent"?' sel-a':'')+'" onclick="setPres('+i+',3,this)">A</button></div></div>';});out+='</div><button class="btn btn-outline btn-block" onclick="backToSeance()">← Retour</button>';document.getElementById("content").innerHTML=out;document.getElementById("pageTitle").textContent="Présences";}function setPres(i,st,btn){var els=findA(curSeance.classeId,curSIdx),a=els[i];if(!a)return;var btns=btn.parentElement.querySelectorAll("button");btns.forEach(function(b){b.className=b.className.replace(/sel-[pra]/g,"").trim();});if(st===1)btn.classList.add("sel-p");else if(st===2)btn.classList.add("sel-r");else btn.classList.add("sel-a");curSeance.presences[a.id]=st===1?"present":st===2?"retard":"absent";saveData();}function openSuivi(){if(!curSeance)return;var out='<div class="card"><h3>Fiche de suivi pédagogique</h3><p class="auto-note">Sauvegarde automatique</p><div class="form-group"><label>Objectifs du cours</label><textarea id="obj" oninput="saveSuivi()">'+(curSeance.ficheObjectifs||'')+'</textarea></div><div class="form-group"><label>Contenu / Déroulement</label><textarea id="cont" oninput="saveSuivi()">'+(curSeance.ficheContenu||'')+'</textarea></div><div class="form-group"><label>Observations</label><textarea id="obs" oninput="saveSuivi()">'+(curSeance.ficheObservations||'')+'</textarea></div></div><button class="btn btn-outline btn-block" onclick="backToSeance()">← Retour</button>';document.getElementById("content").innerHTML=out;document.getElementById("pageTitle").textContent="Suivi";}function saveSuivi(){curSeance.ficheObjectifs=document.getElementById("obj").value;curSeance.ficheContenu=document.getElementById("cont").value;curSeance.ficheObservations=document.getElementById("obs").value;saveData();}function openEvals(){if(!curClasse)return;var c=curClasse,els=findA(c.id,curSIdx),sn=DATA.sessions[curSIdx].nom;var out='<div class="card"><h3>'+c.nom+'</h3><p style="color:var(--gray-500);font-size:.85rem;margin-bottom:15px;">'+sn+'</p><button class="btn btn-primary" onclick="newEval()">➕ Nouvelle évaluation</button></div>';if(!c.evaluations||c.evaluations.length===0)out+='<div class="card"><p style="text-align:center;color:var(--gray-500);">Aucune évaluation</p></div>';else c.evaluations.forEach(function(ev,ei){var mx=ev.competences.length*25;out+='<div class="eval-item"><div class="eval-header"><span class="eval-title">'+ev.nom+' (/'+mx+')</span><button class="btn btn-danger btn-sm" onclick="delEval('+ei+')">🗑️</button></div>';els.forEach(function(a,ai){var n=ev.notes[a.id]||{},sum=0;ev.competences.forEach(function(cp){if(n[cp]!==undefined&&n[cp]!=="")sum+=parseFloat(n[cp])||0;});out+='<div class="eval-student"><div class="eval-sname">'+a.nom+'<span class="eval-stotal">'+sum+'/'+mx+'</span></div><div class="eval-grid">';ev.competences.forEach(function(cp,ci){var v=n[cp]!==undefined?n[cp]:"";out+='<div class="eval-cell"><label>'+cp+'</label><input type="number" value="'+v+'" max="25" min="0" onchange="setNote('+ei+','+ai+','+ci+',this.value)"></div>';});out+='</div></div>';});out+='</div>';});out+='<button class="btn btn-outline btn-block" onclick="backToSeance()">← Retour</button>';document.getElementById("content").innerHTML=out;document.getElementById("pageTitle").textContent="Évaluations"; ").innerHTML=out;document.getElementById("pageTitle").textContent="Communication";}document.addEventListener("DOMContentLoaded",init);</script></body></html>
