atus("offline");}}).catch(function(e){toast("❌ Erreur sync");});}function openSIdx(idx){if(!ALLS[idx])return;var it=ALLS[idx];curSIdx=it.si;var sess=DATA.sessions[it.si],s=it.s;curSeance=s;var c=findC(s.classeId,it.si);curClasse=c;var dO=new Date(s.date),pOK=s.presences&&Object.keys(s.presences).length>0,sOK=s.ficheObjectifs||s.ficheContenu||s.ficheObservations;var out='<div style="background:var(--primary);margin:-15px -15px 15px;padding:20px;color:#fff;text-align:center;position:relative;"><button style="position:absolute;left:15px;top:15px;background:rgba(255,255,255,.2);border:none;color:#fff;padding:8px 15px;border-radius:20px;font-size:.85rem;cursor:pointer;" onclick="renderAgenda()">‹ Retour</button><div style="font-size:1.3rem;font-weight:700;margin-bottom:5px;">'+(c?c.nom:'?')+'</div><div style="font-size:.9rem;opacity:.9;">'+JOURS[dO.getDay()]+' '+dO.getDate()+' '+MOIS[dO.getMonth()]+'</div></div>';out+='<div class="action-grid"><div class="action-btn'+(pOK?' done':'')+'" onclick="openPres()"><div class="icon">📋</div><h4>Assistance</h4><div class="status">'+(pOK?'Complété ✓':'Incomplet')+'</div></div><div class="action-btn" onclick="openEvals()"><div class="icon">📝</div><h4>Évaluations</h4><div class="status">Notes</div></div><div class="action-btn'+(sOK?' done':'')+'" onclick="openSuivi()"><div class="icon">📊</div><h4>Suivi</h4><div class="status">'+(sOK?'Complété ✓':'Incomplet')+'</div></div><div class="action-btn" onclick="openComm()"><div class="icon">💬</div><h4>Communication</h4><div class="status">Messages</div></div></div>';if(s.statut!=="done")out+='<button class="btn btn-primary btn-block" onclick="markDone()">✓ Marquer effectuée</button>';else out+='<div style="text-align:center;padding:15px;background:var(--green-lt);border-radius:12px;color:var(--green);">✓ Séance effectuée</div>';document.getElementById("content").innerHTML=out;document.getElementById("pageTitle").textContent="Séance";}function markDone(){curSeance.statut="done";saveData();toa
